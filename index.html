<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPG | Тропы забытого королевства</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #0a0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 10px; min-height: 100vh; color: #fff; }
        .game-container { max-width: 500px; margin: 0 auto; background: #0f0e17; border-radius: 32px; padding: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid #f7d44a55; }
        .char-idle { font-size: 3rem; text-align: center; }
        .card { background: #1e1b2b; border-radius: 20px; padding: 10px; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .stat { background: #00000099; padding: 5px 12px; border-radius: 30px; font-size: 0.7rem; color: #f7d44a; }
        .energy-bar { background: #2a1a2a; border-radius: 20px; height: 8px; margin-top: 5px; overflow: hidden; }
        .energy-fill { background: #4cff4c; height: 100%; width: 0%; transition: width 0.2s; }
        .energy-fill.travel { background: #ffaa44; }
        .btn { background: #3a2c45; border: none; padding: 8px 12px; border-radius: 40px; font-size: 0.7rem; color: white; cursor: pointer; margin: 3px; }
        .btn-primary { background: #2f6b4a; }
        .btn-boss { background: #8b3c2c; }
        .tabs { display: flex; gap: 4px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: #2a2438; padding: 6px 10px; border-radius: 30px; font-size: 0.6rem; cursor: pointer; }
        .tab-btn.active { background: #f7d44a; color: #1e1b2b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .location-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0; }
        .location-btn { background: #3a2c45; padding: 6px 10px; border-radius: 30px; font-size: 0.65rem; cursor: pointer; }
        .location-btn.locked { opacity: 0.4; background: #5a3e2e; }
        .location-btn.completed { background: #2a6b4a; border: 1px solid gold; }
        .fight-counter { background: #1a1530; border-radius: 20px; padding: 8px; text-align: center; margin: 8px 0; font-size: 0.75rem; }
        .message-log { background: #000000aa; border-radius: 16px; padding: 8px; font-size: 0.65rem; color: #bdaa88; max-height: 60px; overflow-y: auto; margin: 10px 0; }
        .class-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; max-height: 180px; overflow-y: auto; }
        .class-option { background: #2a2438; padding: 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 0.55rem; }
        .class-option.selected { background: #f7d44a; color: #1e1b2b; }
        .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; max-height: 200px; overflow-y: auto; }
        .item-card { background: #2a2438; padding: 6px; border-radius: 10px; text-align: center; font-size: 0.55rem; cursor: pointer; }
        .admin-panel { background: #2c1e2e; border-radius: 20px; padding: 10px; margin-top: 10px; border: 2px solid #ff00ff; }
        .admin-input { background: #1e1b2b; color: #f7d44a; border: 1px solid gold; border-radius: 30px; padding: 4px 8px; margin: 3px; width: 90px; font-size: 0.7rem; }
        .boss-badge { background: #8b0000; color: gold; padding: 2px 5px; border-radius: 20px; font-size: 0.5rem; }
        .completed-badge { background: #2a6b4a; color: gold; padding: 2px 5px; border-radius: 20px; font-size: 0.5rem; }
    </style>
</head>
<body>
<div class="game-container" id="rpgGame"></div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    let tg;
    try {
        tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe) throw new Error();
        tg.expand();
        tg.enableClosingConfirmation();
    } catch(e) {
        tg = {
            expand: () => {},
            ready: () => {},
            CloudStorage: { setItem: (k, d, cb) => { localStorage.setItem(k, d); if(cb) cb(null,true); }, getItem: (k, cb) => { if(cb) cb(null, localStorage.getItem(k)); } },
            initDataUnsafe: { user: { id: Date.now() } }
        };
    }
    
    const ADMIN_ID = 1198178866;
    function isAdmin() { return tg.initDataUnsafe?.user?.id === ADMIN_ID; }
    
    async function saveData(key, data) {
        return new Promise((resolve) => {
            if (tg?.CloudStorage) tg.CloudStorage.setItem(key, data, (e) => resolve(!e));
            else { localStorage.setItem(key, data); resolve(true); }
        });
    }
    async function loadData(key) {
        return new Promise((resolve) => {
            if (tg?.CloudStorage) tg.CloudStorage.getItem(key, (e, v) => resolve(e || !v ? null : v));
            else resolve(localStorage.getItem(key));
        });
    }
    
    const CLASSES = {
        warrior: { name: "Воин", icon: "🗡️", strBonus: 5, hpBonus: 10 },
        archer: { name: "Лучник", icon: "🏹", strBonus: 4, hpBonus: 5 },
        mage: { name: "Маг", icon: "🧙", strBonus: 6, hpBonus: 3 },
        rogue: { name: "Вор", icon: "🔪", strBonus: 3, hpBonus: 5 },
        paladin: { name: "Паладин", icon: "🛡️", strBonus: 4, hpBonus: 8 },
        necromancer: { name: "Некромант", icon: "💀", strBonus: 5, hpBonus: 4 },
        druid: { name: "Друид", icon: "🌿", strBonus: 4, hpBonus: 6 },
        berserk: { name: "Берсерк", icon: "🔥", strBonus: 7, hpBonus: 10 },
        knight: { name: "Рыцарь", icon: "⚔️", strBonus: 5, hpBonus: 7 },
        priest: { name: "Жрец", icon: "⛪", strBonus: 3, hpBonus: 5 },
        shaman: { name: "Шаман", icon: "🥁", strBonus: 4, hpBonus: 5 },
        demonologist: { name: "Демонолог", icon: "😈", strBonus: 6, hpBonus: 4 },
        swordsman: { name: "Мечник", icon: "🗡️", strBonus: 5, hpBonus: 6 },
        spearman: { name: "Копейщик", icon: "🔱", strBonus: 4, hpBonus: 7 },
        assassin: { name: "Ассасин", icon: "🗡️", strBonus: 5, hpBonus: 4 },
        guardian: { name: "Страж", icon: "🛡️", strBonus: 3, hpBonus: 12 }
    };
    
    const LOCATIONS = {
        village: { name: "Деревня", icon: "🏘️", energyCost: 5, levelReq: 1, bossHp: 80, bossStr: 18, bossExp: 150, bossGold: 200 },
        forest: { name: "Лес", icon: "🌳", energyCost: 8, levelReq: 2, bossHp: 120, bossStr: 25, bossExp: 250, bossGold: 350 },
        mountains: { name: "Горы", icon: "⛰️", energyCost: 10, levelReq: 3, bossHp: 180, bossStr: 32, bossExp: 400, bossGold: 550 },
        swamp: { name: "Болото", icon: "🪷", energyCost: 10, levelReq: 5, bossHp: 250, bossStr: 40, bossExp: 600, bossGold: 800 },
        desert: { name: "Пустыня", icon: "🏜️", energyCost: 10, levelReq: 7, bossHp: 350, bossStr: 50, bossExp: 850, bossGold: 1200 },
        castle: { name: "Замок", icon: "🏰", energyCost: 12, levelReq: 10, bossHp: 500, bossStr: 65, bossExp: 1200, bossGold: 2000 }
    };
    
    let game = {
        initialized: false, id: null, name: "", class: "warrior",
        gold: 500, level: 1, exp: 0, expToNext: 100,
        combatEnergy: 100, maxCombatEnergy: 100, travelEnergy: 50, maxTravelEnergy: 50,
        weapon: { name: "Ржавый меч", strBonus: 2 },
        armor: { name: "Кожаная броня", defBonus: 2 },
        inventory: [],
        resources: { "Трава": 5, "Гриб": 3 },
        potions: { weak: 3, medium: 1, strong: 0 },
        location: "village", dungeonFloor: 1, maxFloor: 1,
        completed: [], monstersKilled: 0, needKill: 15,
        inCombat: false, enemy: null, enemyHp: 0,
        autoFight: false, autoInterval: null,
        message: "", activeTab: "game", isAdmin: false
    };
    
    async function saveGame() { if(game.name) await saveData(`rpg_${game.id || game.name}`, JSON.stringify(game)); }
    async function loadGame(id) {
        let raw = await loadData(`rpg_${id}`);
        if(raw) { Object.assign(game, JSON.parse(raw)); game.isAdmin = isAdmin(); if(!game.completed) game.completed = []; renderGame(); return true; }
        return false;
    }
    
    async function createCharacter(name, cls) {
        if(!name.trim()) return alert("Введите имя!");
        let c = CLASSES[cls];
        game.name = name; game.class = cls; game.id = tg.initDataUnsafe?.user?.id;
        game.gold = 500; game.level = 1; game.exp = 0; game.expToNext = 100;
        game.combatEnergy = 100 + (c.hpBonus||0); game.maxCombatEnergy = 100 + (c.hpBonus||0);
        game.travelEnergy = 50; game.maxTravelEnergy = 50;
        game.weapon = { name: c.icon+" Оружие", strBonus: c.strBonus };
        game.armor = { name: "Кожаная броня", defBonus: 2 };
        game.inventory = [game.weapon, game.armor];
        game.location = "village"; game.dungeonFloor = 1; game.maxFloor = 1;
        game.completed = []; game.monstersKilled = 0;
        game.isAdmin = isAdmin();
        game.initialized = true;
        game.message = `✨ Добро пожаловать, ${name}-${c.name}! Убей 15 монстров для босса! ✨`;
        await saveGame();
        renderGame();
    }
    
    function getStats() {
        let c = CLASSES[game.class] || CLASSES.warrior;
        return {
            hp: game.combatEnergy, maxHp: game.maxCombatEnergy,
            str: 10 + game.level * 2 + (game.weapon?.strBonus||0) + (c.strBonus||0),
            def: 5 + game.level + (game.armor?.defBonus||0)
        };
    }
    
    function getEnemy() {
        let bonus = Math.floor(game.level/2);
        let enemies = [
            { name: "Гоблин", hp: 20+bonus*5, str: 7+bonus*2, exp: 30+bonus*8, gold: 15+bonus*5, icon: "👺" },
            { name: "Волк", hp: 25+bonus*5, str: 9+bonus*2, exp: 45+bonus*8, gold: 20+bonus*5, icon: "🐺" },
            { name: "Орк", hp: 35+bonus*5, str: 12+bonus*2, exp: 70+bonus*8, gold: 35+bonus*5, icon: "👹" }
        ];
        let e = JSON.parse(JSON.stringify(enemies[Math.floor(Math.random()*enemies.length)]));
        if(game.completed.includes(game.location)) { e.hp = Math.floor(e.hp*1.5); e.str = Math.floor(e.str*1.5); }
        return e;
    }
    
    async function gainExp(amount) {
        game.exp += amount;
        while(game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxCombatEnergy += 5; game.maxTravelEnergy += 2;
            game.combatEnergy = game.maxCombatEnergy; game.travelEnergy = game.maxTravelEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` ✨ УРОВЕНЬ ${game.level}! ✨`;
        }
        await saveGame();
        renderGame();
    }
    
    async function combatAttack() {
        if(!game.inCombat) return;
        let s = getStats();
        let dmg = Math.max(1, s.str + Math.floor(Math.random()*8) - (game.enemy.def||5));
        game.enemyHp -= dmg;
        game.message = `⚡ Урон ${dmg} по ${game.enemy.name}`;
        
        if(game.enemyHp <= 0) {
            game.gold += game.enemy.gold;
            await gainExp(game.enemy.exp);
            game.monstersKilled++;
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 8);
            game.message += ` 🏆 Победа! +${game.enemy.gold}💰 +${game.enemy.exp}✨`;
            
            if(game.monstersKilled >= game.needKill) {
                game.message += ` 👑 Теперь можно сразиться с боссом! 👑`;
            }
            
            game.inCombat = false;
            game.enemy = null;
            
            if(game.autoFight && game.monstersKilled < game.needKill) {
                setTimeout(() => startFight(), 200);
            }
            await saveGame();
            renderGame();
            return;
        }
        
        let enemyDmg = Math.max(1, game.enemy.str + Math.floor(Math.random()*7) - s.def);
        game.combatEnergy -= enemyDmg;
        game.message += ` | Враг атакует → -${enemyDmg} HP`;
        if(game.combatEnergy <= 0) {
            game.combatEnergy = 0;
            game.message = "💀 Поражение!";
            game.inCombat = false;
            game.enemy = null;
            if(game.autoFight) stopAutoFight();
        }
        await saveGame();
        renderGame();
    }
    
    function startFight() {
        if(game.monstersKilled >= game.needKill) { game.message = "👑 Убей босса!"; renderGame(); return; }
        if(game.combatEnergy < 10) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        game.combatEnergy -= 10;
        game.enemy = getEnemy();
        game.enemyHp = game.enemy.hp;
        game.inCombat = true;
        game.message = `⚔️ БОЙ ${game.monstersKilled+1}/${game.needKill}: ${game.enemy.icon} ${game.enemy.name}`;
        renderGame();
    }
    
    function startBossFight() {
        if(game.monstersKilled < game.needKill && !game.isAdmin) { game.message = `❌ Убей ещё ${game.needKill-game.monstersKilled} монстров!`; renderGame(); return; }
        if(game.completed.includes(game.location)) { game.message = "Босс уже побеждён!"; renderGame(); return; }
        if(game.combatEnergy < 15) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        let loc = LOCATIONS[game.location];
        let bonus = Math.floor(game.level/2);
        game.combatEnergy -= 15;
        game.enemy = {
            name: `👑 БОСС ${loc.name} 👑`,
            hp: loc.bossHp + bonus*15,
            str: loc.bossStr + bonus*3,
            exp: loc.bossExp + bonus*30,
            gold: loc.bossGold + bonus*50,
            icon: "👑",
            isBoss: true
        };
        game.enemyHp = game.enemy.hp;
        game.inCombat = true;
        game.message = `⚔️ БОЙ С БОССОМ: ${game.enemy.name}`;
        renderGame();
    }
    
    function startDungeonFight() {
        if(game.dungeonFloor > 1000) { game.message = "🎉 Подземелье пройдено!"; renderGame(); return; }
        let isBoss = (game.dungeonFloor % 20 === 0);
        let bonus = Math.floor(game.dungeonFloor/5);
        if(game.combatEnergy < 10) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        game.combatEnergy -= 10;
        if(isBoss) {
            game.enemy = {
                name: `👑 БОСС ${Math.floor(game.dungeonFloor/20)} (${game.dungeonFloor}эт) 👑`,
                hp: 150 + game.dungeonFloor*2,
                str: 30 + Math.floor(game.dungeonFloor/2),
                exp: 300 + game.dungeonFloor*5,
                gold: 200 + game.dungeonFloor*8,
                icon: "👑",
                isBoss: true
            };
        } else {
            game.enemy = {
                name: `Страж ${game.dungeonFloor}эт`,
                hp: 50 + game.dungeonFloor,
                str: 15 + Math.floor(game.dungeonFloor/4),
                exp: 60 + game.dungeonFloor,
                gold: 40 + game.dungeonFloor*2,
                icon: "👹"
            };
        }
        game.enemyHp = game.enemy.hp;
        game.inCombat = true;
        game.message = `⚔️ ПОДЗЕМЕЛЬЕ ${game.dungeonFloor}эт: ${game.enemy.icon} ${game.enemy.name}`;
        renderGame();
    }
    
    function afterWin() {
        if(game.enemy?.isBoss) {
            if(!game.completed.includes(game.location)) game.completed.push(game.location);
            game.monstersKilled = 0;
        } else if(game.location !== "dungeonLoc") {
            game.monstersKilled++;
        } else {
            game.dungeonFloor++;
            if(game.dungeonFloor > game.maxFloor) game.maxFloor = game.dungeonFloor;
        }
    }
    
    function stopAutoFight() { if(game.autoInterval) clearInterval(game.autoInterval); game.autoFight = false; game.autoInterval = null; game.message = "⏹️ Автобой остановлен"; renderGame(); }
    function startAutoFight() {
        if(game.autoFight) { stopAutoFight(); return; }
        if(game.inCombat) { game.message = "Сначала закончи бой!"; renderGame(); return; }
        game.autoFight = true;
        game.message = "🟢 АВТОБОЙ ВКЛЮЧЁН";
        renderGame();
        game.autoInterval = setInterval(() => {
            if(game.autoFight && !game.inCombat) {
                if(game.monstersKilled >= game.needKill && game.location !== "dungeonLoc") {
                    game.message = "👑 Победи босса! Автобой остановлен";
                    stopAutoFight();
                } else if(game.combatEnergy < 10) {
                    game.message = "⚠️ Нет энергии! Автобой остановлен";
                    stopAutoFight();
                } else {
                    startFight();
                }
            }
        }, 800);
    }
    
    function changeLocation(loc) {
        let l = LOCATIONS[loc];
        if(!l) return;
        if(game.level < l.levelReq && !game.isAdmin) { game.message = `❌ Нужен ${l.levelReq} уровень!`; renderGame(); return; }
        if(game.travelEnergy < l.energyCost && !game.isAdmin) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        if(!game.isAdmin) game.travelEnergy -= l.energyCost;
        game.location = loc;
        game.monstersKilled = game.completed.includes(loc) ? game.needKill : 0;
        game.message = `🚶 Переход в ${l.name}`;
        if(game.autoFight) stopAutoFight();
        renderGame();
    }
    
    async function usePotion(t) {
        if(t==="weak" && game.potions.weak>0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy+10); game.potions.weak--; game.message = "🍃 +10 HP"; }
        else if(t==="medium" && game.potions.medium>0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy+25); game.potions.medium--; game.message = "🧪 +25 HP"; }
        else if(t==="strong" && game.potions.strong>0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy+50); game.potions.strong--; game.message = "💊 +50 HP"; }
        else { game.message = "❌ Нет зелий!"; }
        await saveGame(); renderGame();
    }
    
    window.combatAttack = combatAttack;
    window.startFight = startFight;
    window.startBossFight = startBossFight;
    window.startDungeonFight = startDungeonFight;
    window.startAutoFight = startAutoFight;
    window.stopAutoFight = stopAutoFight;
    window.changeLocation = changeLocation;
    window.usePotion = usePotion;
    window.useElixir = () => {};
    
    async function adminGiveGold() { if(!game.isAdmin) return; let nick=document.getElementById("aNick")?.value; let amt=parseInt(document.getElementById("aGold")?.value); if(!nick) return; let d=await loadData(`rpg_${nick}`); if(d){let t=JSON.parse(d); t.gold=(t.gold||0)+amt; await saveData(`rpg_${nick}`,JSON.stringify(t)); game.message=`👑 Выдал ${amt}💰 ${nick}`; renderGame();} else game.message=`❌ Игрок ${nick} не найден`; renderGame(); }
    async function adminGiveExp() { if(!game.isAdmin) return; let nick=document.getElementById("aNick")?.value; let amt=parseInt(document.getElementById("aExp")?.value); if(!nick) return; let d=await loadData(`rpg_${nick}`); if(d){let t=JSON.parse(d); t.exp=(t.exp||0)+amt; await saveData(`rpg_${nick}`,JSON.stringify(t)); game.message=`👑 Выдал ${amt}✨ ${nick}`; renderGame();} else game.message=`❌ Игрок ${nick} не найден`; renderGame(); }
    async function adminReset() { if(!game.isAdmin) return; let nick=document.getElementById("aNick")?.value; if(!nick) return; if(confirm(`Сбросить ${nick}?`)){ await saveData(`rpg_${nick}`,""); game.message=`👑 Сброшен ${nick}`; renderGame(); } }
    window.adminGiveGold=adminGiveGold; window.adminGiveExp=adminGiveExp; window.adminReset=adminReset;
    
    function renderGame() {
        let container = document.getElementById("rpgGame");
        let s = getStats();
        let cls = CLASSES[game.class] || CLASSES.warrior;
        
        if(!game.initialized) {
            let tid = tg.initDataUnsafe?.user?.id;
            if(tid) { loadGame(tid); return; }
            let selClass="warrior";
            let html=`<div><h2 style="color:gold;text-align:center;">⚔️ ТРОПЫ ЗАБЫТОГО КОРОЛЕВСТВА ⚔️</h2><input id="pName" placeholder="Имя героя"><div class="class-selector" id="classSel">${Object.entries(CLASSES).map(([k,c])=>`<div class="class-option ${k===selClass?'selected':''}" data-class="${k}">${c.icon} ${c.name}</div>`).join('')}</div><button class="btn btn-primary" id="createBtn">🚀 НАЧАТЬ</button></div>`;
            container.innerHTML=html;
            document.querySelectorAll(".class-option").forEach(o=>{o.onclick=()=>{document.querySelectorAll(".class-option").forEach(c=>c.classList.remove("selected")); o.classList.add("selected"); selClass=o.dataset.class;};});
            document.getElementById("createBtn").onclick=()=>createCharacter(document.getElementById("pName").value, selClass);
            return;
        }
        
        let adminPanel = game.isAdmin ? `<div class="admin-panel"><b>👑 АДМИН</b><br><input id="aNick" class="admin-input" placeholder="Ник"><input id="aGold" class="admin-input" value="500"><button onclick="adminGiveGold()">💰</button><input id="aExp" class="admin-input" value="300"><button onclick="adminGiveExp()">✨</button><button onclick="adminReset()" style="background:#8b0000;">🗑️</button></div>` : "";
        
        let fightBlock = "";
        if(game.inCombat && game.enemy) {
            fightBlock = `<div class="card"><b>${game.enemy.icon} ${game.enemy.name}</b> ❤️ ${Math.floor(game.enemyHp)}/${game.enemy.hp}<br><button class="btn btn-primary" onclick="combatAttack()">⚔️ АТАКОВАТЬ</button><button class="btn" onclick="usePotion('weak')">💊 Зелье</button></div>`;
        }
        
        let locs = Object.entries(LOCATIONS).map(([k,l])=>`<div class="location-btn ${game.completed.includes(k)?'completed':''} ${game.level<l.levelReq && !game.isAdmin?'locked':''}" onclick="changeLocation('${k}')">${l.icon} ${l.name} ${game.completed.includes(k)?'✅':''}</div>`).join('');
        
        let tabs = ["game","inventory","tavern","craft","dungeon"];
        if(game.isAdmin) tabs.push("admin");
        let tabsHtml = `<div class="tabs">${tabs.map(t=>`<div class="tab-btn ${game.activeTab===t?'active':''}" data-tab="${t}">${t==="game"?"⚔️":t==="inventory"?"📦":t==="tavern"?"🍺":t==="craft"?"🔨":t==="dungeon"?"🏚️":"👑"} ${t==="dungeon"?"Подз":t}</div>`).join('')}</div>`;
        
        let contents = {
            game: `<div id="tab-game" class="tab-content ${game.activeTab==='game'?'active':''}">
                <div style="font-size:3rem; text-align:center;">${cls.icon}</div>
                <div class="stats-row"><span class="stat">❤️ ${Math.floor(s.hp)}/${s.maxHp}</span><span class="stat">⚔️ ${s.str}</span><span class="stat">🛡️ ${s.def}</span><span class="stat">⭐${game.level}</span><span class="stat">💰${game.gold}</span></div>
                <div><span>⚡ ${game.combatEnergy}/${game.maxCombatEnergy}</span><div class="energy-bar"><div class="energy-fill" style="width:${(game.combatEnergy/game.maxCombatEnergy)*100}%"></div></div></div>
                <div><span>🚶 ${game.travelEnergy}/${game.maxTravelEnergy}</span><div class="energy-bar"><div class="energy-fill travel" style="width:${(game.travelEnergy/game.maxTravelEnergy)*100}%"></div></div></div>
                <div class="fight-counter">🏆 ПОБЕД: ${game.monstersKilled}/${game.needKill}</div>
                <div style="display:flex; gap:5px;"><button class="btn" onclick="startFight()">⚔️ БОЙ</button><button class="btn ${game.autoFight?'btn-primary':''}" onclick="startAutoFight()">${game.autoFight?'🟢 АВТО':'🔴 АВТО'}</button><button class="btn" onclick="usePotion('weak')">💊 ЛЕЧИТЬ</button></div>
                ${game.monstersKilled>=game.needKill ? `<button class="btn btn-boss" onclick="startBossFight()">👑 БОСС</button>` : `<div style="background:#5a3e2e;text-align:center;padding:6px;border-radius:20px;">🔒 БОСС (нужно ${game.needKill-game.monstersKilled} побед)</div>`}
                <div class="location-grid">${locs}</div>
                ${fightBlock}
                <div class="message-log">💬 ${game.message}</div>
                ${adminPanel}
            </div>`,
            inventory: `<div id="tab-inventory" class="tab-content ${game.activeTab==='inventory'?'active':''}">
                <div class="card"><b>⚔️ ${game.weapon?.name}</b> +${game.weapon?.strBonus} силы</div>
                <div class="card"><b>🛡️ ${game.armor?.name}</b> +${game.armor?.defBonus} защиты</div>
                <div class="card"><b>💊 ЗЕЛЬЯ</b><br>🍃 Слабое x${game.potions.weak} <button class="btn" onclick="usePotion('weak')">Исп</button><br>🧪 Среднее x${game.potions.medium} <button class="btn" onclick="usePotion('medium')">Исп</button><br>💊 Мощное x${game.potions.strong} <button class="btn" onclick="usePotion('strong')">Исп</button></div>
                <div class="card"><b>📦 РЕСУРСЫ</b><br>${Object.entries(game.resources).map(([k,v])=>`${k}:${v}`).join(' | ') || "нет"}</div>
            </div>`,
            tavern: `<div id="tab-tavern" class="tab-content ${game.activeTab==='tavern'?'active':''}"><div class="card">🍺 ТАВЕРНА<br><button class="btn" onclick="if(game.gold>=250){game.gold-=250; game.travelEnergy=Math.min(game.maxTravelEnergy,game.travelEnergy+5); game.message='🍺 +5 энергии'; saveGame(); renderGame();}else game.message='❌ Нет золота!'; renderGame();">🍺 Купить эль (250💰) +5🚶</button></div></div>`,
            craft: `<div id="tab-craft" class="tab-content ${game.activeTab==='craft'?'active':''}"><div class="card">🔨 КРАФТ<br><button class="btn" onclick="if(game.resources.Трава>=1 && game.resources.Гриб>=1 && game.gold>=50){game.resources.Трава--; game.resources.Гриб--; game.gold-=50; game.potions.weak+=3; game.message='🍃 +3 слабых зелья'; saveGame(); renderGame();}else game.message='❌ Нужно: трава, гриб, 50💰'; renderGame();">🍃 Слабое зелье (трава+гриб+50💰)</button></div></div>`,
            dungeon: `<div id="tab-dungeon" class="tab-content ${game.activeTab==='dungeon'?'active':''}"><div class="card">🏚️ ПОДЗЕМЕЛЬЕ (${game.maxFloor}/1000)<br><input id="floorGo" type="number" value="${game.dungeonFloor}" style="width:80px;"><button class="btn" onclick="let f=parseInt(document.getElementById('floorGo').value); if(game.isAdmin || f<=game.maxFloor+10){game.dungeonFloor=Math.min(1000,Math.max(1,f)); if(f>game.maxFloor) game.maxFloor=f; game.message='📍 Переход на '+game.dungeonFloor+' этаж'; renderGame();}else game.message='❌ Нельзя!'; renderGame();">Перейти</button><button class="btn btn-primary" onclick="startDungeonFight()">⚔️ БОЙ (${game.dungeonFloor}эт)</button></div></div>`
        };
        if(game.isAdmin) contents.admin = `<div id="tab-admin" class="tab-content ${game.activeTab==='admin'?'active':''}"><div class="admin-panel"><b>👑 АДМИН</b><br><input id="aNick" placeholder="Ник"><input id="aGold" value="500"><button onclick="adminGiveGold()">💰</button><input id="aExp" value="300"><button onclick="adminGiveExp()">✨</button><button onclick="adminReset()">🗑️</button></div></div>`;
        
        container.innerHTML = tabsHtml + contents.game + contents.inventory + contents.tavern + contents.craft + contents.dungeon + (game.isAdmin ? contents.admin : "");
        
        document.querySelectorAll(".tab-btn").forEach(b=>{b.onclick=()=>{game.activeTab=b.dataset.tab; renderGame();};});
    }
    
    renderGame();
</script>
</body>
</html>
