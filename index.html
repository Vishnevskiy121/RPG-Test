    async function tgSaveData(key, data) {
        return new Promise((resolve) => {
            if (!tg || !tg.CloudStorage) {
                localStorage.setItem(key, data);
                resolve(true);
                return;
            }
            tg.CloudStorage.setItem(key, data, (err) => {
                if (err) console.error('Ошибка сохранения:', err);
                resolve(!err);
            });
        });
    }
    
    async function tgLoadData(key) {
        return new Promise((resolve) => {
            if (!tg || !tg.CloudStorage) {
                resolve(localStorage.getItem(key));
                return;
            }
            tg.CloudStorage.getItem(key, (err, value) => {
                if (err || !value) resolve(null);
                else resolve(value);
            });
        });
    }
    
    async function tgDeleteData(key) {
        return new Promise((resolve) => {
            if (!tg || !tg.CloudStorage) {
                localStorage.removeItem(key);
                resolve(true);
                return;
            }

    // ===================== ПРОВЕРКА АДМИНА =====================
    function isUserAdmin() {
        const currentUserId = tg.initDataUnsafe?.user?.id;
        const currentUsername = tg.initDataUnsafe?.user?.username;
        return (currentUserId === ADMIN_TELEGRAM_ID) || (currentUsername === ADMIN_USERNAME);
    }

    // ===================== СОХРАНЕНИЕ И ЗАГРУЗКА =====================
    async function saveProfile() {
        if (!game.profileName && !game.telegramId) return;
        const saveId = game.telegramId || game.profileName;
        const saveData = JSON.stringify(game);
        await tgSaveData(`rpg_${saveId}`, saveData);
    }

    async function loadProfile(id) {
        const raw = await tgLoadData(`rpg_${id}`);
        if (raw) {
            try {
                let data = JSON.parse(raw);
                Object.assign(game, data);
                game.isAdmin = isUserAdmin();
                game.initialized = true;
                game.message = `С возвращением, ${game.profileName}!`;
                renderGame();
                return true;
            } catch(e) { console.error(e); }
        }
        return false;
    }
    
    // ===================== СБРОС ПРОГРЕССА ИГРОКА =====================
    async function adminResetPlayer() {
        if (!isUserAdmin()) {
            game.message = "❌ У вас нет прав для этой операции!";
            renderGame();
            return;
        }
        
        const playerName = document.getElementById("adminResetName")?.value;
        if (!playerName || playerName.trim() === "") {
            game.message = "❌ Введите имя игрока для сброса!";
            renderGame();
            return;
        }
        
        if (confirm(`Вы уверены, что хотите полностью сбросить прогресс игрока "${playerName}"? Это действие необратимо!`)) {
            const saveId = playerName.trim();
            await tgDeleteData(`rpg_${saveId}`);
            game.message = `👑 Админ: прогресс игрока "${playerName}" полностью сброшен!`;
            renderGame();
        }
    }

    // ===================== ФУНКЦИИ ИГРЫ =====================
    function getTelegramId() {
        return tg.initDataUnsafe?.user?.id || null;

        if (!profileName.trim()) { alert("Введите имя героя!"); return false; }

        }
        
        game.profileName = profileName;

        game.gold = 500;

        game.maxCombatEnergy = 100;

        game.weapon = { name: "Ржавый меч", strBonus: 2, rarity: "common" };
        game.armor = { name: "Кожаная броня", defBonus: 2, rarity: "common" };
        game.inventory = [
            { name: "Ржавый меч", type: "weapon", strBonus: 2, rarity: "common" },
            { name: "Кожаная броня", type: "armor", defBonus: 2, rarity: "common" }
        ];
        game.resources = {

            "Медная руда": 0, "Железная руда": 0, "Мифриловая руда": 0,
            "Обычная древесина": 0, "Твёрдая древесина": 0, "Древесина мирового древа": 0,
            "Хлопковая ткань": 0, "Шёлковая ткань": 0, "Магическая ткань": 0,
            "Малый кристалл": 0, "Средний кристалл": 0, "Великий кристалл": 0
        };
        game.potions = { weak: 3, medium: 1, strong: 0 };
        game.location = "village";
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.isAdmin = isUserAdmin();
        game.message = `✨ Добро пожаловать, ${profileName}! ✨`;

    function getEnemy(enemyId, isDungeon = false, floor = 1) {
        let base = ENEMIES[enemyId];
        if (!base) return null;
        let levelBonus = Math.floor(game.level / 2);
        let dungeonBonus = isDungeon ? Math.floor(floor / 10) : 0;
        let dodgeChance = isDungeon && floor % 20 === 0 ? 15 : (isDungeon ? 10 : 5);
        return {
            name: base.name,
            hp: base.baseHp + levelBonus * 5 + dungeonBonus * 10,
            str: base.baseStr + levelBonus * 2 + dungeonBonus * 2,
            def: base.baseDef + levelBonus + dungeonBonus,
            exp: base.exp + levelBonus * 10 + dungeonBonus * 5,
            gold: base.gold + levelBonus * 5 + dungeonBonus * 10,
            icon: base.icon,
            id: enemyId,
            dodgeChance: dodgeChance,
            isBoss: (isDungeon && floor % 20 === 0)
        };
    }

    function getLocationEnemy() {
        let loc = LOCATIONS[game.location];
        if (!loc || loc.isDungeon) return null;
        let enemies = loc.enemies;
        if (!enemies || enemies.length === 0) return null;
        let enemyId = enemies[Math.floor(Math.random() * enemies.length)];
        return getEnemy(enemyId, false);
    }

    function getDungeonEnemy(floor) {
        let isBoss = (floor % 20 === 0);
        let bossNames = ["Дракон", "Лич", "Голем", "Титан", "Демон Бездны", "Кошмар", "Фантом", "Хаос"];
        if (isBoss) {
            let bossIndex = Math.floor(floor / 20) % bossNames.length;
            return {
                name: `👑 БОСС ${bossNames[bossIndex]} 👑`,
                hp: 100 + floor * 5 + game.level * 10,
                str: 30 + Math.floor(floor / 2) + game.level * 3,
                def: 20 + Math.floor(floor / 3) + game.level * 2,
                exp: 200 + floor * 5 + game.level * 30,
                gold: 200 + floor * 10,
                icon: "👑",
                id: `boss_${floor}`,
                isBoss: true,
                dodgeChance: 15
            };
        } else {
            let enemies = ["goblin", "skeleton", "orc", "troll", "demon", "ghost", "wolf", "spider"];
            let enemyId = enemies[floor % enemies.length];
            let base = ENEMIES[enemyId];
            let levelBonus = Math.floor(floor / 5) + Math.floor(game.level / 2);
            return {
                name: base.name,
                hp: base.baseHp + levelBonus * 4,
                str: base.baseStr + levelBonus * 2,
                def: base.baseDef + levelBonus,
                exp: base.exp + levelBonus * 8,
                gold: base.gold + levelBonus * 5,
                icon: base.icon,
                id: enemyId,
                isBoss: false,
                dodgeChance: 5
            };
        }
    }

    function getTotalDefense() {
        return (game.armor?.defBonus || 0) + (game.helmet?.defBonus || 0) + 
               (game.gloves?.defBonus || 0) + (game.boots?.defBonus || 0) + (game.cloak?.defBonus || 0);
    }

    function getTotalStrength() {
        return game.weapon?.strBonus || 2;
    }

    function getCurrentStats() {
        return {
            hp: game.combatEnergy,
            maxHp: game.maxCombatEnergy,
            str: 10 + game.level * 2 + getTotalStrength(),
            def: 5 + game.level + getTotalDefense()
        };
    }

    function spendTravelEnergy(cost) {
        if (game.travelEnergy >= cost) {
            game.travelEnergy -= cost;
            return true;
        }
        game.message = "❌ Недостаточно энергии для путешествий! Купи эль в таверне.";
        renderGame();
        return false;
    }

    function spendCombatEnergy(cost) {
        if (game.combatEnergy >= cost) {
            game.combatEnergy -= cost;
            return true;
        }
        game.message = "❌ Недостаточно боевой энергии! Со временем восстановится.";
        renderGame();
        return false;
    }

    function autoRestoreEnergy() {
        if (!game.initialized || game.inCombat) return;
        let restored = false;
        if (game.combatEnergy < game.maxCombatEnergy) {
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 1);
            restored = true;
        }
        if (game.travelEnergy < game.maxTravelEnergy) {
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 1);
            restored = true;
        }
        if (restored) {
            saveProfile();
            renderGame();
        }
    }

    setInterval(autoRestoreEnergy, 120000);

    async function gainExp(amount) {
        game.exp += amount;
        game.message += ` +${amount}✨`;
        while (game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxCombatEnergy += 5;
            game.maxTravelEnergy += 2;
            game.combatEnergy = game.maxCombatEnergy;
            game.travelEnergy = game.maxTravelEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` ✨ УРОВЕНЬ ${game.level}! ✨`;
            await saveProfile();
        }
        renderGame();
    }

    async function dropResources(enemy, isDungeon, floor) {
        let drops = [];
        drops.push(`${enemy.gold}💰`);
        
        if (isDungeon && floor >= 100 && enemy.isBoss) {
            if (Math.random() < 0.7) {
                let resources = ["Малая эссенция", "Средняя эссенция", "Великая эссенция", "Железная руда", "Мифриловая руда", "Твёрдая древесина", "Средний кристалл"];
                let res = resources[Math.floor(Math.random() * resources.length)];
                game.resources[res] = (game.resources[res] || 0) + 1;
                drops.push(`📦 ${res}`);
            }
        }
        
        if (Math.random() < 0.25) {
            game.resources["Целебная трава"] = (game.resources["Целебная трава"] || 0) + 1;
            drops.push(`🌿 Целебная трава`);
        }
        if (Math.random() < 0.15) {
            game.resources["Магический гриб"] = (game.resources["Магический гриб"] || 0) + 1;
            drops.push(`🍄 Магический гриб`);
        }
        if (isDungeon && floor >= 50 && Math.random() < 0.08) {
            game.resources["Мифический цветок"] = (game.resources["Мифический цветок"] || 0) + 1;
            drops.push(`🌸 Мифический цветок`);
        }
        
        if (Math.random() < 0.2) {
            game.potions.weak = (game.potions.weak || 0) + 1;
            drops.push(`🧪 Слабое зелье`);
        }
        if (Math.random() < 0.1) {
            game.potions.medium = (game.potions.medium || 0) + 1;
            drops.push(`🧪 Среднее зелье`);
        }
        if (isDungeon && floor >= 100 && Math.random() < 0.05) {
            game.potions.strong = (game.potions.strong || 0) + 1;
            drops.push(`🧪 Мощное зелье`);
        }
        
        if (drops.length > 0) game.message += ` + ${drops.join(", ")}`;
        await saveProfile();
    }

    async function combatAction(action) {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        let stats = getCurrentStats();
        
        if (game.enemyCurrentHp <= 0) {
            let rewardGold = enemy.gold;
            game.gold += rewardGold;
            await gainExp(enemy.exp);
            await dropResources(enemy, game.location === "dungeon", game.dungeonFloor);
            
            let energyBack = 5;
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + energyBack);
            game.message = `🏆 Победа! +${rewardGold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            if (game.location === "dungeon") {
                game.dungeonFloor++;
                if (game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            if (game.combatEnergy < 0) game.combatEnergy = 0;
            await saveProfile();
            renderGame();
            return;
        }
        
        if (stats.hp <= 0) {
            let energyBack = 2;
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + energyBack);
            game.message = `💀 Поражение... Возвращено ${energyBack}⚡ боевой энергии`;
            game.inCombat = false;
            renderGame();
            return;
        }
        
        if (action === "use_potion") {
            let potionUsed = false;
            if (game.potions.strong > 0) {
                let heal = 50;
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + heal);
                game.potions.strong--;
                game.message = `💊 Мощное зелье +${heal} HP! Осталось: ${game.potions.strong}`;
                potionUsed = true;
            } else if (game.potions.medium > 0) {
                let heal = 25;
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + heal);
                game.potions.medium--;
                game.message = `🧪 Среднее зелье +${heal} HP! Осталось: ${game.potions.medium}`;
                potionUsed = true;
            } else if (game.potions.weak > 0) {
                let heal = 10;
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + heal);
                game.potions.weak--;
                game.message = `🍃 Слабое зелье +${heal} HP! Осталось: ${game.potions.weak}`;
                potionUsed = true;
            } else {
                game.message = "❌ Нет зелий!";
                renderGame();
                return;
            }
            
            if (potionUsed) {
                let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                let dodgeChance = Math.random() * 100;
                if (dodgeChance < game.isAdmin ? 20 : 10) {
                    game.message += ` ✨ Уворот! Враг промахнулся!`;
                    setAnimation("dodge");
                } else {
                    game.combatEnergy -= enemyDmg;
                    game.message += ` | Враг атакует → -${Math.floor(enemyDmg)} HP`;
                    if (game.combatEnergy < 0) game.combatEnergy = 0;
                }
            }
            await saveProfile();
            renderGame();
            return;
        }
        
        if (action === "attack") {
            let dodgeChance = Math.random() * 100;
            if (dodgeChance < enemy.dodgeChance) {
                game.message = `✨ ${enemy.name} увернулся от атаки! ✨`;
                setAnimation("dodge");
                await saveProfile();
                renderGame();
                return;
            }
            
            let dmg = Math.max(1, stats.str + Math.floor(Math.random() * 8) - enemy.def);
            game.enemyCurrentHp -= dmg;
            game.message = `⚡ Урон ${Math.floor(dmg)} по ${enemy.name}`;
            setAnimation("attack");
            
            let enemyDodge = Math.random() * 100;
            if (enemyDodge < 10) {
                game.message += ` ✨ Ты увернулся от атаки врага! ✨`;
                setAnimation("dodge");
            } else {
                let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                game.combatEnergy -= enemyDmg;
                game.message += ` | Враг атакует → -${Math.floor(enemyDmg)} HP`;
                if (game.combatEnergy < 0) game.combatEnergy = 0;
            }
            await saveProfile();
            renderGame();
            return;
        }
        
        await saveProfile();
        renderGame();
    }

    function startLocationFight() {
        let enemy = getLocationEnemy();
        if (enemy && spendCombatEnergy(10)) {
            game.inCombat = true;
            game.combatEnemy = enemy;
            game.enemyCurrentHp = enemy.hp;
            game.message = `⚔️ БОЙ: ${enemy.icon} ${enemy.name} (❤️ ${enemy.hp} / ⚔️ ${enemy.str})`;
            renderGame();
        } else if (!enemy) {
            game.message = "❌ Здесь нет врагов!";
            renderGame();
        }
    }

    function startDungeonFight() {
        if (game.dungeonFloor > 1000) {
            game.message = "🎉 Поздравляю! Ты прошёл всё подземелье из 1000 этажей!";
            renderGame();
            return;
        }
        let enemy = getDungeonEnemy(game.dungeonFloor);
        if (spendCombatEnergy(10)) {
            game.inCombat = true;
            game.combatEnemy = enemy;
            game.enemyCurrentHp = enemy.hp;
            game.message = `⚔️ БОЙ: ${enemy.icon} ${enemy.name} (❤️ ${enemy.hp} / ⚔️ ${enemy.str})${enemy.isBoss ? " 🏆 БОСС 🏆" : ""}`;
            renderGame();
        }
    }

    function goToFloor(floor) {
        floor = Math.min(1000, Math.max(1, floor));
        if (game.isAdmin) {
            game.dungeonFloor = floor;
            if (floor > game.maxUnlockedFloor) game.maxUnlockedFloor = floor;
            game.message = `👑 Админ: переход на ${floor} этаж`;
            renderGame();
            return;
        }
        if (floor <= game.maxUnlockedFloor) {
            game.dungeonFloor = floor;
            game.message = `📍 Переход на ${floor} этаж`;
            renderGame();
        } else {
            game.message = `❌ Нельзя перейти на ${floor} этаж! Ты прошёл только ${game.maxUnlockedFloor}.`;
            renderGame();
        }
    }

    function changeLocation(locKey) {
        let loc = LOCATIONS[locKey];
        if (!loc) return;
        if (game.level < loc.requiredLevel && !game.isAdmin) {
            game.message = `❌ Требуется ${loc.requiredLevel} уровень для посещения ${loc.name}!`;
            renderGame();
            return;
        }
        if (spendTravelEnergy(loc.energyCost)) {
            game.location = locKey;
            game.message = `🚶 Переход в ${loc.name} (-${loc.energyCost} энергии)`;
            renderGame();
        }
    }

    async function buyItem(item) {
        if (game.gold >= item.price) {
            game.gold -= item.price;
            game.inventory.push({ ...item });
            game.message = `✅ Вы купили ${item.name} за ${item.price}💰!`;
            if (item.type === "weapon") game.weapon = { name: item.name, strBonus: item.strBonus, rarity: item.rarity };
            if (item.type === "armor") game.armor = { name: item.name, defBonus: item.defBonus, rarity: item.rarity };
            await saveProfile();
            renderGame();
        } else {
            game.message = `❌ Не хватает ${item.price - game.gold}💰 для покупки ${item.name}!`;
            renderGame();
        }
    }

    async function craftPotion(type) {
        if (type === "weak" && game.resources["Целебная трава"] >= 1 && game.resources["Магический гриб"] >= 1 && game.gold >= 50) {
            game.resources["Целебная трава"]--;
            game.resources["Магический гриб"]--;
            game.gold -= 50;
            game.potions.weak += 3;
            game.message = "🍃 Скрафчено 3 слабых зелья! (+10 HP каждое)";
        } else if (type === "medium" && game.resources["Целебная трава"] >= 2 && game.resources["Магический гриб"] >= 2 && game.resources["Мифический цветок"] >= 1 && game.gold >= 150) {
            game.resources["Целебная трава"] -= 2;
            game.resources["Магический гриб"] -= 2;
            game.resources["Мифический цветок"]--;
            game.gold -= 150;
            game.potions.medium += 3;
            game.message = "🌿 Скрафчено 3 средних зелья! (+25 HP каждое)";
        } else if (type === "strong" && game.resources["Целебная трава"] >= 3 && game.resources["Магический гриб"] >= 3 && game.resources["Мифический цветок"] >= 2 && game.gold >= 300) {
            game.resources["Целебная трава"] -= 3;
            game.resources["Магический гриб"] -= 3;
            game.resources["Мифический цветок"] -= 2;
            game.gold -= 300;
            game.potions.strong += 3;
            game.message = "🌸 Скрафчено 3 мощных зелья! (+50 HP каждое)";
        } else {
            game.message = "❌ Не хватает ресурсов для крафта зелий! Нужны: трава, грибы, цветы.";
        }
        await saveProfile();
        renderGame();
    }

    async function equipItem(item, slot) {
        if (item.type === "weapon") game.weapon = item;
        if (item.type === "armor") game.armor = item;
        if (slot === "helmet") game.helmet = item;
        if (slot === "gloves") game.gloves = item;
        if (slot === "boots") game.boots = item;
        if (slot === "cloak") game.cloak = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        await saveProfile();
        renderGame();
    }

    function startDialog(npc) {
        let dialogHtml = `
            <div class="dialog-overlay" id="dialogOverlay">
                <div class="dialog-window">
                    <div class="dialog-header">
                        <div class="npc-avatar">${npc.avatar}</div>
                        <div class="npc-name">${npc.name} ${npc.icon}</div>
                    </div>
                    <div class="dialog-body">
                        <div class="dialog-text">
                            ${npc.type === "blacksmith" ? "Здравствуй, путник! Я кузнец Гром. Могу продать тебе оружие и броню. Легендарные предметы стоят 500 000 золота!" :
                              npc.type === "alchemist" ? "Я Алхимик Морган. Могу скрафтить зелья из трав, грибов и цветов. Крафт 3 зелий стоит 50-300 монет + ресурсы!" :
                              npc.type === "tavern" ? "Добро пожаловать в таверну! Могу продать эль за 250 монет (+5 энергии путешествий)" :
                              npc.type === "crafter" ? "Я Мастер крафта. Собирай ресурсы с боссов 100+ этажа и создавай мифическое оружие!" :
                              "Приветствую, странник! Исследуй подземелье, сражайся с боссами и становись сильнее!"}
                        </div>
                    </div>
                    <div class="dialog-footer">
                        <div class="dialog-buttons">
                            ${npc.type === "blacksmith" ? npc.items.map(item => `<button class="dialog-btn" onclick="buyItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">${item.name} - ${item.price}💰</button>`).join('') : ""}
                            ${npc.type === "alchemist" ? `<button class="dialog-btn" onclick="craftPotion('weak')">🍃 Слабое зелье (3 шт) - 50💰 + трава + гриб</button>
                                                         <button class="dialog-btn" onclick="craftPotion('medium')">🌿 Среднее зелье (3 шт) - 150💰 + 2 травы + 2 гриба + цветок</button>
                                                         <button class="dialog-btn" onclick="craftPotion('strong')">🌸 Мощное зелье (3 шт) - 300💰 + 3 травы + 3 гриба + 2 цветка</button>` : ""}
                            ${npc.type === "tavern" ? `<button class="dialog-btn" onclick="buyEnergy()">🍺 Купить эль за 250💰 (+5 энергии)</button>` : ""}
                            <button class="dialog-btn dialog-close" onclick="closeDialog()">🚪 Закрыть</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', dialogHtml);
    }

    async function buyEnergy() {
        if (game.gold >= 250) {
            game.gold -= 250;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 5);
            game.message = "🍺 Вы выпили эль! +5 энергии путешествий!";
            await saveProfile();
            renderGame();
            closeDialog();
        } else {
            game.message = "❌ Не хватает 250 золота на эль!";
            renderGame();
        }
    }

    function closeDialog() {
        document.getElementById("dialogOverlay")?.remove();
    }

    async function adminAddGold(amount) {
        if (game.isAdmin) {
            game.gold += amount;
            game.message = `👑 Админ: +${amount} золота`;
            await saveProfile();
            renderGame();
        }
    }

    async function adminAddExp(amount) {
        if (game.isAdmin) await gainExp(amount);
    }

    async function adminHeal() {
        if (game.isAdmin) {
            game.combatEnergy = game.maxCombatEnergy;
            game.travelEnergy = game.maxTravelEnergy;
            game.message = "👑 Админ: полное исцеление";
            renderGame();
        }
    }

    async function adminAddFloor() {
        if (game.isAdmin) {
            game.dungeonFloor = Math.min(1000, game.dungeonFloor + 10);
            game.maxUnlockedFloor = Math.max(game.maxUnlockedFloor, game.dungeonFloor);
            game.message = `👑 Админ: +10 этажей (${game.dungeonFloor}/1000)`;
            renderGame();
        }
    }

    async function adminGiveItem() {
        if (!game.isAdmin) return;
        let itemName = document.getElementById("adminItemName")?.value;
        let itemType = document.getElementById("adminItemType")?.value;
        let itemBonus = parseInt(document.getElementById("adminItemBonus")?.value);
        if (itemName) {
            let item = { name: itemName, type: itemType, strBonus: itemBonus, defBonus: itemBonus, rarity: "mythic" };
            game.inventory.push(item);
            game.message = `👑 Админ: выдал ${itemName}`;
            await saveProfile();
            renderGame();
        }
    }

    function setAnimation(anim) {
        game.animationState = anim;
        let spriteDiv = document.getElementById("characterSprite");
        if (spriteDiv) {
            let emoji = "⚔️";
            spriteDiv.innerHTML = `<div class="character-${anim}">${emoji}</div>`;
        }
        if (anim === "attack") setTimeout(() => {
            if (game.animationState === "attack") setAnimation(game.isRunning ? "running" : "idle");
        }, 200);
        if (anim === "dodge") setTimeout(() => {
            if (game.animationState === "dodge") setAnimation(game.isRunning ? "running" : "idle");
        }, 200);
    }

            if (isUserAdmin()) {
                game.isAdmin = !game.isAdmin;
                game.message = game.isAdmin ? "👑 Режим администратора ВКЛЮЧЁН" : "👑 Режим администратора ВЫКЛЮЧЁН";
                saveProfile();
                renderGame();
            }
        });
        
        document.getElementById("resetBtn")?.addEventListener("click", async () => {
            const saveId = game.telegramId || game.profileName;
            await tgDeleteData(`rpg_${saveId}`);
            game.initialized = false;
            renderGame();
        });
        
        setAnimation(game.animationState);
    }
    
    window.changeLocation = changeLocation;
    window.startDialog = startDialog;
    window.buyItem = buyItem;
    window.craftPotion = craftPotion;
    window.buyEnergy = buyEnergy;
    window.closeDialog = closeDialog;
    window.adminAddGold = adminAddGold;
    window.adminAddExp = adminAddExp;
    window.adminHeal = adminHeal;
    window.adminAddFloor = adminAddFloor;
    window.adminGiveItem = adminGiveItem;
    window.adminResetPlayer = adminResetPlayer;
    window.equipItem = equipItem;
    
    tg.ready();
    renderGame();
</script>
</body>
</html>
