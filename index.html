        .item-card { background: #2a2438; padding: 8px; border-radius: 16px; font-size: 0.7rem; margin: 4px; cursor: pointer; text-align: center; }
        .button-group { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }

    // Функция рандомного монстра для локации
    function getMonsterForLocation(locationKey) {
        const monstersList = LOCATION_MONSTERS[locationKey] || LOCATION_MONSTERS.village;
        const monsterName = monstersList[Math.floor(Math.random() * monstersList.length)];
        let base = MONSTERS_BASE.find(m => m.name === monsterName);
        if (!base) base = {name:monsterName,hp:50,str:15,exp:80,gold:60,icon:"👾"};
        let monster = JSON.parse(JSON.stringify(base));
        let multiplier = 1 + (game.level / 200);
        let bonus = Math.floor(game.level / 5);
        monster.hp = Math.floor(monster.hp * multiplier) + bonus * 5;
        monster.str = Math.floor(monster.str * multiplier) + bonus * 2;
        monster.exp = Math.floor(monster.exp * multiplier) + bonus * 10;
        monster.gold = Math.floor(monster.gold * multiplier) + bonus * 15;
        
        // Повторное прохождение локации - монстры сильнее
        if (game.completedLocations.includes(locationKey)) {
            monster.hp = Math.floor(monster.hp * 1.3);
            monster.str = Math.floor(monster.str * 1.2);
            monster.exp = Math.floor(monster.exp * 1.2);
            monster.gold = Math.floor(monster.gold * 1.2);
        }
        return monster;
    }
    
    function getBossForLocation(locationKey) {
        let boss = JSON.parse(JSON.stringify(LOCATION_BOSSES[locationKey]));
        let multiplier = 1 + (game.level / 250);
        boss.hp = Math.floor(boss.hp * multiplier) + Math.floor(game.level * 4);
        boss.str = Math.floor(boss.str * multiplier) + Math.floor(game.level * 2);
        boss.exp = Math.floor(boss.exp * multiplier) + Math.floor(game.level * 15);
        boss.gold = Math.floor(boss.gold * multiplier) + Math.floor(game.level * 20);
        boss.name = boss.name;
        boss.icon = "👑";
        boss.isBoss = true;
        
        if (game.completedLocations.includes(locationKey)) {
            boss.hp = Math.floor(boss.hp * 1.5);
            boss.str = Math.floor(boss.str * 1.3);
            boss.exp = Math.floor(boss.exp * 1.2);
            boss.gold = Math.floor(boss.gold * 1.15);
        }
        return boss;
    }
    
    function getStrength() {
        let cls = CLASSES[game.class];
        let bonus = 12 + game.level * 2;
        if (game.weapon) bonus += game.weapon.strBonus;
        if (cls) bonus += cls.strBonus;
        return bonus;
    }
    
    function getDefense() {
        let cls = CLASSES[game.class];
        let bonus = 5 + game.level;
        if (game.armor) bonus += game.armor.defBonus;
        if (cls && cls.defBonus) bonus += cls.defBonus;
        return Math.max(2, bonus);
    }
    
    function getCritChance() {
        let cls = CLASSES[game.class];
        let base = 6;
        if (cls) base += cls.crit;
        return Math.min(40, base);
    }
    
    function getDodgeChance() {
        let cls = CLASSES[game.class];
        let base = 5;
        if (cls) base += cls.dodge;
        return Math.min(35, base);
    }
    
    function addExp(amt) {
        game.exp += amt;
        game.message += " +" + amt + " ✨";
        while (game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxHp += 12;
            game.hp = game.maxHp;
            game.maxTravelEnergy += 2;
            game.travelEnergy = game.maxTravelEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.18);
            game.message += ` 🎉 УРОВЕНЬ ${game.level}! 🎉`;
        }
        saveGame();
        renderGame();
    }
    
    function saveGame() {
        if (game.profileName) {
            let saveData = JSON.parse(JSON.stringify(game));
            saveData.message = "";
            localStorage.setItem("rpg_mega_" + game.profileName, JSON.stringify(saveData));
        }
    }
    
    function attack() {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        let strength = getStrength();
        let dodgeChance = getDodgeChance();
        if (Math.random() * 100 < dodgeChance) {
            game.message = `🌀 УВОРОТ! Вы избежали атаки!`;
            renderGame();
            return;
        }
        let critChance = getCritChance();
        let isCrit = Math.random() * 100 < critChance;
        let damage = Math.max(5, strength + Math.floor(Math.random() * 18) - 5);
        if (isCrit) {
            damage = Math.floor(damage * 1.6);
            game.message += ` 💥 КРИТ!`;
        }
        game.enemyCurrentHp -= damage;
        game.message = `⚔️ Урон ${damage} по ${enemy.name}!`;
        if (game.enemyCurrentHp <= 0) {
            let energyBack = enemy.isBoss ? 20 : 8;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + energyBack);
            game.gold += enemy.gold;
            addExp(enemy.exp);
            if (!enemy.isBoss) game.monstersKilled++;
            else game.monstersKilled = 0;
            game.hp = Math.min(game.maxHp, game.hp + (enemy.isBoss ? 25 : 10));
            game.message += ` 🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            // Дроп ресурсов с подземелья
            if (game.location === "dungeon") {
                game.dungeonFloor++;
                if (game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
                game.message += ` 📈 Этаж ${game.dungeonFloor}!`;
                // Дроп ресурсов для крафта
                if (game.dungeonFloor >= 300) {
                    if (Math.random() < 0.3) {
                        let rareRes = RESOURCES.filter(r => ["Искра богов","Сердце демона","Звездная пыль","Кость великана","Мифический цветок"].includes(r));
                        if (rareRes.length) {
                            let res = rareRes[Math.floor(Math.random() * rareRes.length)];
                            game.resources[res] = (game.resources[res] || 0) + 1;
                            game.message += ` 💎 Мифический ресурс: ${res}!`;
                        }
                    }
                }
                if (Math.random() < 0.4) {
                    let commonRes = RESOURCES[Math.floor(Math.random() * RESOURCES.length)];
                    game.resources[commonRes] = (game.resources[commonRes] || 0) + Math.floor(Math.random() * 2) + 1;
                    game.message += ` 📦 +${commonRes}`;
                }
                if (game.dungeonFloor > 1000) game.dungeonFloor = 1000;
            } else {
                if (Math.random() < 0.3) {
                    let res = RESOURCES[Math.floor(Math.random() * RESOURCES.length)];
                    game.resources[res] = (game.resources[res] || 0) + 1;
                    game.message += ` 🌿 +${res}`;
                }
            }
            
            if (enemy.isBoss && game.completedLocations.indexOf(game.location) === -1 && game.location !== "dungeon") {
                game.completedLocations.push(game.location);
                game.message += ` 🎉 Локация пройдена!`;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            saveGame();
            renderGame();
            return;
        }
        let playerDef = getDefense();
        let enemyDamage = Math.max(4, enemy.str + Math.floor(Math.random() * 12) - playerDef);
        game.hp -= enemyDamage;
        game.message += ` 😡 ${enemy.name} нанёс ${enemyDamage} урона!`;
        if (game.hp <= 0) {
            game.hp = Math.floor(game.maxHp * 0.5);
            game.message = ` 💀 Вы погибли! Восстановлено 50% HP.`;
            game.inCombat = false;
            game.combatEnemy = null;
            saveGame();
            renderGame();
            return;
        }
        saveGame();
        renderGame();
    }
    
    function startFight() {
        if (game.hp < 15) {
            game.message = "❌ Мало HP, восстановитесь!";
            renderGame();
            return;
        }
        if (game.location !== "dungeon" && game.monstersKilled >= game.needToKill) {
            let boss = getBossForLocation(game.location);
            game.inCombat = true;
            game.combatEnemy = boss;
            game.enemyCurrentHp = boss.hp;
            game.message = `⚔️ БОЙ С БОССОМ! ${boss.icon} ${boss.name} ⚔️`;
            renderGame();
            return;
        }
        let enemy = (game.location === "dungeon") ? 
            (game.dungeonFloor % 20 === 0 ? getBossForLocation("throne") : getMonsterForLocation("dungeon")) : 
            getMonsterForLocation(game.location);
        if (!enemy) {
            game.message = "❌ Нет врага";
            renderGame();
            return;
        }
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ БОЙ! ${enemy.icon || "👾"} ${enemy.name} ⚔️`;
        renderGame();
    }
    
    function changeLocation(key) {
        let loc = LOCATIONS[key];
        if (!loc) return;
        if (game.level < loc.levelReq) {
            game.message = `❌ Нужен ${loc.levelReq} уровень!`;
            renderGame();
            return;
        }
        let energyCost = loc.energyCost;
        if (game.travelEnergy < energyCost) {
            game.message = `❌ Нужно ${energyCost} энергии!`;
            renderGame();
            return;
        }
        game.travelEnergy -= energyCost;
        game.location = key;
        game.monstersKilled = (game.completedLocations.indexOf(key) !== -1 && key !== "dungeon") ? game.needToKill : 0;
        game.message = `🚶 Переход в ${loc.name}`;
        saveGame();
        renderGame();
    }
    
    function usePotion() {
        if (game.gold < 150) {
            game.message = "💰 Нужно 150 золота!";
            renderGame();
            return;
        }
        game.gold -= 150;
        game.hp = Math.min(game.maxHp, game.hp + 60);
        game.message = "🧪 +60 HP";
        saveGame();
        renderGame();
    }
    
    function restoreEnergy() {
        if (game.gold < 100) {
            game.message = "💰 Нужно 100 золота!";
            return;
        }
        game.gold -= 100;
        game.travelEnergy = game.maxTravelEnergy;
        game.message = "⚡ Энергия восстановлена!";
        saveGame();
        renderGame();
    }
    
    function craftItem(item) {
        if (!item.craftCost) return;
        let canCraft = true;
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") {
                if (game.gold < amount) canCraft = false;
                continue;
            }
            if ((game.resources[res] || 0) < amount) canCraft = false;
        }
        if (!canCraft) {
            game.message = "❌ Не хватает ресурсов для крафта!";
            renderGame();
            return;
        }
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") {
                game.gold -= amount;
            } else {
                game.resources[res] -= amount;
            }
        }
        let newItem = JSON.parse(JSON.stringify(item));
        game.inventory.push(newItem);
        game.craftCount++;
        game.message = `🔨 Вы скрафтили ${item.name}!`;
        saveGame();
        renderGame();
    }
    
    function equipItem(item) {
        if (item.type === "weapon") game.weapon = item;
        else if (item.type === "armor") game.armor = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        saveGame();
        renderGame();
    }
    
    function resetGame() {
        if (confirm("Сбросить весь прогресс? Все данные будут потеряны!")) {
            if (game.profileName) localStorage.removeItem("rpg_mega_" + game.profileName);
            game.initialized = false;
            renderGame();
        }
    }
    
    function exitDungeon() {
        game.location = "village";
        game.message = "🏡 Вышли из подземелья";
        saveGame();
        renderGame();
    }
    
    function takeQuest(quest) {
        if (game.activeQuests.some(q => q.id === quest.id)) {
            game.message = "❌ Вы уже взяли этот квест!";
            renderGame();
            return;
        }
        let newQuest = JSON.parse(JSON.stringify(quest));
        newQuest.progress = 0;
        game.activeQuests.push(newQuest);
        game.message = `📜 Взят квест: ${quest.name}!`;
        renderGame();
    }
    
    function createCharacter(name, cls) {
        if (!name.trim()) return;
        let c = CLASSES[cls];
        game.profileName = name;
        game.class = cls;
        game.gold = 5000;
        game.level = 1;
        game.exp = 0;
        game.expToNext = 100;
        game.maxHp = 95 + (c.hpBonus || 0);
        game.hp = game.maxHp;
        game.travelEnergy = 55;
        game.maxTravelEnergy = 55;
        game.monstersKilled = 0;
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.completedLocations = [];
        game.craftCount = 0;
        game.activeQuests = [];
        game.resources = {};
        for (let r of RESOURCES) game.resources[r] = Math.floor(Math.random() * 3);
        game.resources["Целебная трава"] = 5;
        game.resources["Железная руда"] = 3;
        game.weapon = { name: c.weapon, type: "weapon", strBonus: c.strBonus, price: 0, rarity: "common" };
        game.armor = { name: "Кожаный доспех", type: "armor", defBonus: 5, price: 150, rarity: "common" };
        game.inventory = [game.weapon, game.armor];
        game.message = `✨ Добро пожаловать, ${name} ${c.name}!`;
        game.initialized = true;
        saveGame();
        renderGame();
    }
    
    function renderGame() {
        let container = document.getElementById("rpgGame");
        if (!container) return;
        if (!game.initialized) {
            let selected = "warrior";
            let clsHtml = `<div class="class-selector" id="classSel">` +
                Object.keys(CLASSES).map(k => `<div class="class-option ${selected === k ? 'selected' : ''}" data-class="${k}">${CLASSES[k].icon} ${CLASSES[k].name}<br><span style="font-size:0.6rem;">⚔️ ${CLASSES[k].strBonus} 💪 ${CLASSES[k].hpBonus}</span></div>`).join('') +
                `</div><input id="pname" placeholder="Имя героя"><button id="createBtn" style="background:#f7d44a;">🚀 НАЧАТЬ</button>`;
            container.innerHTML = clsHtml;
            document.getElementById("createBtn").onclick = () => createCharacter(document.getElementById("pname").value, selected);
            document.querySelectorAll(".class-option").forEach(el => {
                el.onclick = function () {
                    document.querySelectorAll(".class-option").forEach(c => c.classList.remove("selected"));
                    this.classList.add("selected");
                    selected = this.dataset.class;
                };
            });
            return;
        }
        
        let cls = CLASSES[game.class];
        let hpPerc = game.hp / game.maxHp * 100;
        let travPerc = game.travelEnergy / game.maxTravelEnergy * 100;
        let locsHtml = Object.keys(LOCATIONS).map(k => {
            let l = LOCATIONS[k];
            let locked = game.level < l.levelReq;
            return `<button class="location-btn ${locked ? 'locked' : ''} ${game.completedLocations.includes(k) ? 'completed' : ''}" onclick="changeLocation('${k}')" ${locked ? 'disabled' : ''}>${l.icon} ${l.name}<br><span style="font-size:0.6rem;">${l.levelReq}ур</span></button>`;
        }).join('');
        
        let fightBlock = game.inCombat ? `<div class="fight-block"><div>${game.combatEnemy.icon || "👾"} ${game.combatEnemy.name}</div><div>❤️ ${Math.max(0, game.enemyCurrentHp)}/${game.combatEnemy.hp}</div><button id="attackBtn" style="background:#8b3c2c;">⚔️ АТАКОВАТЬ</button></div>` : '';
        
        // Кузнец - продажа легендарного оружия
        let legendaryWeapons = WEAPONS.filter(w => w.rarity === "legendary" && !w.craftOnly);
        let smithHtml = `<div style="margin:12px 0;"><b>⚒️ КУЗНЕЦ БРОНИСЛАВ</b><p>Путник, нужен острый клинок? Выбирай!</p>`;
        legendaryWeapons.forEach(w => {
            smithHtml += `<div class="shop-item"><span class="rarity-legendary">✨ ${w.name}</span> +${w.strBonus} силы <button onclick="if(game.gold>=${w.price}){game.gold-=${w.price}; equipItem({name:'${w.name}',type:'weapon',strBonus:${w.strBonus},price:${w.price},rarity:'${w.rarity}'}); renderGame();}else alert('Мало золота')">${w.price}💰</button></div>`;
        });
        smithHtml += `<hr><b>🔨 КРАФТ У КУЗНЕЦА</b>`;
        let craftableItems = [...WEAPONS.filter(w => w.craftOnly), ...ARMORS.filter(a => a.craftOnly)];
        craftableItems.forEach(item => {
            let reqStr = Object.entries(item.craftCost).map(([r, a]) => `${r}: ${a}`).join(", ");
            smithHtml += `<div class="craft-item"><div><b>${item.name}</b> +${item.strBonus || item.defBonus}<br><span style="font-size:0.65rem;">${reqStr}</span></div><button onclick="craftItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">СКРАФТИТЬ</button></div>`;
        });
        smithHtml += `</div>`;
        
        // Алхимик
        let alchemistHtml = `<div style="margin:12px 0;"><b>🧪 АЛХИМИК МЕЛИССА</b><p>Снадобья, зелья - всё для твоего пути!</p>
        <div class="shop-item">🧴 Лечебное зелье (+60 HP) <button onclick="usePotion()">150💰</button></div>
        <div class="shop-item">⚡ Энергетический эликсир <button onclick="restoreEnergy()">100💰</button></div>
        <div class="shop-item">🌿 Целебная трава (ресурс) <button onclick="if(game.gold>=50){game.gold-=50; game.resources['Целебная трава']=(game.resources['Целебная трава']||0)+1; game.message='🌿 Куплена трава'; renderGame();}else alert('Мало золота')">50💰</button></div>
        <div class="shop-item">💎 Железная руда <button onclick="if(game.gold>=80){game.gold-=80; game.resources['Железная руда']=(game.resources['Железная руда']||0)+1; renderGame();}else alert('Мало золота')">80💰</button></div>
        <div class="shop-item">✨ Малая эссенция <button onclick="if(game.gold>=200){game.gold-=200; game.resources['Малая эссенция']=(game.resources['Малая эссенция']||0)+1; renderGame();}else alert('Мало золота')">200💰</button></div>
        </div>`;
        
        // Трактирщик - квесты
        let tavernHtml = `<div style="margin:12px 0;"><b>🍺 ТРАКТИРЩИК ГРОМ</b><p>Что привело тебя, путник? Хочешь заработать?</p>`;
        AVAILABLE_QUESTS.forEach(q => {
            let taken = game.activeQuests.some(aq => aq.id === q.id);
            tavernHtml += `<div class="quest-item"><div><b>${q.name}</b><br><span style="font-size:0.65rem;">${q.desc} | Награда: ${q.reward.gold}💰 ${q.reward.exp}✨</span></div>
            ${!taken ? `<button onclick="takeQuest(${JSON.stringify(q).replace(/"/g, '&quot;')})">ВЗЯТЬ</button>` : `<span style="color:#4cff4c;">✓ Взято</span>`}</div>`;
        });
        tavernHtml += `<hr><button onclick="game.message='🍺 Гром: ' + ['Хорошего дня, ' + game.profileName + '!', 'Осторожнее в пути!', 'Заходи ещё!', 'Боги да благословят тебя!'][Math.floor(Math.random()*4)]; renderGame()">💬 Поболтать</button></div>`;
        
        let invHtml = game.inventory.map((it, idx) => `<div class="item-card" onclick="equipItem(${JSON.stringify(it).replace(/"/g, '&quot;')})"><span class="rarity-${it.rarity || 'common'}">${it.type === "weapon" ? "⚔️" : "🛡️"} ${it.name} +${it.strBonus || it.defBonus}</span></div>`).join('');
        let resHtml = Object.entries(game.resources).filter(([k, v]) => v > 0).map(([r, v]) => `${r}: ${v}`).join(' | ');
        
        let adminBlock = isAdmin ? `<div class="admin-panel" style="background:#1a1a2a; border-radius:24px; padding:12px; margin-top:12px; border:1px solid red;">
            <b>👑 АДМИН ПАНЕЛЬ</b><br>
            <button onclick="game.gold+=100000; saveGame(); renderGame();">💰 +100k золота</button>
            <button onclick="addExp(5000)">✨ +5000 опыта</button>
            <button onclick="game.travelEnergy=game.maxTravelEnergy; saveGame(); renderGame();">⚡ Восст. энергию</button>
            <button onclick="game.dungeonFloor+=50; saveGame(); renderGame();">📈 +50 этажей</button>
            <button onclick="for(let r of ['Искра богов','Сердце демона','Звездная пыль','Мифический цветок']){game.resources[r]=(game.resources[r]||0)+10;} saveGame(); renderGame();">💎 Миф. ресурсы +10</button>
        </div>` : '';
        
        container.innerHTML = `
        <div class="tab-bar">
            <div class="tab-btn ${game.activeTab === 'game' ? 'active' : ''}" data-tab="game">⚔️ БОЙ</div>
            <div class="tab-btn ${game.activeTab === 'inventory' ? 'active' : ''}" data-tab="inventory">📦 ИНВЕНТАРЬ</div>
            <div class="tab-btn ${game.activeTab === 'tavern' ? 'active' : ''}" data-tab="tavern">🍺 ТАВЕРНА</div>
            <div class="tab-btn ${game.activeTab === 'smith' ? 'active' : ''}" data-tab="smith">⚒️ КУЗНЕЦ</div>
            <div class="tab-btn ${game.activeTab === 'alchemist' ? 'active' : ''}" data-tab="alchemist">🧪 АЛХИМИК</div>
            ${isAdmin ? `<div class="tab-btn ${game.activeTab === 'admin' ? 'active' : ''}" data-tab="admin">👑 АДМИН</div>` : ''}
        </div>
        
        <div id="tab-game" class="tab-content ${game.activeTab === 'game' ? 'active' : ''}">
            <div class="stats-panel">
                ${['❤️ ' + Math.floor(game.hp) + '/' + game.maxHp, '⚔️ ' + getStrength(), '🛡️ ' + getDefense(), `⭐ Ур.${game.level}`, `💰 ${game.gold}`, `✨ ${game.exp}/${game.expToNext}`].map(s => `<span class="stat">${s}</span>`).join('')}
            </div>
            <div>❤️ ЗДОРОВЬЕ</div>
            <div class="energy-bar"><div class="energy-fill" style="width:${hpPerc}%; background:#ff4444;"></div></div>
            <div>🚶 ЭНЕРГИЯ ПУТИ</div>
            <div class="energy-bar"><div class="energy-fill" style="width:${travPerc}%;"></div></div>
            <div class="fight-counter">🏆 УБИТО: ${game.monstersKilled}/${game.needToKill} ${game.monstersKilled >= game.needToKill ? '👑 БОСС ДОСТУПЕН' : ''}</div>
            <div class="button-group">
                <button id="fightBtn">⚔️ БОЙ</button>
                <button id="potionBtn">🧪 ЗЕЛЬЕ (150💰)</button>
                <button id="energyBtn">⚡ ВОССТ (100💰)</button>
                ${game.location === "dungeon" ? '<button id="exitDungeonBtn">🏡 ВЫЙТИ</button>' : ''}
            </div>
            <div class="location-grid">${locsHtml}</div>
            <div><button onclick="changeLocation('dungeon')" style="background:#8b4513; width:100%;">🏰 ПОДЗЕМЕЛЬЕ (этаж ${game.dungeonFloor}/1000)</button></div>
            ${fightBlock}
            <div class="message-log">💬 ${game.message}</div>
            <button id="resetBtn" style="width:100%; margin-top:8px; background:#8b3c2c;">🔄 СБРОСИТЬ ПРОГРЕСС</button>
        </div>
        
        <div id="tab-inventory" class="tab-content ${game.activeTab === 'inventory' ? 'active' : ''}">
            <div><b>⚔️ ОРУЖИЕ:</b> <span class="rarity-${game.weapon?.rarity || 'common'}">${game.weapon?.name || "нет"} +${game.weapon?.strBonus || 0}</span><br>
            <b>🛡️ БРОНЯ:</b> <span class="rarity-${game.armor?.rarity || 'common'}">${game.armor?.name || "нет"} +${game.armor?.defBonus || 0}</span></div>
            <hr>
            <div><b>📦 ИНВЕНТАРЬ (${game.inventory.length})</b></div>
            <div class="items-grid" style="display:flex; flex-wrap:wrap; gap:6px;">${invHtml}</div>
            <hr>
            <div><b>🌿 РЕСУРСЫ ДЛЯ КРАФТА:</b><br><span style="font-size:0.7rem;">${resHtml || "Нет ресурсов"}</span></div>
        </div>
        
        <div id="tab-tavern" class="tab-content ${game.activeTab === 'tavern' ? 'active' : ''}">
            ${tavernHtml}
        </div>
        
        <div id="tab-smith" class="tab-content ${game.activeTab === 'smith' ? 'active' : ''}">
            ${smithHtml}
        </div>
        
        <div id="tab-alchemist" class="tab-content ${game.activeTab === 'alchemist' ? 'active' : ''}">
            ${alchemistHtml}
        </div>
        
        <div id="tab-admin" class="tab-content ${game.activeTab === 'admin' ? 'active' : ''}">
            ${adminBlock}
        </div>
        `;
        
        document.getElementById("fightBtn")?.addEventListener("click", () => startFight());
        document.getElementById("potionBtn")?.addEventListener("click", () => usePotion());
        document.getElementById("energyBtn")?.addEventListener("click", () => restoreEnergy());
        document.getElementById("resetBtn")?.addEventListener("click", () => resetGame());
        document.getElementById("exitDungeonBtn")?.addEventListener("click", () => exitDungeon());
        document.getElementById("attackBtn")?.addEventListener("click", () => attack());
        
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", function () {
                game.activeTab = this.dataset.tab;
                renderGame();
            });
        });
    }
    
    window.changeLocation = changeLocation;
    window.equipItem = equipItem;
    window.craftItem = craftItem;
    window.usePotion = usePotion;
    window.restoreEnergy = restoreEnergy;
    window.takeQuest = takeQuest;
    
    renderGame();
</script>
</body>
</html>
