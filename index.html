        { name: "Алхимик Морган", icon: "🧪", avatar: "⚗️", type: "alchemist" },
        { name: "Трактирщик Грим", icon: "🍺", avatar: "🧔", type: "tavern" },
        { name: "Мастер крафта", icon: "🔨", avatar: "🛠️", type: "crafter" }
    ];
    
    // ИГРОВОЕ СОСТОЯНИЕ
    let game = {
        initialized: false, telegramId: null, profileName: "", class: "warrior",
        gold: 500, level: 1, exp: 0, expToNext: 100,
        combatEnergy: 100, maxCombatEnergy: 100, travelEnergy: 50, maxTravelEnergy: 50,
        weapon: null, armor: null, helmet: null, gloves: null, boots: null, cloak: null,
        inventory: [], resources: {},
        potions: { weak: 3, medium: 1, strong: 0 },
        message: "", inCombat: false, combatEnemy: null, enemyCurrentHp: 0,
        location: "village", dungeonFloor: 1, maxUnlockedFloor: 1, activeTab: "game",
        isAdmin: false, animationState: "idle", isRunning: false, completedLocations: [],
        monstersKilled: 0, needToKill: 15, autoFightActive: false, autoFightInterval: null,
        chestsOpened: {}
    };
    
    // Инициализация ресурсов
    RESOURCES_LIST.forEach(r => { if (game.resources[r] === undefined) game.resources[r] = 0; });
    
    async function saveGame() { if (!game.profileName) return; await saveData(`rpg_${game.telegramId || game.profileName}`, JSON.stringify(game)); }
    async function loadGame(id) {
        const raw = await loadData(`rpg_${id}`);
        if (raw) {
            let data = JSON.parse(raw);
            Object.assign(game, data);
            game.isAdmin = isAdmin();
            RESOURCES_LIST.forEach(r => { if (game.resources[r] === undefined) game.resources[r] = 0; });
            if (!game.completedLocations) game.completedLocations = [];
            if (!game.inventory) game.inventory = [];
            if (!game.potions) game.potions = { weak: 3, medium: 1, strong: 0 };
            if (game.chestsOpened === undefined) game.chestsOpened = {};
            game.autoFightActive = false;
            if (game.autoFightInterval) clearInterval(game.autoFightInterval);
            game.message = `С возвращением, ${game.profileName}!`;
            renderGame();
            return true;
        }
        return false;
    }
    
    function getTelegramId() { return tg.initDataUnsafe?.user?.id || null; }
    
    async function createCharacter(name, className) {
        if (!name.trim()) { alert("Введите имя!"); return false; }
        const cls = CLASSES[className];
        if (!cls) return false;
        game.profileName = name;
        game.class = className;
        game.telegramId = getTelegramId();
        game.gold = 500;
        game.level = 1;
        game.exp = 0;
        game.expToNext = 100;
        game.combatEnergy = 100 + (cls.hpBonus || 0);
        game.maxCombatEnergy = 100 + (cls.hpBonus || 0);
        game.travelEnergy = 50;
        game.maxTravelEnergy = 50;
        game.monstersKilled = 0;
        game.needToKill = 15;
        game.chestsOpened = {};
        RESOURCES_LIST.forEach(r => { game.resources[r] = 0; });
        game.resources["Целебная трава"] = 5;
        game.resources["Магический гриб"] = 3;
        const startWeapon = { name: cls.weapon, type: "weapon", strBonus: cls.strBonus, rarity: "common" };
        const startArmor = { name: "Кожаная броня", type: "armor", defBonus: 2, rarity: "common" };
        game.weapon = startWeapon;
        game.armor = startArmor;
        game.inventory = [startWeapon, startArmor];
        game.location = "village";
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.completedLocations = [];
        game.isAdmin = isAdmin();
        game.message = `✨ Добро пожаловать, ${name}-${cls.name}! ✨\n🏆 Победите 15 монстров, чтобы открыть босса!`;
        game.initialized = true;
        await saveGame();
        renderGame();
        return true;
    }
    
    function getTotalDefense() { return (game.armor?.defBonus||0)+(game.helmet?.defBonus||0)+(game.gloves?.defBonus||0)+(game.boots?.defBonus||0)+(game.cloak?.defBonus||0); }
    function getTotalStrength() { return game.weapon?.strBonus || 2; }
    function getCurrentStats() {
        const cls = CLASSES[game.class] || CLASSES.warrior;
        return {
            hp: game.combatEnergy, maxHp: game.maxCombatEnergy,
            str: 10 + game.level * 2 + getTotalStrength() + (cls.strBonus||0),
            def: 5 + game.level + getTotalDefense() + (cls.defBonus||0),
            dodgeBonus: cls.dodgeBonus||0, lifesteal: cls.lifesteal||0, regen: cls.regen||0
        };
    }
    
    function canAccessLocation(locKey) {
        if (game.isAdmin) return true;
        const loc = LOCATIONS[locKey];
        if (!loc) return false;
        if (game.level < loc.requiredLevel) return false;
        if (loc.isDungeon) return true;
        if (loc.order === 0) return true;
        const prev = Object.values(LOCATIONS).find(l => l.order === loc.order - 1);
        const prevKey = Object.keys(LOCATIONS).find(k => LOCATIONS[k] === prev);
        if (prevKey && !game.completedLocations.includes(prevKey)) return false;
        return true;
    }
    
    function getRandomEnemy() {
        const list = Object.values(ENEMIES);
        let e = { ...list[Math.floor(Math.random() * list.length)] };
        let bonus = Math.floor(game.level / 2);
        e.hp += bonus * 5;
        e.str += bonus * 2;
        e.def += bonus;
        e.exp += bonus * 8;
        e.gold += bonus * 5;
        return e;
    }
    
    function getBoss(locKey) {
        const loc = LOCATIONS[locKey];
        if (!loc || !loc.boss) return null;
        let b = { ...loc.boss };
        let bonus = Math.floor(game.level / 2);
        b.hp += bonus * 10;
        b.str += bonus * 3;
        b.def += bonus * 2;
        b.exp += bonus * 20;
        b.gold += bonus * 30;
        b.isBoss = true;
        b.dodgeChance = 10;
        return b;
    }
    
    async function openChest(floor) {
        if (game.chestsOpened[floor]) { game.message = "❌ Сундук уже был открыт!"; renderGame(); return; }
        game.chestsOpened[floor] = true;
        
        const rand = Math.random();
        let reward = "";
        if (rand < 0.05) { // 5% - легендарное
            const legItems = ["Легендарный меч", "Драконий шлем", "Плащ ветров"];
            const item = legItems[Math.floor(Math.random() * legItems.length)];
            game.inventory.push({ name: item, type: "weapon", strBonus: 50, rarity: "legendary" });
            reward = `✨ ЛЕГЕНДАРНОЕ: ${item} ✨`;
        } else if (rand < 0.2) { // 15% - эпическое
            const epicItems = ["Эпический клинок", "Кираса героя", "Сапоги скорости"];
            const item = epicItems[Math.floor(Math.random() * epicItems.length)];
            game.inventory.push({ name: item, type: "weapon", strBonus: 25, rarity: "epic" });
            reward = `📦 Эпическое: ${item}`;
        } else if (rand < 0.4) { // 20% - редкое
            const rareItems = ["Мифриловый меч", "Стальной нагрудник", "Кожаные перчатки"];
            const item = rareItems[Math.floor(Math.random() * rareItems.length)];
            game.inventory.push({ name: item, type: "weapon", strBonus: 12, rarity: "rare" });
            reward = `📦 Редкое: ${item}`;
        } else { // 60% - ресурсы
            const resList = ["Великая эссенция", "Мифриловая руда", "Великий кристалл", "Звёздная ткань", "Глаз демона", "Адамантит"];
            const res = resList[Math.floor(Math.random() * resList.length)];
            const amount = Math.floor(Math.random() * 5) + 2;
            game.resources[res] = (game.resources[res] || 0) + amount;
            reward = `📦 ${res} x${amount}`;
        }
        game.message = `🎁 СУНДУК НА ${floor} ЭТАЖЕ! 🎁\n${reward}`;
        await saveGame();
        renderGame();
    }
    
    async function gainExp(amount) {
        game.exp += amount;
        game.message += ` +${amount}✨`;
        while (game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxCombatEnergy += 5;
            game.maxTravelEnergy += 2;
            game.combatEnergy = game.maxCombatEnergy;
            game.travelEnergy = game.maxTravelEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` ✨ УРОВЕНЬ ${game.level}! ✨`;
            await saveGame();
        }
        renderGame();
    }
    
    async function combatAction(action) {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        let stats = getCurrentStats();
        
        if (game.enemyCurrentHp <= 0) {
            game.gold += enemy.gold;
            await gainExp(enemy.exp);
            if (!enemy.isBoss) game.monstersKilled++;
            
            // Дроп с врага
            if (enemy.drops) {
                for (let drop of enemy.drops) {
                    if (Math.random() * 100 < drop.chance) {
                        if (game.resources[drop.item] !== undefined) game.resources[drop.item]++;
                        else game.inventory.push({ name: drop.item, type: "resource", rarity: "common" });
                        game.message += ` +📦 ${drop.item}`;
                    }
                }
            }
            
            const energyBack = enemy.isBoss ? 15 : 8;
            if (!game.isAdmin) game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + energyBack);
            game.message = `🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            if (enemy.isBoss && game.location === "dungeonLoc") {
                game.dungeonFloor++;
                if (game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
                if (game.dungeonFloor % 20 === 0) { await openChest(game.dungeonFloor); }
                else { game.message += `\n📍 Переход на ${game.dungeonFloor} этаж`; }
                game.inCombat = false;
                game.combatEnemy = null;
                await saveGame();
                renderGame();
                return;
            }
            
            if (enemy.isBoss) {
                if (!game.completedLocations.includes(game.location)) {
                    game.completedLocations.push(game.location);
                    game.message += `\n🏆 БОСС ПОБЕЖДЁН!`;
                    game.monstersKilled = 0;
                }
                game.inCombat = false;
                game.combatEnemy = null;
                if (game.autoFightActive) stopAutoFight();
                await saveGame();
                renderGame();
                return;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            await saveGame();
            if (game.autoFightActive && !enemy.isBoss && game.monstersKilled < game.needToKill) {
                if (game.combatEnergy > (game.isAdmin ? 0 : 10)) {
                    renderGame();
                    setTimeout(() => startRandomFight(), 200);
                } else { stopAutoFight(); }
            } else { renderGame(); }
            return;
        }
        
        if (stats.hp <= 0) {
            if (!game.isAdmin) game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 3);
            game.message = `💀 Поражение... Возвращено 3⚡`;
            game.inCombat = false;
            game.combatEnemy = null;
            if (game.autoFightActive) stopAutoFight();
            await saveGame();
            renderGame();
            return;
        }
        
        if (action === "use_potion") {
            let used = false;
            if (game.potions.strong > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 50); game.potions.strong--; game.message = `💊 Мощное зелье +50 HP!`; used = true; }
            else if (game.potions.medium > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 25); game.potions.medium--; game.message = `🧪 Среднее зелье +25 HP!`; used = true; }
            else if (game.potions.weak > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 10); game.potions.weak--; game.message = `🍃 Слабое зелье +10 HP!`; used = true; }
            else { game.message = "❌ Нет зелий!"; renderGame(); return; }
            if (used) {
                let dmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                game.combatEnergy -= dmg;
                if (game.combatEnergy < 0) game.combatEnergy = 0;
                game.message += ` | Враг атакует → -${dmg} HP`;
                await saveGame();
                renderGame();
            }
            return;
        }
        
        if (action === "attack") {
            let dmg = Math.max(1, stats.str + Math.floor(Math.random() * 8) - enemy.def);
            game.enemyCurrentHp -= dmg;
            game.message = `⚡ Урон ${dmg} по ${enemy.name}`;
            let dodgeChance = stats.dodgeBonus + (Math.random() * 100);
            if (dodgeChance < 15) { game.message += ` ✨ Уворот!`; }
            else {
                let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                game.combatEnergy -= enemyDmg;
                game.message += ` | Враг атакует → -${enemyDmg} HP`;
            }
            if (game.combatEnergy < 0) game.combatEnergy = 0;
            await saveGame();
            renderGame();
            return;
        }
    }
    
    function startRandomFight() {
        if (game.completedLocations.includes(game.location)) { game.message = "Босс уже побеждён!"; renderGame(); return; }
        if (game.monstersKilled >= game.needToKill) { game.message = `✨ Вы убили ${game.needToKill} монстров! Теперь можно сразиться с боссом! ✨`; renderGame(); return; }
        if (game.combatEnergy < 10 && !game.isAdmin) { game.message = "❌ Недостаточно энергии!"; renderGame(); return; }
        if (!game.isAdmin) game.combatEnergy -= 10;
        let enemy = getRandomEnemy();
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ БОЙ ${game.monstersKilled+1}/${game.needToKill}: ${enemy.icon} ${enemy.name}`;
        renderGame();
    }
    
    function startAutoFight() {
        if (game.completedLocations.includes(game.location)) { game.message = "Босс уже побеждён!"; renderGame(); return; }
        if (game.monstersKilled >= game.needToKill) { game.message = `✨ Вы убили ${game.needToKill} монстров! Теперь можно сразиться с боссом! ✨`; renderGame(); return; }
        if (game.autoFightActive) { stopAutoFight(); return; }
        game.autoFightActive = true;
        game.message = "🟢 АВТОБОЙ ВКЛЮЧЁН!";
        renderGame();
        function nextFight() {
            if (!game.autoFightActive) return;
            if (game.inCombat) return;
            if (game.completedLocations.includes(game.location)) { stopAutoFight(); game.message = "Босс побеждён!"; renderGame(); return; }
            if (game.monstersKilled >= game.needToKill) { stopAutoFight(); game.message = "БОСС ДОСТУПЕН!"; renderGame(); return; }
            if (game.combatEnergy < 10 && !game.isAdmin) { stopAutoFight(); game.message = "Недостаточно энергии!"; renderGame(); return; }
            startRandomFight();
        }
        game.autoFightInterval = setInterval(() => { if (game.autoFightActive && !game.inCombat) nextFight(); }, 800);
    }
    
    function stopAutoFight() { game.autoFightActive = false; if (game.autoFightInterval) { clearInterval(game.autoFightInterval); game.autoFightInterval = null; } }
    
    function startBossFight() {
        if (game.completedLocations.includes(game.location)) { game.message = "Босс уже побеждён!"; renderGame(); return; }
        if (game.monstersKilled < game.needToKill && !game.isAdmin) { game.message = `❌ Нужно убить ещё ${game.needToKill - game.monstersKilled} монстров!`; renderGame(); return; }
        let boss = getBoss(game.location);
        if (!boss) { game.message = "Здесь нет босса!"; renderGame(); return; }
        if (game.combatEnergy < 15 && !game.isAdmin) { game.message = "❌ Недостаточно энергии!"; renderGame(); return; }
        if (!game.isAdmin) game.combatEnergy -= 15;
        game.inCombat = true;
        game.combatEnemy = boss;
        game.enemyCurrentHp = boss.hp;
        game.message = `⚔️ БОЙ С БОССОМ: ${boss.icon} ${boss.name}`;
        renderGame();
    }
    
    function startDungeonFight() {
        if (game.dungeonFloor > 1000) { game.message = "🎉 ПОЗДРАВЛЯЮ! Ты прошёл все 1000 этажей! 🎉"; renderGame(); return; }
        const isBoss = (game.dungeonFloor % 20 === 0);
        let enemy;
        if (isBoss) {
            enemy = { name: `👑 БОСС ${game.dungeonFloor} этажа 👑`, hp: 150 + game.dungeonFloor * 2, str: 30 + Math.floor(game.dungeonFloor / 2), def: 15 + Math.floor(game.dungeonFloor / 5), exp: 300 + game.dungeonFloor * 8, gold: 200 + game.dungeonFloor * 10, icon: "👑", isBoss: true };
        } else {
            enemy = { name: `Страж ${game.dungeonFloor} этажа`, hp: 50 + Math.floor(game.dungeonFloor * 1.5), str: 15 + Math.floor(game.dungeonFloor / 3), def: 8 + Math.floor(game.dungeonFloor / 6), exp: 60 + game.dungeonFloor * 2, gold: 40 + game.dungeonFloor * 3, icon: "👹" };
        }
        if (game.combatEnergy < 10 && !game.isAdmin) { game.message = "❌ Недостаточно энергии!"; renderGame(); return; }
        if (!game.isAdmin) game.combatEnergy -= 10;
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ ПОДЗЕМЕЛЬЕ ${game.dungeonFloor} этаж: ${enemy.icon} ${enemy.name}`;
        renderGame();
    }
    
    function goToFloor(floor) {
        floor = Math.min(1000, Math.max(1, floor));
        if (game.isAdmin || floor <= game.maxUnlockedFloor + 10) {
            game.dungeonFloor = floor;
            if (floor > game.maxUnlockedFloor) game.maxUnlockedFloor = floor;
            game.message = `📍 Переход на ${floor} этаж`;
            renderGame();
        } else { game.message = `❌ Нельзя перейти на ${floor} этаж!`; renderGame(); }
    }
    
    function changeLocation(locKey) {
        if (!canAccessLocation(locKey)) { game.message = "❌ Сначала победите босса в предыдущей локации!"; renderGame(); return; }
        let loc = LOCATIONS[locKey];
        if (game.travelEnergy >= loc.energyCost || game.isAdmin) {
            if (!game.isAdmin) game.travelEnergy -= loc.energyCost;
            game.location = locKey;
            game.monstersKilled = 0;
            if (game.completedLocations.includes(locKey)) game.monstersKilled = game.needToKill;
            game.message = `🚶 Переход в ${loc.name}`;
            renderGame();
        } else { game.message = "❌ Недостаточно энергии!"; renderGame(); }
    }
    
    async function usePotion(type) {
        if (type === "weak" && game.potions.weak > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 10); game.potions.weak--; game.message = `🍃 Слабое зелье +10 HP!`; }
        else if (type === "medium" && game.potions.medium > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 25); game.potions.medium--; game.message = `🧪 Среднее зелье +25 HP!`; }
        else if (type === "strong" && game.potions.strong > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 50); game.potions.strong--; game.message = `💊 Мощное зелье +50 HP!`; }
        else { game.message = "❌ Нет таких зелий!"; }
        await saveGame();
        renderGame();
    }
    
    async function buyEnergy() {
        if (game.gold >= 250) { game.gold -= 250; game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 5); game.message = "🍺 +5 энергии путешествий!"; await saveGame(); renderGame(); closeDialog(); }
        else { game.message = "❌ Не хватает 250 золота!"; renderGame(); }
    }
    
    async function buyItem(item) {
        if (game.gold >= item.price) { game.gold -= item.price; game.inventory.push({ ...item }); game.message = `✅ Куплено ${item.name}!`; await saveGame(); renderGame(); }
        else { game.message = `❌ Не хватает ${item.price - game.gold}💰!`; renderGame(); }
    }
    
    async function craftPotion(type) {
        const hasWeak = game.resources["Целебная трава"] >= 1 && game.resources["Магический гриб"] >= 1 && game.gold >= 50;
        const hasMedium = game.resources["Целебная трава"] >= 2 && game.resources["Магический гриб"] >= 2 && game.resources["Мифический цветок"] >= 1 && game.gold >= 150;
        const hasStrong = game.resources["Целебная трава"] >= 3 && game.resources["Магический гриб"] >= 3 && game.resources["Мифический цветок"] >= 2 && game.gold >= 300;
        if (type === "weak" && hasWeak) { game.resources["Целебная трава"]--; game.resources["Магический гриб"]--; game.gold -= 50; game.potions.weak += 3; game.message = "🍃 Скрафчено 3 слабых зелья!"; }
        else if (type === "medium" && hasMedium) { game.resources["Целебная трава"] -= 2; game.resources["Магический гриб"] -= 2; game.resources["Мифический цветок"]--; game.gold -= 150; game.potions.medium += 3; game.message = "🌿 Скрафчено 3 средних зелья!"; }
        else if (type === "strong" && hasStrong) { game.resources["Целебная трава"] -= 3; game.resources["Магический гриб"] -= 3; game.resources["Мифический цветок"] -= 2; game.gold -= 300; game.potions.strong += 3; game.message = "🌸 Скрафчено 3 мощных зелья!"; }
        else { game.message = "❌ Не хватает ресурсов!"; }
        await saveGame();
        renderGame();
    }
    
    async function craftMythic(item) {
        let canCraft = true;
        for (let [res, need] of Object.entries(item.resources)) {
            if ((game.resources[res] || 0) < need) canCraft = false;
        }
        if (!canCraft) { game.message = "❌ Не хватает ресурсов для крафта!"; renderGame(); return; }
        for (let [res, need] of Object.entries(item.resources)) {
            game.resources[res] -= need;
        }
        const craftedItem = { name: item.name, type: item.type, strBonus: item.strBonus || 0, defBonus: item.defBonus || 0, rarity: "mythic" };
        game.inventory.push(craftedItem);
        if (craftedItem.type === "weapon") game.weapon = craftedItem;
        else game.armor = craftedItem;
        game.message = `🎉 ВЫ СКРАФТИЛИ ${item.name}! 🎉`;
        await saveGame();
        renderGame();
    }
    
    async function equipItem(item, slot) {
        if (item.type === "weapon") game.weapon = item;
        else if (item.type === "armor") game.armor = item;
        else if (slot === "helmet") game.helmet = item;
        else if (slot === "gloves") game.gloves = item;
        else if (slot === "boots") game.boots = item;
        else if (slot === "cloak") game.cloak = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        await saveGame();
        renderGame();
    }
    
    // АДМИН ФУНКЦИИ
    let adminItemList = [];
    function updateAdminItemList() { adminItemList = MYTHIC_ITEMS; renderGame(); }
    async function adminGiveGold() { if (!game.isAdmin) return; let nick = document.getElementById("adminGoldNick")?.value; let amount = parseInt(document.getElementById("adminGoldAmount")?.value); if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } const data = await loadData(`rpg_${nick}`); if (data) { let target = JSON.parse(data); target.gold = (target.gold || 0) + (isNaN(amount) ? 500 : amount); await saveData(`rpg_${nick}`, JSON.stringify(target)); game.message = `👑 Выдано ${amount}💰 игроку ${nick}`; } else { game.message = `❌ Игрок ${nick} не найден!`; } renderGame(); }
    async function adminGiveExp() { if (!game.isAdmin) return; let nick = document.getElementById("adminExpNick")?.value; let amount = parseInt(document.getElementById("adminExpAmount")?.value); if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } const data = await loadData(`rpg_${nick}`); if (data) { let target = JSON.parse(data); target.exp = (target.exp || 0) + (isNaN(amount) ? 300 : amount); while (target.exp >= target.expToNext) { target.exp -= target.expToNext; target.level++; target.maxCombatEnergy += 5; target.maxTravelEnergy += 2; target.expToNext = Math.floor(target.expToNext * 1.2); } await saveData(`rpg_${nick}`, JSON.stringify(target)); game.message = `👑 Выдано ${amount}✨ опыта игроку ${nick}`; } else { game.message = `❌ Игрок ${nick} не найден!`; } renderGame(); }
    async function adminGiveItem() { if (!game.isAdmin) return; let nick = document.getElementById("adminItemNick")?.value; let itemName = document.getElementById("adminItemSelect")?.value; if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } const item = ADMIN_ITEMS.find(i => i.name === itemName); if (!item) return; const data = await loadData(`rpg_${nick}`); if (data) { let target = JSON.parse(data); if (!target.inventory) target.inventory = []; target.inventory.push({ ...item }); await saveData(`rpg_${nick}`, JSON.stringify(target)); game.message = `👑 Выдан предмет ${itemName} игроку ${nick}`; } else { game.message = `❌ Игрок ${nick} не найден!`; } renderGame(); }
    async function adminGiveEnergy() { if (!game.isAdmin) return; let nick = document.getElementById("adminEnergyNick")?.value; let amount = parseInt(document.getElementById("adminEnergyAmount")?.value); if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } const data = await loadData(`rpg_${nick}`); if (data) { let target = JSON.parse(data); target.combatEnergy = Math.min(target.maxCombatEnergy, (target.combatEnergy || 0) + (isNaN(amount) ? 100 : amount)); target.travelEnergy = Math.min(target.maxTravelEnergy, (target.travelEnergy || 0) + (isNaN(amount) ? 50 : amount)); await saveData(`rpg_${nick}`, JSON.stringify(target)); game.message = `👑 Выдано ${amount}⚡ энергии игроку ${nick}`; } else { game.message = `❌ Игрок ${nick} не найден!`; } renderGame(); }
    async function adminResetPlayer() { if (!game.isAdmin) return; let nick = document.getElementById("adminResetNick")?.value; if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } if (confirm(`Сбросить прогресс игрока "${nick}"?`)) { await deleteData(`rpg_${nick}`); game.message = `👑 Прогресс игрока ${nick} сброшен!`; renderGame(); } }
    
    function startDialog(npc) {
        let dialogHtml = `
            <div class="dialog-overlay" id="dialogOverlay">
                <div class="dialog-window">
                    <div class="dialog-header"><div style="font-size:3rem;">${npc.avatar}</div><div style="color:#f7d44a;">${npc.name} ${npc.icon}</div></div>
                    <div class="dialog-body"><div class="dialog-text">${npc.type === "blacksmith" ? "Кузнец Гром: Лучшее оружие и броня!" : npc.type === "alchemist" ? "Алхимик Морган: Крафт зелий!" : npc.type === "tavern" ? "Трактирщик: Эль за 250💰!" : "Мастер крафта: Мифическое оружие из ресурсов боссов 100+ этажа!"}</div></div>
                    <div class="dialog-footer"><div class="dialog-buttons">
                        ${npc.type === "blacksmith" ? npc.items.map(item => `<button class="dialog-btn" onclick="buyItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">${item.name} - ${item.price}💰</button>`).join('') : ""}
                        ${npc.type === "alchemist" ? `<button class="dialog-btn" onclick="craftPotion('weak')">🍃 Слабое зелье</button><button class="dialog-btn" onclick="craftPotion('medium')">🌿 Среднее зелье</button><button class="dialog-btn" onclick="craftPotion('strong')">🌸 Мощное зелье</button>` : ""}
                        ${npc.type === "tavern" ? `<button class="dialog-btn" onclick="buyEnergy()">🍺 Купить эль за 250💰</button>` : ""}
                        ${npc.type === "crafter" ? MYTHIC_ITEMS.map(item => `<button class="dialog-btn" onclick="craftMythic(${JSON.stringify(item).replace(/"/g, '&quot;')})">🔨 ${item.name}</button>`).join('') : ""}
                        <button class="dialog-btn" onclick="closeDialog()">🚪 Закрыть</button>
                    </div></div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', dialogHtml);
    }
    
    function closeDialog() { document.getElementById("dialogOverlay")?.remove(); }
    function toggleAdminPanel() { document.getElementById("adminPanel")?.classList.toggle("show"); }
    
    function renderGame() {
        const container = document.getElementById("rpgGame");
        const stats = getCurrentStats();
        if (!game.initialized) {
            let tid = getTelegramId();
            if (tid) { loadGame(tid); return; }
            let selectedClass = "warrior";
            container.innerHTML = `<div class="character-form"><h2 style="color:#f7d44a">⚔️ ТРОПЫ ЗАБЫТОГО КОРОЛЕВСТВА ⚔️</h2><div class="class-selector" id="classSelector">${Object.entries(CLASSES).map(([k,c]) => `<div class="class-option ${k===selectedClass?'selected':''}" data-class="${k}">${c.icon} ${c.name}<br><span style="font-size:0.6rem;">+${c.strBonus}⚔️</span></div>`).join('')}</div><input id="playerName" placeholder="Имя героя"><button id="createBtn">🚀 НАЧАТЬ</button></div>`;
            document.querySelectorAll(".class-option").forEach(opt => { opt.onclick = () => { document.querySelectorAll(".class-option").forEach(c=>c.classList.remove("selected")); opt.classList.add("selected"); selectedClass = opt.dataset.class; }; });
            document.getElementById("createBtn").onclick = async () => { await createCharacter(document.getElementById("playerName").value, selectedClass); };
            return;
        }
        const cls = CLASSES[game.class];
        const currentLoc = LOCATIONS[game.location];
        const isBossDefeated = game.completedLocations.includes(game.location);
        const canFightBoss = game.monstersKilled >= game.needToKill || game.isAdmin;
        
        let fightButtons = "";
        if (!currentLoc.isDungeon) {
            if (!isBossDefeated) {
                fightButtons = `<div style="display:flex; gap:8px; margin:10px 0;"><button id="randomFightBtn" style="flex:1;">⚔️ Сражаться</button><button id="autoFightBtn" class="autofight-btn ${game.autoFightActive?'active':''}" style="flex:1;">${game.autoFightActive?'🟢 АВТОБОЙ ВКЛ':'🔴 АВТОБОЙ'}</button></div><div class="fight-counter">🏆 Побед: ${game.monstersKilled}/${game.needToKill}${!canFightBoss?` | Осталось: ${game.needToKill-game.monstersKilled}`:' | ✅ БОСС ДОСТУПЕН!'}</div>${canFightBoss?`<button id="bossFightBtn" class="boss-btn" style="width:100%;">👑 БРОСИТЬ ВЫЗОВ БОССУ ${currentLoc.boss?.icon||'👑'} 👑</button>`:`<div class="boss-locked">🔒 БОСС ЗАБЛОКИРОВАН 🔒<br>Убейте ${game.needToKill-game.monstersKilled} монстров</div>`}`;
            } else { fightButtons = `<div class="fight-counter" style="background:#2a6b4a;">🏆 ЛОКАЦИЯ ПРОЙДЕНА! 🏆</div>`; }
        }
        
        let combatBlock = "";
        if (game.inCombat && game.combatEnemy) {
            combatBlock = `<div style="background:#2a1e2e; border-radius:20px; padding:12px; margin:12px 0;"><div style="font-size:1.2rem;">${game.combatEnemy.icon} ${game.combatEnemy.name}</div><div>❤️ ${Math.max(0,Math.floor(game.enemyCurrentHp))}/${game.combatEnemy.hp}</div><div>⚔️ ${game.combatEnemy.str} | 🛡️ ${game.combatEnemy.def}</div><div style="display:flex; gap:10px; margin-top:10px;"><button id="attackBtn" style="flex:1; background:#8b3c2c;">⚔️ АТАКОВАТЬ</button><button id="potionBtn" style="flex:1; background:#2f6b4a;">💊 ЗЕЛЬЕ</button></div></div>`;
        }
        
        let adminHtml = "";
        if (game.isAdmin) {
            adminHtml = `<div id="adminPanel" class="admin-panel show"><b>👑 АДМИН-ПАНЕЛЬ</b><hr>
                <b>💰 ЗОЛОТО</b><br><input id="adminGoldNick" class="admin-input" placeholder="Ник"><input id="adminGoldAmount" class="admin-input" placeholder="Сумма" value="500"><button onclick="adminGiveGold()">Выдать</button><hr>
                <b>✨ ОПЫТ</b><br><input id="adminExpNick" class="admin-input" placeholder="Ник"><input id="adminExpAmount" class="admin-input" placeholder="Опыт" value="300"><button onclick="adminGiveExp()">Выдать</button><hr>
                <b>⚡ ЭНЕРГИЯ</b><br><input id="adminEnergyNick" class="admin-input" placeholder="Ник"><input id="adminEnergyAmount" class="admin-input" placeholder="Кол-во" value="100"><button onclick="adminGiveEnergy()">Выдать</button><hr>
                <b>🎁 ПРЕДМЕТ</b><br><input id="adminItemNick" class="admin-input" placeholder="Ник"><select id="adminItemSelect" class="admin-select">${ADMIN_ITEMS.map(i=>`<option value="${i.name}">${i.name}</option>`).join('')}</select><button onclick="adminGiveItem()">Выдать</button><hr>
                <b>⚠️ СБРОС</b><br><input id="adminResetNick" class="admin-input" placeholder="Ник"><button onclick="adminResetPlayer()" style="background:#8b0000;">Сбросить</button>
                <hr><button onclick="toggleAdminPanel()">🔒 СКРЫТЬ ПАНЕЛЬ</button></div>`;
        }
        
        let locationButtons = Object.entries(LOCATIONS).map(([k,loc]) => {
            let available = canAccessLocation(k);
            let completed = game.completedLocations.includes(k);
            let badge = loc.boss && !completed && !loc.isDungeon ? `<span class="boss-badge">👑</span>` : (completed && !loc.isDungeon ? `<span class="completed-badge">✅</span>` : "");
            return `<button class="location-btn ${!available?'locked':''} ${completed?'completed':''}" onclick="${available?`changeLocation('${k}')`:''}" ${!available?'disabled':''}>${loc.icon} ${loc.name} ${badge}</button>`;
        }).join('');
        
        const tabsHtml = `<div class="tabs"><div class="tab-btn ${game.activeTab==='game'?'active':''}" data-tab="game">⚔️ Игра</div><div class="tab-btn ${game.activeTab==='inventory'?'active':''}" data-tab="inventory">📦 Инвентарь</div><div class="tab-btn ${game.activeTab==='tavern'?'active':''}" data-tab="tavern">🍺 Таверна</div><div class="tab-btn ${game.activeTab==='craft'?'active':''}" data-tab="craft">🔨 Крафт</div>${game.isAdmin?'<div class="tab-btn" data-tab="admin">👑 Админ</div>':''}</div>`;
        
        const gameTab = `<div id="tab-game" class="tab-content ${game.activeTab==='game'?'active':''}"><div class="sprite-area" id="characterSprite"><div class="char-idle">${cls.icon}</div></div>
            <div class="stats-panel"><span class="stat">❤️ ${Math.floor(stats.hp)}/${stats.maxHp}</span><span class="stat">⚔️ ${stats.str}</span><span class="stat">🛡️ ${stats.def}</span><span class="stat">⭐${game.level}</span><span class="stat">📖${game.exp}/${game.expToNext}</span><span class="stat">💰${game.gold}</span><span class="stat">${cls.icon} ${cls.name}</span></div>
            <div><span>⚡ Боевая энергия: ${game.combatEnergy}/${game.maxCombatEnergy}</span><div class="energy-bar"><div class="energy-fill" style="width:${(game.combatEnergy/game.maxCombatEnergy)*100}%"></div></div></div>
            <div><span>🚶 Энергия путешествий: ${game.travelEnergy}/${game.maxTravelEnergy}</span><div class="energy-bar"><div class="energy-fill travel" style="width:${(game.travelEnergy/game.maxTravelEnergy)*100}%"></div></div></div>
            <div style="background:#1a1530; border-radius:20px; padding:12px; margin:12px 0;"><div style="font-size:1.2rem;">${currentLoc.icon} ${currentLoc.name}</div>${!currentLoc.isDungeon ? fightButtons : `<div><input id="floorInput" type="number" min="1" max="1000" value="${game.dungeonFloor}" style="width:80px;"><button id="goToFloorBtn">Перейти</button><button id="fightDungeonBtn">⚔️ ${game.dungeonFloor} этаж</button><div>📊 Пройдено: ${game.maxUnlockedFloor} этажей | 👑 Босс каждые 20 этажей</div></div>`}</div>
            <div class="location-grid">${locationButtons}</div>${combatBlock}<div class="message-log">💬 ${game.message}</div>
            <div style="display:flex; gap:6px;"><button id="runToggleBtn" class="run-btn" style="flex:1;">${game.isRunning?"🚶 ВЫКЛ":"🏃‍♂️ ВКЛ"}</button><button id="resetBtn" class="reset-btn" style="flex:1;">🔄 Сброс</button></div>${adminHtml}</div>`;
        
        const inventoryTab = `<div id="tab-inventory" class="tab-content ${game.activeTab==='inventory'?'active':''}"><h3 style="color:gold; text-align:center;">📦 ИНВЕНТАРЬ</h3>
            <div class="section-title">⚔️ ЭКИПИРОВКА</div><div class="equipment-grid"><div class="equip-item"><b>⚔️ Оружие</b><br>${game.weapon?.name||"Нет"}<br>+${game.weapon?.strBonus||0} силы</div><div class="equip-item"><b>🛡️ Броня</b><br>${game.armor?.name||"Нет"}<br>+${game.armor?.defBonus||0} защиты</div></div>
            <div class="section-title">📦 ПРЕДМЕТЫ</div><div class="items-list">${game.inventory.map(item => `<div class="item-card" onclick="equipItem(${JSON.stringify(item).replace(/"/g,'&quot;')}, '${item.type==="weapon"?"weapon":"armor"}')"><b>${item.type==="weapon"?"⚔️":"🛡️"} ${item.name}</b><br>+${item.strBonus||item.defBonus}</div>`).join('')}</div>
            <div class="section-title">💊 ЗЕЛЬЯ</div><div class="inventory-item"><span>🍃 Слабое (10 HP): ${game.potions.weak}</span><button class="use-potion-btn" onclick="usePotion('weak')">Исп</button></div><div class="inventory-item"><span>🧪 Среднее (25 HP): ${game.potions.medium}</span><button class="use-potion-btn" onclick="usePotion('medium')">Исп</button></div><div class="inventory-item"><span>💊 Мощное (50 HP): ${game.potions.strong}</span><button class="use-potion-btn" onclick="usePotion('strong')">Исп</button></div>
            <div class="section-title">📦 РЕСУРСЫ</div><div class="resource-row">${RESOURCES_LIST.filter(r=>game.resources[r]>0).map(r=>`<span class="resource-badge">${r}: ${game.resources[r]}</span>`).join('')}</div></div>`;
        
        const tavernTab = `<div id="tab-tavern" class="tab-content ${game.activeTab==='tavern'?'active':''}"><h3 style="color:gold; text-align:center;">🍺 ТАВЕРНА</h3><div class="npc-panel"><div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">${NPCS.map(npc => `<button onclick="startDialog(${JSON.stringify(npc).replace(/"/g,'&quot;')})">💬 ${npc.icon} ${npc.name}</button>`).join('')}</div></div></div>`;
        
        const craftTab = `<div id="tab-craft" class="tab-content ${game.activeTab==='craft'?'active':''}"><h3 style="color:gold; text-align:center;">🔨 МАСТЕРСКАЯ КРАФТА</h3><div class="craft-panel"><b style="color:#ff44ff;">МИФИЧЕСКОЕ ОРУЖИЕ (ресурсы с боссов 100+ этажа)</b><div style="margin-top:10px;">${MYTHIC_ITEMS.map(item => `<div class="equip-item" onclick="craftMythic(${JSON.stringify(item).replace(/"/g,'&quot;')})"><b>${item.type==="weapon"?"⚔️":"🛡️"} ${item.name}</b><br>+${item.strBonus||item.defBonus}<br><span style="font-size:0.55rem;">${Object.entries(item.resources).map(([r,a])=>`${r}:${a}`).join(', ')}</span></div>`).join('')}</div><hr><div class="section-title">🍃 КРАФТ ЗЕЛИЙ</div><div style="display:flex; gap:8px;"><button onclick="craftPotion('weak')">🍃 Слабое зелье</button><button onclick="craftPotion('medium')">🌿 Среднее зелье</button><button onclick="craftPotion('strong')">🌸 Мощное зелье</button></div></div></div>`;
        
        const adminTab = `<div id="tab-admin" class="tab-content ${game.activeTab==='admin'?'active':''}"><div class="admin-panel show" style="display:block;"><b>👑 АДМИН-ПАНЕЛЬ</b><hr>
            <b>💰 ЗОЛОТО</b><br><input id="adminGoldNick" class="admin-input" placeholder="Ник"><input id="adminGoldAmount" class="admin-input" placeholder="Сумма" value="500"><button onclick="adminGiveGold()">Выдать</button><hr>
            <b>✨ ОПЫТ</b><br><input id="adminExpNick" class="admin-input" placeholder="Ник"><input id="adminExpAmount" class="admin-input" placeholder="Опыт" value="300"><button onclick="adminGiveExp()">Выдать</button><hr>
            <b>⚡ ЭНЕРГИЯ</b><br><input id="adminEnergyNick" class="admin-input" placeholder="Ник"><input id="adminEnergyAmount" class="admin-input" placeholder="Кол-во" value="100"><button onclick="adminGiveEnergy()">Выдать</button><hr>
            <b>🎁 ПРЕДМЕТ</b><br><input id="adminItemNick" class="admin-input" placeholder="Ник"><select id="adminItemSelect" class="admin-select">${ADMIN_ITEMS.map(i=>`<option value="${i.name}">${i.name}</option>`).join('')}</select><button onclick="adminGiveItem()">Выдать</button><hr>
            <b>⚠️ СБРОС</b><br><input id="adminResetNick" class="admin-input" placeholder="Ник"><button onclick="adminResetPlayer()" style="background:#8b0000;">Сбросить</button>
        </div></div>`;
        
        container.innerHTML = tabsHtml + gameTab + inventoryTab + tavernTab + craftTab + (game.isAdmin ? adminTab : "");
        
        document.querySelectorAll(".tab-btn").forEach(btn => { btn.onclick = () => { game.activeTab = btn.dataset.tab; renderGame(); }; });
        document.getElementById("randomFightBtn")?.addEventListener("click", () => { if(game.autoFightActive) stopAutoFight(); startRandomFight(); });
        document.getElementById("autoFightBtn")?.addEventListener("click", () => startAutoFight());
        document.getElementById("bossFightBtn")?.addEventListener("click", () => { if(game.autoFightActive) stopAutoFight(); startBossFight(); });
        document.getElementById("fightDungeonBtn")?.addEventListener("click", () => startDungeonFight());
        document.getElementById("goToFloorBtn")?.addEventListener("click", () => goToFloor(parseInt(document.getElementById("floorInput")?.value||1)));
        document.getElementById("attackBtn")?.addEventListener("click", () => combatAction("attack"));
        document.getElementById("potionBtn")?.addEventListener("click", () => combatAction("use_potion"));
        document.getElementById("runToggleBtn")?.addEventListener("click", () => { game.isRunning = !game.isRunning; renderGame(); });
        document.getElementById("resetBtn")?.addEventListener("click", async () => { if(confirm("Сбросить прогресс?")) { await deleteData(`rpg_${game.telegramId||game.profileName}`); game.initialized=false; renderGame(); } });
        
        let sp = document.getElementById("characterSprite");
        if(sp) sp.innerHTML = `<div class="char-${game.isRunning?"running":"idle"}">${cls.icon}</div>`;
    }
    
    window.changeLocation = changeLocation; window.startDialog = startDialog; window.buyItem = buyItem; window.craftPotion = craftPotion; window.craftMythic = craftMythic;
    window.buyEnergy = buyEnergy; window.closeDialog = closeDialog; window.usePotion = usePotion; window.equipItem = equipItem;
    window.adminGiveGold = adminGiveGold; window.adminGiveExp = adminGiveExp; window.adminGiveItem = adminGiveItem; window.adminGiveEnergy = adminGiveEnergy;
    window.adminResetPlayer = adminResetPlayer; window.toggleAdminPanel = toggleAdminPanel;
    renderGame();
</script>
</body>
</html>
