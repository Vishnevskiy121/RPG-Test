<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RPG | Тропы забытого королевства</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0f1a;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #0f0e17;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
        }
        button {
            background: #3a2c45;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            color: white;
            cursor: pointer;
            margin: 5px;
        }
        input {
            padding: 12px;
            border-radius: 30px;
            border: none;
            width: 80%;
            margin: 10px 0;
        }
        .stat {
            background: #1e1b2b;
            padding: 10px;
            border-radius: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>⚔️ ТРОПЫ ЗАБЫТОГО КОРОЛЕВСТВА ⚔️</h1>
    <div id="gameArea">
        <input type="text" id="playerName" placeholder="Введите имя героя">
        <button id="startBtn">🚀 НАЧАТЬ ИГРУ</button>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // Инициализация Telegram
    let tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.ready();
        console.log("Telegram Web App готов");
    } else {
        console.log("Работа в браузере");
        tg = { expand: function(){}, ready: function(){} };
    }
    
    // Простое сохранение
    let gameData = {
        name: "",
        level: 1,
        gold: 100
    };
    
    function saveGame() {
        let saveId = "rpg_" + (tg.initDataUnsafe?.user?.id || "browser");
        if (tg?.CloudStorage) {
            tg.CloudStorage.setItem(saveId, JSON.stringify(gameData), function(err) {
                if (err) console.log("Ошибка сохранения");
                else console.log("Сохранено!");
            });
        } else {
            localStorage.setItem(saveId, JSON.stringify(gameData));
        }
    }
    
    function loadGame() {
        let saveId = "rpg_" + (tg.initDataUnsafe?.user?.id || "browser");
        if (tg?.CloudStorage) {
            tg.CloudStorage.getItem(saveId, function(err, value) {
                if (!err && value) {
                    gameData = JSON.parse(value);
                    showGame();
                }
            });
        } else {
            let saved = localStorage.getItem(saveId);
            if (saved) {
                gameData = JSON.parse(saved);
                showGame();
            }
        }
    }
    
    function startGame() {
        let name = document.getElementById("playerName").value;
        if (!name.trim()) {
            alert("Введите имя!");
            return;
        }
        gameData.name = name;
        gameData.level = 1;
        gameData.gold = 500;
        saveGame();
        showGame();
    }
    
    function addGold() {
        gameData.gold += 100;
        saveGame();
        showGame();
    }
    
    function showGame() {
        document.getElementById("gameArea").innerHTML = `
            <div class="stat">👤 ${gameData.name}</div>
            <div class="stat">⭐ Уровень ${gameData.level}</div>
            <div class="stat">💰 ${gameData.gold} золота</div>
            <button onclick="addGold()">➕ +100 золота</button>
            <button onclick="resetGame()">🔄 Сброс</button>
        `;
    }
    
    function resetGame() {
        if (confirm("Сбросить прогресс?")) {
            gameData = { name: "", level: 1, gold: 100 };
            location.reload();
        }
    }
    
    document.getElementById("startBtn")?.addEventListener("click", startGame);
    
    loadGame();
</script>
</body>
</html>
