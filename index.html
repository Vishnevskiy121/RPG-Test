<script>
    // ========== АДМИН ДОСТУП ==========
    let isAdmin = false;
    const ADMIN_PASSWORD = "Vlados_Vladosik123";
    
    function enableAdmin() {
        let password = prompt("Введите код доступа:");
        if (password === ADMIN_PASSWORD) {
            isAdmin = true;
            game.message = "Режим администратора активирован!";
            saveGame();
            renderGame();
        } else {
            game.message = "Неверный код!";
            renderGame();
        }
    }
    
    // ========== СОХРАНЕНИЕ ==========
    async function saveToTelegram(key, value) {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
            return new Promise((resolve) => {
                Telegram.WebApp.CloudStorage.setItem(key, value, (error) => { resolve(!error); });
            });
        }
        return false;
    }
    
    async function loadFromTelegram(key) {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
            return new Promise((resolve) => {
                Telegram.WebApp.CloudStorage.getItem(key, (error, value) => { resolve(value || null); });
            });
        }
        return null;
    }
    
    async function saveGame() {
        if (!game.profileName) return;
        let saveData = JSON.parse(JSON.stringify(game));
        saveData.message = "";
        saveData.inCombat = false;
        saveData.combatEnemy = null;
        let saveStr = JSON.stringify(saveData);
        localStorage.setItem("rpg_mega_" + game.profileName, saveStr);
        await saveToTelegram("rpg_mega_" + game.profileName, saveStr);
    }
    
    async function loadGame(playerName) {
        let saveStr = await loadFromTelegram("rpg_mega_" + playerName);
        if (!saveStr) saveStr = localStorage.getItem("rpg_mega_" + playerName);
        if (saveStr) {
            try {
                let loaded = JSON.parse(saveStr);
                Object.assign(game, loaded);
                game.initialized = true;
                game.activeTab = "game";
                updateDailyShop();
                updateDailyAlchemist();
                game.message = "Данные загружены! Добро пожаловать, " + playerName + "!";
                if (window.Telegram && window.Telegram.WebApp) Telegram.WebApp.expand();
                renderGame();
                return true;
            } catch(e) { console.error(e); }
        }
        return false;
    }
    
    async function loadOtherPlayerData(playerName) {
        if (!playerName || playerName === game.profileName) return null;
        let saveStr = await loadFromTelegram("rpg_mega_" + playerName);
        if (!saveStr) saveStr = localStorage.getItem("rpg_mega_" + playerName);
        if (saveStr) try { return JSON.parse(saveStr); } catch(e) { return null; }
        return null;
    }
    
    async function saveOtherPlayerData(playerName, data) {
        let saveStr = JSON.stringify(data);
        localStorage.setItem("rpg_mega_" + playerName, saveStr);
        await saveToTelegram("rpg_mega_" + playerName, saveStr);
    }
    
    async function resetPlayerProgress(targetPlayer) {
        if (!targetPlayer || targetPlayer === "") { game.message = "Укажите ник игрока!"; renderGame(); return; }
        if (confirm(`Сбросить прогресс игрока ${targetPlayer}?`)) {
            localStorage.removeItem("rpg_mega_" + targetPlayer);
            await saveToTelegram("rpg_mega_" + targetPlayer, "");
            if (targetPlayer === game.profileName) game.initialized = false;
            game.message = `Прогресс ${targetPlayer} сброшен!`;
            renderGame();
        }
    }
    
    async function giveToPlayer(targetPlayer, giveType, giveItem, amount = 1) {
        let targetName = targetPlayer || game.profileName;
        if (!targetName) { game.message = "Укажите ник игрока!"; renderGame(); return; }
        let isSelf = (targetName === game.profileName);
        let playerData = isSelf ? game : await loadOtherPlayerData(targetName);
        if (!playerData) { game.message = `Игрок ${targetName} не найден!`; renderGame(); return; }
        
        if (giveType === "gold") {
            playerData.gold = (playerData.gold || 0) + amount;
            game.message = `Выдано ${amount} золота игроку ${targetName}!`;
        } else if (giveType === "exp") {
            playerData.exp += amount;
            while (playerData.exp >= playerData.expToNext) {
                playerData.exp -= playerData.expToNext;
                playerData.level++;
                playerData.maxHp += 12;
                playerData.hp = Math.min(playerData.maxHp, playerData.hp + 25);
                playerData.maxTravelEnergy += 2;
                playerData.expToNext = Math.floor(playerData.expToNext * 1.2);
            }
            game.message = `Выдано ${amount} опыта игроку ${targetName}!`;
        } else if (giveType === "resource") {
            playerData.resources = playerData.resources || {};
            playerData.resources[giveItem] = (playerData.resources[giveItem] || 0) + amount;
            game.message = `Выдано ${amount}x ${giveItem} игроку ${targetName}!`;
        } else if (giveType === "weapon" || giveType === "armor") {
            playerData.inventory = playerData.inventory || [];
            let itemCopy = JSON.parse(JSON.stringify(giveItem));
            playerData.inventory.push(itemCopy);
            game.message = `Выдан предмет ${itemCopy.name} игроку ${targetName}!`;
        }
        
        if (isSelf) saveGame();
        else await saveOtherPlayerData(targetName, playerData);
        renderGame();
    }

    function updateQuestProgress(type, target, amount = 1) {
        for (let q of game.activeQuests) {
            if (q.progress >= q.count) continue;
            if ((type === "kill" && q.type === "kill" && target && q.target && target.includes(q.target)) ||

                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {

                    addExp(q.reward.exp, false);

                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            } else if (type === "craft" && q.type === "craft") {
                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);

            game.exp -= game.expToNext;
            game.level++;
            game.maxHp += 12;
            game.hp = Math.min(game.maxHp, game.hp + 25);
            game.maxTravelEnergy += 2;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 4);
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` 🎉 УРОВЕНЬ ${game.level}! 🎉`;
        }
        saveGame();
        if (render) renderGame();
    }
    
    function attack() {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        if (Math.random() * 100 < getDodgeChance()) { game.message = "🌀 УВОРОТ!"; renderGame(); return; }
        let damage = Math.max(5, getStrength() + Math.floor(Math.random() * 15) - 5);
        let isCrit = Math.random() * 100 < getCritChance();
        if (isCrit) { damage = Math.floor(damage * 1.5); game.message = "💥 КРИТ! "; }
        game.enemyCurrentHp -= damage;
        game.message = `⚔️ Урон ${damage} по ${enemy.name}!`;
        if (game.enemyCurrentHp <= 0) {
            let energyBack = enemy.isBoss ? 20 : 8;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + energyBack);
            game.gold += enemy.gold;
            addExp(enemy.exp);
            if (!enemy.isBoss) { 
                game.monstersKilled++; 
                updateQuestProgress("kill", enemy.name, 1);
            } else { 
                game.monstersKilled = 0;
                if (game.location !== "dungeon") {
                    increaseLocationDifficulty(game.location);
                }
            }
            game.hp = Math.min(game.maxHp, game.hp + (enemy.isBoss ? 30 : 10));
            game.message += ` 🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            if (game.location === "dungeon") {
                game.dungeonFloor++;
                if (game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
                updateQuestProgress("dungeon", null, 0);
                if (Math.random() < 0.3) {
                    let res = MYTHIC_RESOURCES[Math.floor(Math.random() * MYTHIC_RESOURCES.length)];
                    game.resources[res] = (game.resources[res] || 0) + 1;
                    updateQuestProgress("resource", res, 1);
                    game.message += ` 📦 +${res}`;
                }
                game.message += ` 📈 Этаж ${game.dungeonFloor}!`;
            } else if (Math.random() < 0.2) {
                let res = ALL_RESOURCES[Math.floor(Math.random() * ALL_RESOURCES.length)];
                game.resources[res] = (game.resources[res] || 0) + 1;
                updateQuestProgress("resource", res, 1);
                game.message += ` 🌿 +${res}`;
            }
            
            if (enemy.isBoss && !game.completedLocations.includes(game.location) && game.location !== "dungeon") {
                game.completedLocations.push(game.location);
                game.message += ` 🎉 Локация пройдена!`;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            saveGame();
            renderGame();
            return;
        }
        
        let enemyDamage = Math.max(4, enemy.str + Math.floor(Math.random() * 12) - getDefense());
        game.hp -= enemyDamage;
        game.message += ` 😡 ${enemy.name} нанёс ${enemyDamage} урона!`;
        if (game.hp <= 0) {
            game.hp = Math.floor(game.maxHp * 0.6);
            game.message = ` 💀 Вы погибли! Восстановлено 60% HP.`;
            game.inCombat = false;
            game.combatEnemy = null;
        }
        saveGame();
        renderGame();
    }
    
    function startFight() {
        if (game.inCombat) return;
        if (game.hp < game.maxHp * 0.2) { game.message = "❌ Мало HP, восстановитесь у торговца!"; renderGame(); return; }
        
        if (game.location === "dungeon") {
            if (game.dungeonFloor % 20 === 0) {
                let boss = getDungeonBoss(game.dungeonFloor);
                game.inCombat = true;
                game.combatEnemy = boss;
                game.enemyCurrentHp = boss.hp;
                game.message = `⚔️ БОЙ С БОССОМ ПОДЗЕМЕЛЬЯ! ${boss.icon} ${boss.name} (этаж ${game.dungeonFloor}) ⚔️`;
            } else {
                let enemy = getDungeonMonster(game.dungeonFloor);
                game.inCombat = true;
                game.combatEnemy = enemy;
                game.enemyCurrentHp = enemy.hp;
                game.message = `⚔️ БОЙ! ${enemy.icon || "🏰"} ${enemy.name} (этаж ${game.dungeonFloor}) ⚔️`;
            }
            renderGame();
            return;
        }
        
        if (game.monstersKilled >= game.needToKill) {
            let boss = getBossForLocation(game.location);
            game.inCombat = true;
            game.combatEnemy = boss;
            game.enemyCurrentHp = boss.hp;
            game.message = `⚔️ БОЙ С БОССОМ! ${boss.icon} ${boss.name} ⚔️`;
        } else {
            let enemy = getMonsterForLocation(game.location);
            game.inCombat = true;
            game.combatEnemy = enemy;
            game.enemyCurrentHp = enemy.hp;
            game.message = `⚔️ БОЙ! ${enemy.icon || "👾"} ${enemy.name} ⚔️`;
        }
        renderGame();
    }
    
    function changeLocation(key) {
        if (game.inCombat) { game.message = "❌ Сначала закончите бой!"; renderGame(); return; }
        let loc = LOCATIONS[key];
        if (!loc) return;
        if (game.level < loc.levelReq) { game.message = `❌ Нужен ${loc.levelReq} уровень!`; renderGame(); return; }
        if (game.travelEnergy < loc.energyCost) { game.message = `❌ Нужно ${loc.energyCost} энергии!`; renderGame(); return; }
        game.travelEnergy -= loc.energyCost;
        game.location = key;
        game.monstersKilled = 0;
        game.message = `🚶 Переход в ${loc.name}`;
        saveGame();
        renderGame();
    }
    
    function usePotion() { let heal = Math.floor(game.maxHp * 0.35); let cost = Math.max(80, Math.floor(game.maxHp * 0.06)); if (game.gold < cost) { game.message = `💰 Нужно ${cost} золота!`; renderGame(); return; } game.gold -= cost; game.hp = Math.min(game.maxHp, game.hp + heal); game.message = `🧪 +${heal} HP (${cost}💰)`; saveGame(); renderGame(); }
    function restoreEnergy() { let cost = Math.max(80, Math.floor(game.level * 2.5)); if (game.gold < cost) { game.message = `💰 Нужно ${cost} золота!`; renderGame(); return; } game.gold -= cost; game.travelEnergy = game.maxTravelEnergy; game.message = `⚡ Энергия восстановлена! (${cost}💰)`; saveGame(); renderGame(); }
    
    function craftMythicItem(item) {
        if (!item.craftCost) return;
        let canCraft = true;
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") { if (game.gold < amount) canCraft = false; }
            else if ((game.resources[res] || 0) < amount) canCraft = false;
        }
        if (!canCraft) { game.message = "❌ Не хватает ресурсов для крафта!"; renderGame(); return; }
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") game.gold -= amount;
            else game.resources[res] -= amount;
        }
        game.inventory.push(JSON.parse(JSON.stringify(item)));
        game.craftCount++;
        updateQuestProgress("craft", null, 1);
        game.message = `🔨 Вы скрафтили ${item.type === "weapon" ? "оружие" : "броню"} ${item.name}!`;
        saveGame();
        renderGame();
    }
    
    function equipItem(item) { 
        if (item.type === "weapon") game.weapon = item; 
        else if (item.type === "armor") game.armor = item; 
        game.message = `🔧 Экипировано: ${item.name}`; 
        saveGame(); 
        renderGame(); 
    }
    
    function buyItem(item) { if (game.gold < item.price) { game.message = `💰 Не хватает ${item.price} золота!`; renderGame(); return; } game.gold -= item.price; game.inventory.push(JSON.parse(JSON.stringify(item))); game.message = `🛒 Куплено: ${item.name} за ${item.price}💰`; saveGame(); renderGame(); }
    
    function buyAlchemistItem(item) {
        let purchased = getAlchemistPurchasedToday(item.name);
        if (purchased >= 5) { game.message = `❌ Сегодня вы уже купили ${item.name} 5 раз! Лимит на день.`; renderGame(); return; }
        if (game.gold < item.price) { game.message = `💰 Нужно ${item.price} золота!`; renderGame(); return; }
        game.gold -= item.price;
        game.resources[item.resName] = (game.resources[item.resName] || 0) + item.amount;
        game.alchemistPurchases[item.name] = purchased + 1;
        updateQuestProgress("resource", item.resName, item.amount);
        game.message = `🧪 Куплено: ${item.name} +${item.amount} за ${item.price}💰 (осталось лимитов: ${5 - purchased - 1})`;
        saveGame();
        renderGame();
    }
    
    function resetGame() {
        if (confirm("Сбросить весь прогресс?")) {
            if (game.profileName) { localStorage.removeItem("rpg_mega_" + game.profileName); if (window.Telegram?.WebApp?.CloudStorage) Telegram.WebApp.CloudStorage.removeItem("rpg_mega_" + game.profileName); }
            game.initialized = false;
            renderGame();
        }
    }
    
    function startDungeon(floor) {
        if (game.inCombat) { game.message = "❌ Сначала закончите бой!"; renderGame(); return; }
        if (floor > game.maxUnlockedFloor) { game.message = `❌ Вы не достигли ${floor} этажа!`; renderGame(); return; }
        let energyCost = Math.max(3, Math.floor(floor / 25) + 2);
        if (game.travelEnergy < energyCost) { game.message = `❌ Нужно ${energyCost} энергии!`; renderGame(); return; }
        game.travelEnergy -= energyCost;
        game.location = "dungeon";
        game.dungeonFloor = floor;
        game.message = `🏰 Вход в подземелье на этаж ${floor}! Энергия: -${energyCost}`;
        saveGame();
        renderGame();
    }
    
    function takeQuest(quest) {
        if (game.activeQuests.some(q => q.id === quest.id)) { game.message = "❌ Вы уже взяли этот квест!"; renderGame(); return; }
        let newQuest = JSON.parse(JSON.stringify(quest));
        newQuest.progress = 0;
        game.activeQuests.push(newQuest);
        game.message = `📜 Взят квест: ${quest.name}!`;
        renderGame();
    }
    
    function createCharacter(name, cls) {
        if (!name.trim()) return;
        let c = CLASSES[cls];
        game.profileName = name; game.class = cls; game.gold = 5000; game.level = 1; game.exp = 0; game.expToNext = 100;
        game.maxHp = 95 + (c.hpBonus || 0); game.hp = game.maxHp; game.travelEnergy = 55; game.maxTravelEnergy = 55;
        game.monstersKilled = 0; game.dungeonFloor = 1; game.maxUnlockedFloor = 1; game.completedLocations = [];
        game.craftCount = 0; game.activeQuests = []; game.resources = {};
        for (let r of ALL_RESOURCES.slice(0,5)) game.resources[r] = Math.floor(Math.random() * 2);
        game.resources["Целебная трава"] = 5; game.resources["Железная руда"] = 3;
        game.weapon = { name: c.weapon, type: "weapon", strBonus: c.strBonus, price: 0, rarity: "common" };
        game.armor = { name: "Кожаный доспех", type: "armor", defBonus: 5, price: 150, rarity: "common" };
        game.inventory = [game.weapon, game.armor];
        game.lastDailyReset = new Date().toDateString(); game.lastAlchemistReset = new Date().toDateString(); game.alchemistPurchases = {};
        game.locationPassCount = {};
        updateDailyShop(); updateDailyAlchemist();
        game.tutorialShown = false; game.message = `✨ Добро пожаловать, ${name} ${c.name}!`; game.initialized = true;
        saveGame(); renderGame();
    }
    
    function talkToTavern() { game.message = `🍺 Трактирщик: Что привело тебя, путник? Хочешь заработать?`; renderGame(); }
    function selectCraftItem(item) { game.selectedCraftItem = item; renderGame(); }
    
    function renderGame() {
        let container = document.getElementById("rpgGame");
        if (!container) return;
        if (!game.initialized) {
            let savedNames = [];
            for (let i = 0; i < localStorage.length; i++) { let key = localStorage.key(i); if (key && key.startsWith("rpg_mega_")) savedNames.push(key.replace("rpg_mega_", "")); }
            let savedHtml = savedNames.length ? `<div class="save-load-panel"><b>💾 Загрузить сохранение:</b><br>${savedNames.map(n => `<button onclick="loadGame('${n}')">📀 ${n}</button>`).join(' ')}</div><hr>` : "";
            let selected = "warrior";
            container.innerHTML = savedHtml + `<div class="class-selector" id="classSel">` + Object.keys(CLASSES).map(k => `<div class="class-option ${selected === k ? 'selected' : ''}" data-class="${k}">${CLASSES[k].icon} ${CLASSES[k].name}<br><span style="font-size:0.6rem;">⚔️ ${CLASSES[k].strBonus} 💪 ${CLASSES[k].hpBonus}</span></div>`).join('') + `</div><input id="pname" placeholder="Имя героя"><button id="createBtn" style="background:#f7d44a;">🚀 НАЧАТЬ</button>`;
            document.getElementById("createBtn").onclick = () => { createCharacter(document.getElementById("pname").value, selected); };
            document.querySelectorAll(".class-option").forEach(el => { el.onclick = function() { document.querySelectorAll(".class-option").forEach(c => c.classList.remove("selected")); this.classList.add("selected"); selected = this.dataset.class; }; });
            return;
        }
        
        updateDailyShop(); updateDailyAlchemist();
        let hpPerc = (game.hp / game.maxHp) * 100;
        let travPerc = (game.travelEnergy / game.maxTravelEnergy) * 100;
        let healCost = Math.max(80, Math.floor(game.maxHp * 0.06));
        let energyCost = Math.max(80, Math.floor(game.level * 2.5));
        
        let locsHtml = Object.keys(LOCATIONS).map(k => {

        // КУЗНЕЦ
        let traderHtml = `<div class="trader-section"><h4>⚒️ КУЗНЕЦ БРОНИСЛАВ</h4><div style="font-size:0.7rem; color:#f7d44a;">🔄 Товары обновляются каждый день</div>`;
        traderHtml += `<div><b>⚔️ ОРУЖИЕ (6 шт.):</b></div>`;

                <div><select id="giveResourceSelect">${ALL_RESOURCES.map(r => `<option value="${r}">${r}</option>`).join('')}</select>
                <input type="number" id="giveAmount" value="10" style="width:70px;">
                <button onclick="giveToPlayer(document.getElementById('givePlayerNick').value || game.profileName, 'resource', document.getElementById('giveResourceSelect').value, parseInt(document.getElementById('giveAmount').value))">🌿 Выдать ресурс</button></div>
                <div><select id="giveItemSelect">${ALL_ITEMS_FOR_GIVE.map(i => `<option value='${JSON.stringify(i).replace(/'/g, "&apos;")}'>${i.type==="weapon"?"⚔️":"🛡️"} ${i.name} +${i.strBonus||i.defBonus}</option>`).join('')}</select>
                <button onclick="let item=JSON.parse(document.getElementById('giveItemSelect').value.replace(/&apos;/g, \"'\")); giveToPlayer(document.getElementById('givePlayerNick').value || game.profileName, item.type, item)">🎁 Выдать предмет</button></div>
                <hr><div><b>⚠️ СБРОС ПРОГРЕССА</b><br><input type="text" id="resetPlayerNick" placeholder="Ник игрока"><button onclick="resetPlayerProgress(document.getElementById('resetPlayerNick').value)" style="background:#8b3c2c;">💀 СБРОСИТЬ</button></div>
                <hr><div><b>⚡ ДЛЯ СЕБЯ:</b></div>
                <button onclick="game.gold+=1000000; saveGame(); renderGame();">💰 +1M золота</button>
                <button onclick="addExp(100000)">✨ +100k опыта</button>
                <button onclick="game.travelEnergy=game.maxTravelEnergy; saveGame(); renderGame();">⚡ Полная энергия</button>
                <button onclick="game.dungeonFloor+=50; game.maxUnlockedFloor=Math.max(game.maxUnlockedFloor,game.dungeonFloor); saveGame(); renderGame();">📈 +50 этажей</button>
                <button onclick="for(let r of ${JSON.stringify(MYTHIC_RESOURCES)}){game.resources[r]=(game.resources[r]||0)+50;} saveGame(); renderGame();">💎 Мифич. ресурсы +50</button>
                <hr><button onclick="resetGame()">⚠️ Сбросить СВОЙ прогресс</button>
            </div>`;
        }
        
        let secretAdminBtn = `<div class="admin-secret-btn" onclick="enableAdmin()">🔧 СЛУЖЕБНЫЙ ВХОД</div>`;
        let monsterCounterHtml = (game.location !== "dungeon") ? `<div class="fight-counter">🏆 УБИТО МОНСТРОВ: ${game.monstersKilled}/${game.needToKill} ${game.monstersKilled >= game.needToKill ? '👑 БОСС ДОСТУПЕН' : ''}</div>` : `<div class="fight-counter">🏰 ЭТАЖ: ${game.dungeonFloor} | БОСС КАЖДЫЕ 20 ЭТАЖЕЙ</div>`;
        
        container.innerHTML = `
        <div class="tab-bar">
            <div class="tab-btn ${game.activeTab === 'game' ? 'active' : ''}" data-tab="game">⚔️ БОЙ</div>
            <div class="tab-btn ${game.activeTab === 'trader' ? 'active' : ''}" data-tab="trader">🏪 ТОРГОВЕЦ</div>
            <div class="tab-btn ${game.activeTab === 'tavern' ? 'active' : ''}" data-tab="tavern">🍺 ТАВЕРНА</div>
            <div class="tab-btn ${game.activeTab === 'inventory' ? 'active' : ''}" data-tab="inventory">📦 ИНВЕНТАРЬ</div>
        </div>
        <div id="tab-game" class="tab-content ${game.activeTab === 'game' ? 'active' : ''}">
            <div class="stats-panel">${['❤️ ' + Math.floor(game.hp) + '/' + game.maxHp, '⚔️ ' + getStrength(), '🛡️ ' + getDefense(), `⭐ Ур.${game.level}`, `💰 ${game.gold}`, `✨ ${game.exp}/${game.expToNext}`].map(s => `<span class="stat">${s}</span>`).join('')}</div>
            <div>❤️ ЗДОРОВЬЕ</div><div class="energy-bar"><div class="energy-fill" style="width:${hpPerc}%; background:#ff4444;"></div></div>
            <div>🚶 ЭНЕРГИЯ ПУТИ</div><div class="energy-bar"><div class="energy-fill" style="width:${travPerc}%;"></div></div>
            ${monsterCounterHtml}
            <div class="button-group"><button id="fightBtn">⚔️ БОЙ</button><button id="potionBtn">🧪 ЗЕЛЬЕ (${healCost}💰)</button><button id="energyBtn">⚡ ВОССТ (${energyCost}💰)</button></div>
            <div class="location-grid">${locsHtml}</div>
            <div><button onclick="game.activeTab='dungeon'; renderGame()" style="background:#8b4513; width:100%;">🏰 ПОДЗЕМЕЛЬЕ (этаж ${game.dungeonFloor})</button></div>
            ${fightBlock}
            <div class="message-log">💬 ${game.message}</div>
            <button id="resetBtn" style="width:100%; margin-top:8px; background:#8b3c2c;">🔄 СБРОСИТЬ ПРОГРЕСС</button>
        </div>
        <div id="tab-dungeon" class="tab-content ${game.activeTab === 'dungeon' ? 'active' : ''}">
            <div><b>🏰 ПОДЗЕМЕЛЬЕ</b><p>Выберите этаж (до ${game.maxUnlockedFloor})</p><div class="dungeon-floor-select">${dungeonFloors.join('')}</div><button onclick="game.activeTab='game'; renderGame()">🔙 Назад</button></div>
        </div>
        <div id="tab-trader" class="tab-content ${game.activeTab === 'trader' ? 'active' : ''}">${traderHtml}</div>
        <div id="tab-tavern" class="tab-content ${game.activeTab === 'tavern' ? 'active' : ''}">${tavernHtml}</div>
        <div id="tab-inventory" class="tab-content ${game.activeTab === 'inventory' ? 'active' : ''}">
            <div><b>⚔️ ОРУЖИЕ:</b> <span class="rarity-${game.weapon?.rarity || 'common'}">${game.weapon?.name || "нет"} +${game.weapon?.strBonus || 0}</span></div>
            <div><b>🛡️ БРОНЯ:</b> <span class="rarity-${game.armor?.rarity || 'common'}">${game.armor?.name || "нет"} +${game.armor?.defBonus || 0}</span></div>
            <hr><div><b>📦 ИНВЕНТАРЬ (${game.inventory.length})</b></div><div style="display:flex; flex-wrap:wrap;">${invHtml}</div>
            <hr>${resourceGroupsHtml}
            ${secretAdminBtn}${adminBlock}
        </div>`;
        
        document.getElementById("fightBtn")?.addEventListener("click", startFight);
        document.getElementById("potionBtn")?.addEventListener("click", usePotion);
        document.getElementById("energyBtn")?.addEventListener("click", restoreEnergy);
        document.getElementById("resetBtn")?.addEventListener("click", resetGame);
        document.getElementById("attackBtn")?.addEventListener("click", attack);
        document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", function() { game.activeTab = this.dataset.tab; renderGame(); }));
    }
    
    window.changeLocation = changeLocation;
    window.equipItem = equipItem;
    window.craftMythicItem = craftMythicItem;
    window.buyItem = buyItem;
    window.buyAlchemistItem = buyAlchemistItem;
    window.usePotion = usePotion;
    window.restoreEnergy = restoreEnergy;
    window.takeQuest = takeQuest;
    window.startDungeon = startDungeon;
    window.loadGame = loadGame;
    window.talkToTavern = talkToTavern;
    window.selectCraftItem = selectCraftItem;
    window.enableAdmin = enableAdmin;
    window.giveToPlayer = giveToPlayer;
    window.resetPlayerProgress = resetPlayerProgress;
    
    if (window.Telegram && window.Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
    renderGame();
</script>
</body>
</html>
