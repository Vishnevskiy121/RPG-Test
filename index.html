    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #0a0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 12px; min-height: 100vh; color: #fff; }
        .game-container { max-width: 550px; margin: 0 auto; background: #0f0e17; border-radius: 28px; padding: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid #f7d44a55; }
        .stats-panel { background: #1e1b2b; border-radius: 20px; padding: 10px; margin-bottom: 12px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 6px; }
        .stat { background: #00000099; padding: 6px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: bold; color: #f7d44a; }
        .energy-bar { background: #2a1a2a; border-radius: 20px; height: 8px; margin-top: 5px; overflow: hidden; }
        .energy-fill { background: #4cff4c; height: 100%; transition: width 0.2s; }
        .energy-fill.travel { background: #ffaa44; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: #2a2438; padding: 8px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; cursor: pointer; color: #fff; }
        .tab-btn.active { background: #f7d44a; color: #1e1b2b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .location-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; margin: 12px 0; max-height: 260px; overflow-y: auto; }
        .location-btn { background: #3a2c45; padding: 6px 4px; border-radius: 30px; font-size: 0.6rem; text-align: center; cursor: pointer; color: white; }
        .location-btn.locked { opacity: 0.5; cursor: not-allowed; background: #5a3e2e; }
        .location-btn.completed { background: #2a6b4a; border: 1px solid gold; }
        .admin-panel { background: #2c1e2e; border-radius: 20px; padding: 12px; margin-top: 15px; border: 2px solid #ff00ff; display: none; }
        .admin-panel.show { display: block; }
        .admin-input, .admin-select { background: #1e1b2b; color: #f7d44a; border: 1px solid gold; border-radius: 30px; padding: 6px 10px; margin: 5px; width: 45%; }
        .npc-panel, .craft-panel { background: #1a3a2a; border-radius: 20px; padding: 12px; margin-top: 10px; }
        .message-log { background: #000000aa; border-radius: 16px; padding: 8px; margin-top: 12px; font-size: 0.7rem; color: #bdaa88; max-height: 90px; overflow-y: auto; }
        .character-form { text-align: center; padding: 20px; }
        .character-form input { display: block; margin: 15px auto; padding: 12px; width: 85%; background: #1e1b2b; color: #f7d44a; border: 1px solid #f7d44a; border-radius: 40px; font-size: 1rem; text-align: center; }
        .sprite-area { text-align: center; font-size: 3rem; background: #00000055; border-radius: 50px; padding: 12px; margin-bottom: 12px; }
        button { background: #3a2c45; border: none; padding: 8px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: bold; color: white; cursor: pointer; margin: 4px; }
        button:active { transform: scale(0.96); }
        .reset-btn { background: #5a3e2e; }
        .run-btn { background: #2f6b4a; }
        .boss-btn { background: #8b3c2c; font-weight: bold; }
        .autofight-btn { background: #2f6b4a; }
        .autofight-btn.active { background: #00aa44; }
        .fight-counter { background: #1a1530; border-radius: 20px; padding: 8px; text-align: center; margin: 10px 0; font-size: 0.8rem; }
        .class-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        .class-option { background: #2a2438; padding: 8px; border-radius: 16px; text-align: center; cursor: pointer; border: 1px solid #f7d44a55; }
        .class-option.selected { background: #f7d44a; color: #1e1b2b; border: 2px solid gold; }
        .resource-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .resource-badge { background: #1e1b2b; padding: 4px 8px; border-radius: 20px; font-size: 0.55rem; }
        .rarity-badge { font-size: 0.5rem; padding: 2px 6px; border-radius: 12px; display: inline-block; margin-left: 5px; }
        .rarity-common { background: #666; color: white; }
        .rarity-rare { background: #3388ff; color: white; }
        .rarity-epic { background: #aa44ff; color: white; }
        .rarity-legendary { background: #ffaa00; color: #1e1b2b; }
        .rarity-mythic { background: #ff44ff; color: #1e1b2b; }
    </style>
</head>

                    resolve(!err);
                });
            } else {
                localStorage.setItem(key, data);
                resolve(true);
            }
        });
    }
    
    async function loadData(key) {
        return new Promise(function(resolve) {
            if (tg && tg.CloudStorage) {
                tg.CloudStorage.getItem(key, function(err, val) {
                    if (err || !val) {
                        resolve(null);
                    } else {
                        resolve(val);
                    }
                });
            } else {
                resolve(localStorage.getItem(key));
            }
        });
    }
    
    async function deleteData(key) {
        return new Promise(function(resolve) {
            if (tg && tg.CloudStorage) {

    async function loadGame(id) {
        let raw = await loadData("rpg_" + id);
        if (raw) {
            let data = JSON.parse(raw);
            game.initialized = data.initialized || false;

    async function createCharacter(name, className) {
        if (!name.trim()) {
            alert("Введите имя героя!");
            return false;
        }
        if (!/^[a-zA-Zа-яА-Я0-9_]+$/.test(name)) {
            alert("Имя может содержать только буквы, цифры и _");
            return false;
        }
        
        let cls = CLASSES[className];
        if (!cls) return false;
        
        game.profileName = name;
        game.class = className;
        game.telegramId = getTelegramId();
        game.gold = 500;
        game.level = 1;
        game.exp = 0;
        game.expToNext = 100;
        game.combatEnergy = 100 + (cls.hpBonus || 0);
        game.maxCombatEnergy = 100 + (cls.hpBonus || 0);
        game.travelEnergy = 50;
        game.maxTravelEnergy = 50;
        game.monstersKilled = 0;
        game.needToKill = 15;
        
        game.resources = {
            "Целебная трава": 5,
            "Магический гриб": 3,
            "Мифический цветок": 0,
            "Медная руда": 0,
            "Железная руда": 0,
            "Мифриловая руда": 0,
            "Малая эссенция": 0,
            "Средняя эссенция": 0,
            "Великая эссенция": 0
        };
        
        game.potions = {
            weak: 3,
            medium: 1,
            strong: 0
        };
        
        let startWeapon = {
            name: cls.weapon,
            type: "weapon",
            strBonus: cls.strBonus,
            rarity: "common"
        };
        
        let startArmor = {
            name: "Кожаная броня",
            type: "armor",
            defBonus: 2,
            rarity: "common"
        };
        
        game.weapon = startWeapon;
        game.armor = startArmor;
        game.inventory = [startWeapon, startArmor];
        game.location = "village";
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.completedLocations = [];
        game.isAdmin = isAdmin();
        game.message = "✨ Добро пожаловать, " + name + "-" + cls.name + "! ✨\n🏆 Победите 15 монстров, чтобы открыть босса!";
        game.initialized = true;
        
        await saveGame();
        renderGame();
        return true;
    }
    
    // ==================== РАСЧЁТ ХАРАКТЕРИСТИК ====================
    function getTotalDefense() {
        let def = 0;
        if (game.armor && game.armor.defBonus) {
            def += game.armor.defBonus;
        }
        return def;
    }
    
    function getTotalStrength() {
        if (game.weapon && game.weapon.strBonus) {
            return game.weapon.strBonus;
        }
        return 2;
    }
    
    function getCurrentStats() {
        let cls = CLASSES[game.class] || CLASSES.warrior;
        let str = 10 + game.level * 2 + getTotalStrength() + (cls.strBonus || 0);
        let def = 5 + game.level + getTotalDefense() + (cls.defBonus || 0);
        let dodgeBonus = cls.dodgeBonus || 0;
        
        return {
            hp: game.combatEnergy,
            maxHp: game.maxCombatEnergy,
            str: str,
            def: def,
            dodgeBonus: dodgeBonus
        };
    }
    
    // ==================== ДОСТУП К ЛОКАЦИЯМ ====================
    function canAccessLocation(locKey) {
        if (game.isAdmin) return true;
        
        let loc = LOCATIONS[locKey];
        if (!loc) return false;
        
        if (game.level < loc.requiredLevel) return false;
        if (loc.isDungeon) return true;
        if (loc.order === 0) return true;
        
        let prevLocations = Object.values(LOCATIONS).filter(function(l) {
            return l.order === loc.order - 1;
        });
        
        for (let i = 0; i < prevLocations.length; i++) {
            let prevLoc = prevLocations[i];
            let prevKey = null;
            for (let k in LOCATIONS) {
                if (LOCATIONS[k] === prevLoc) {
                    prevKey = k;
                    break;
                }
            }
            if (prevKey && !game.completedLocations.includes(prevKey)) {
                return false;
            }
        }
        return true;
    }
    
    // ==================== ПОЛУЧЕНИЕ ВРАГА ====================
    function getRandomEnemy() {
        let enemiesList = Object.values(ENEMIES);
        let randomIndex = Math.floor(Math.random() * enemiesList.length);
        let e = JSON.parse(JSON.stringify(enemiesList[randomIndex]));
        
        let bonus = Math.floor(game.level / 2);
        e.hp += bonus * 5;
        e.str += bonus * 2;
        e.def += bonus;
        e.exp += bonus * 8;
        e.gold += bonus * 5;
        
        return e;
    }
    
    function getBoss(locKey) {
        let loc = LOCATIONS[locKey];
        if (!loc || !loc.boss) return null;
        
        let b = JSON.parse(JSON.stringify(loc.boss));
        let bonus = Math.floor(game.level / 2);
        
        b.hp += bonus * 10;
        b.str += bonus * 3;
        b.def += bonus * 2;
        b.exp += bonus * 20;
        b.gold += bonus * 30;
        b.isBoss = true;
        b.dodgeChance = 10;
        
        return b;
    }
    
    // ==================== ОПЫТ И УРОВНИ ====================
    async function gainExp(amount) {
        game.exp += amount;
        game.message += " +" + amount + "✨";
        
        while (game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxCombatEnergy += 5;
            game.maxTravelEnergy += 2;
            game.combatEnergy = game.maxCombatEnergy;
            game.travelEnergy = game.maxTravelEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += " ✨ УРОВЕНЬ " + game.level + "! ✨";
            await saveGame();
        }
        
        renderGame();
    }
    
    // ==================== БОЕВЫЕ ДЕЙСТВИЯ ====================
    async function combatAction(action) {
        if (!game.inCombat) return;
        
        let enemy = game.combatEnemy;
        let stats = getCurrentStats();
        
        if (game.enemyCurrentHp <= 0) {
            game.gold += enemy.gold;
            await gainExp(enemy.exp);
            
            if (!enemy.isBoss) {
                game.monstersKilled++;
            }
            
            let energyBack = enemy.isBoss ? 15 : 8;
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + energyBack);
            game.message = "🏆 Победа! +" + enemy.gold + "💰 +" + enemy.exp + "✨ +" + energyBack + "⚡";
            
            if (enemy.isBoss) {
                if (!game.completedLocations.includes(game.location)) {
                    game.completedLocations.push(game.location);
                    game.message += "\n🏆 БОСС ПОБЕЖДЁН! Локация завершена!";
                    game.monstersKilled = 0;
                }
                game.inCombat = false;
                game.combatEnemy = null;
                if (game.autoFightActive) stopAutoFight();
                await saveGame();
                renderGame();
                return;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            await saveGame();
            
            if (game.autoFightActive && !enemy.isBoss && game.monstersKilled < game.needToKill) {
                if (game.combatEnergy > 10) {
                    renderGame();
                    setTimeout(function() {
                        startRandomFight();
                    }, 200);
                } else {
                    stopAutoFight();
                }
            } else {
                renderGame();
            }
            return;
        }
        
        if (stats.hp <= 0) {
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 3);
            game.message = "💀 Поражение... Возвращено 3⚡";
            game.inCombat = false;
            game.combatEnemy = null;
            if (game.autoFightActive) stopAutoFight();
            await saveGame();
            renderGame();
            return;
        }
        
        if (action === "use_potion") {
            let used = false;
            
            if (game.potions.strong > 0) {
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 50);
                game.potions.strong--;
                game.message = "💊 Мощное зелье +50 HP!";
                used = true;
            } else if (game.potions.medium > 0) {
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 25);
                game.potions.medium--;
                game.message = "🧪 Среднее зелье +25 HP!";
                used = true;
            } else if (game.potions.weak > 0) {
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 10);
                game.potions.weak--;
                game.message = "🍃 Слабое зелье +10 HP!";
                used = true;
            } else {
                game.message = "❌ Нет зелий!";
                renderGame();
                return;
            }
            
            if (used) {
                let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                game.combatEnergy -= enemyDmg;
                if (game.combatEnergy < 0) game.combatEnergy = 0;
                game.message += " | Враг атакует → -" + enemyDmg + " HP";
                await saveGame();
                renderGame();
            }
            return;
        }
        
        if (action === "attack") {
            let dmg = Math.max(1, stats.str + Math.floor(Math.random() * 8) - enemy.def);
            game.enemyCurrentHp -= dmg;
            game.message = "⚡ Урон " + dmg + " по " + enemy.name;
            
            let dodgeChance = stats.dodgeBonus + (Math.random() * 100);
            if (dodgeChance < 15) {
                game.message += " ✨ Уворот!";
            } else {
                let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                game.combatEnergy -= enemyDmg;
                game.message += " | Враг атакует → -" + enemyDmg + " HP";
            }
            
            if (game.combatEnergy < 0) game.combatEnergy = 0;
            await saveGame();
            renderGame();
            return;
        }
    }
    
    // ==================== НАЧАЛО БОЯ ====================
    function startRandomFight() {
        if (game.completedLocations.includes(game.location)) {
            game.message = "Босс уже побеждён! Переходите на следующую локацию.";
            renderGame();
            return;
        }
        
        if (game.monstersKilled >= game.needToKill) {
            game.message = "✨ Вы убили " + game.needToKill + " монстров! БОСС ДОСТУПЕН! ✨";
            renderGame();
            return;
        }
        
        if (game.combatEnergy < 10 && !game.isAdmin) {
            game.message = "❌ Недостаточно энергии!";
            renderGame();
            return;
        }
        
        if (!game.isAdmin) {
            game.combatEnergy -= 10;
        }
        
        let enemy = getRandomEnemy();
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = "⚔️ БОЙ " + (game.monstersKilled + 1) + "/" + game.needToKill + ": " + enemy.icon + " " + enemy.name;
        renderGame();
    }
    
    function startBossFight() {
        if (game.completedLocations.includes(game.location)) {
            game.message = "Босс уже побеждён! Переходите на следующую локацию.";
            renderGame();
            return;
        }
        
        if (game.monstersKilled < game.needToKill && !game.isAdmin) {
            game.message = "❌ Нужно убить ещё " + (game.needToKill - game.monstersKilled) + " монстров, чтобы открыть босса!";
            renderGame();
            return;
        }
        
        let boss = getBoss(game.location);
        if (!boss) {
            game.message = "Здесь нет босса!";
            renderGame();
            return;
        }
        
        if (game.combatEnergy < 15 && !game.isAdmin) {
            game.message = "❌ Недостаточно энергии для боя с боссом!";
            renderGame();
            return;
        }
        
        if (!game.isAdmin) {
            game.combatEnergy -= 15;
        }
        
        game.inCombat = true;
        game.combatEnemy = boss;
        game.enemyCurrentHp = boss.hp;
        game.message = "⚔️ БОЙ С БОССОМ: " + boss.icon + " " + boss.name;
        renderGame();
    }
    
    function startDungeonFight() {
        if (game.dungeonFloor > 1000) {
            game.message = "🎉 ПОЗДРАВЛЯЮ! Ты прошёл все 1000 этажей! 🎉";
            renderGame();
            return;
        }
        
        let isBoss = (game.dungeonFloor % 20 === 0);
        let enemy;
        
        if (isBoss) {
            enemy = {
                name: "👑 БОСС " + game.dungeonFloor + " этажа 👑",
                hp: 150 + game.dungeonFloor * 2,
                str: 30 + Math.floor(game.dungeonFloor / 2),
                def: 15 + Math.floor(game.dungeonFloor / 5),
                exp: 300 + game.dungeonFloor * 8,
                gold: 200 + game.dungeonFloor * 10,
                icon: "👑",
                isBoss: true
            };
        } else {
            enemy = {
                name: "Страж " + game.dungeonFloor + " этажа",
                hp: 50 + Math.floor(game.dungeonFloor * 1.5),
                str: 15 + Math.floor(game.dungeonFloor / 3),
                def: 8 + Math.floor(game.dungeonFloor / 6),
                exp: 60 + game.dungeonFloor * 2,
                gold: 40 + game.dungeonFloor * 3,
                icon: "👹"
            };
        }
        
        if (game.combatEnergy < 10 && !game.isAdmin) {
            game.message = "❌ Недостаточно энергии!";
            renderGame();
            return;
        }
        
        if (!game.isAdmin) {
            game.combatEnergy -= 10;
        }
        
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = "⚔️ ПОДЗЕМЕЛЬЕ " + game.dungeonFloor + " этаж: " + enemy.icon + " " + enemy.name;
        renderGame();
    }
    
    function goToFloor(floor) {
        floor = Math.min(1000, Math.max(1, floor));
        
        if (game.isAdmin || floor <= game.maxUnlockedFloor + 10) {
            game.dungeonFloor = floor;
            if (floor > game.maxUnlockedFloor) {
                game.maxUnlockedFloor = floor;
            }
            game.message = "📍 Переход на " + floor + " этаж";
            renderGame();
        } else {
            game.message = "❌ Нельзя перейти на " + floor + " этаж!";
            renderGame();
        }
    }
    
    // ==================== АВТОБОЙ ====================
    function startAutoFight() {
        if (game.completedLocations.includes(game.location)) {
            game.message = "Босс уже побеждён!";
            renderGame();
            return;
        }
        
        if (game.monstersKilled >= game.needToKill) {
            game.message = "✨ Вы убили " + game.needToKill + " монстров! БОСС ДОСТУПЕН! ✨";
            renderGame();
            return;
        }
        
        if (game.autoFightActive) {
            stopAutoFight();
            return;
        }
        
        game.autoFightActive = true;
        game.message = "🟢 АВТОБОЙ ВКЛЮЧЁН!";
        renderGame();
        
        function nextFight() {
            if (!game.autoFightActive) return;
            if (game.inCombat) return;
            if (game.completedLocations.includes(game.location)) {
                stopAutoFight();
                game.message = "Босс побеждён!";
                renderGame();
                return;
            }
            if (game.monstersKilled >= game.needToKill) {
                stopAutoFight();
                game.message = "БОСС ДОСТУПЕН!";
                renderGame();
                return;
            }
            if (game.combatEnergy < 10 && !game.isAdmin) {
                stopAutoFight();
                game.message = "Недостаточно энергии!";
                renderGame();
                return;
            }
            startRandomFight();
        }
        
        game.autoFightInterval = setInterval(function() {
            if (game.autoFightActive && !game.inCombat) {
                nextFight();
            }
        }, 800);
    }
    
    function stopAutoFight() {
        game.autoFightActive = false;
        if (game.autoFightInterval) {
            clearInterval(game.autoFightInterval);
            game.autoFightInterval = null;
        }
    }
    
    // ==================== ПЕРЕМЕЩЕНИЕ ====================
    function changeLocation(locKey) {
        if (game.location !== "village" && game.location !== locKey) {
            let currentLocCompleted = game.completedLocations.includes(game.location);
            if (!currentLocCompleted && !game.isAdmin) {
                game.message = "❌ Сначала победите босса в текущей локации!";
                renderGame();
                return;
            }
        }
        
        if (!canAccessLocation(locKey)) {
            game.message = "❌ Сначала победите босса в предыдущей локации!";
            renderGame();
            return;
        }
        
        let loc = LOCATIONS[locKey];
        if (!loc) return;
        
        if (game.travelEnergy >= loc.energyCost || game.isAdmin) {
            if (!game.isAdmin) {
                game.travelEnergy -= loc.energyCost;
            }
            game.location = locKey;
            game.monstersKilled = 0;
            if (game.completedLocations.includes(locKey)) {
                game.monstersKilled = game.needToKill;
            }
            game.message = "🚶 Переход в " + loc.name;
            renderGame();
        } else {
            game.message = "❌ Недостаточно энергии!";
            renderGame();
        }
    }
    
    // ==================== ЗЕЛЬЯ И ЭНЕРГИЯ ====================
    async function usePotion(type) {
        if (type === "weak" && game.potions.weak > 0) {
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 10);
            game.potions.weak--;
            game.message = "🍃 Слабое зелье +10 HP! Осталось: " + game.potions.weak;
        } else if (type === "medium" && game.potions.medium > 0) {
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 25);
            game.potions.medium--;
            game.message = "🧪 Среднее зелье +25 HP! Осталось: " + game.potions.medium;
        } else if (type === "strong" && game.potions.strong > 0) {
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 50);
            game.potions.strong--;
            game.message = "💊 Мощное зелье +50 HP! Осталось: " + game.potions.strong;
        } else {
            game.message = "❌ Нет таких зелий!";
        }
        await saveGame();
        renderGame();
    }
    
    async function buyEnergy() {
        if (game.gold >= 250) {
            game.gold -= 250;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 5);
            game.message = "🍺 +5 энергии путешествий!";
            await saveGame();
            renderGame();
            closeDialog();
        } else {
            game.message = "❌ Не хватает 250 золота!";
            renderGame();
        }
    }
    
    // ==================== ПОКУПКА И КРАФТ ====================
    async function buyItem(item) {
        if (game.gold >= item.price) {
            game.gold -= item.price;
            game.inventory.push(JSON.parse(JSON.stringify(item)));
            game.message = "✅ Куплено " + item.name + "!";
            await saveGame();
            renderGame();
        } else {
            game.message = "❌ Не хватает золота!";
            renderGame();
        }
    }
    
    async function craftPotion(type) {
        let hasWeak = game.resources["Целебная трава"] >= 1 && game.resources["Магический гриб"] >= 1 && game.gold >= 50;
        let hasMedium = game.resources["Целебная трава"] >= 2 && game.resources["Магический гриб"] >= 2 && game.resources["Мифический цветок"] >= 1 && game.gold >= 150;
        let hasStrong = game.resources["Целебная трава"] >= 3 && game.resources["Магический гриб"] >= 3 && game.resources["Мифический цветок"] >= 2 && game.gold >= 300;
        
        if (type === "weak" && hasWeak) {
            game.resources["Целебная трава"]--;
            game.resources["Магический гриб"]--;
            game.gold -= 50;
            game.potions.weak += 3;
            game.message = "🍃 Скрафчено 3 слабых зелья!";
        } else if (type === "medium" && hasMedium) {
            game.resources["Целебная трава"] -= 2;
            game.resources["Магический гриб"] -= 2;
            game.resources["Мифический цветок"]--;
            game.gold -= 150;
            game.potions.medium += 3;
            game.message = "🌿 Скрафчено 3 средних зелья!";
        } else if (type === "strong" && hasStrong) {
            game.resources["Целебная трава"] -= 3;
            game.resources["Магический гриб"] -= 3;
            game.resources["Мифический цветок"] -= 2;
            game.gold -= 300;
            game.potions.strong += 3;
            game.message = "🌸 Скрафчено 3 мощных зелья!";
        } else {
            game.message = "❌ Не хватает ресурсов!";
        }
        await saveGame();
        renderGame();
    }
    
    async function equipItem(item) {
        if (item.type === "weapon") {
            game.weapon = item;
        } else if (item.type === "armor") {
            game.armor = item;
        }
        game.message = "🔧 Экипировано: " + item.name;
        await saveGame();
        renderGame();
    }
    
    // ==================== NPC ДИАЛОГИ ====================
    function startDialog(npc) {
        let dialogHtml = '<div class="dialog-overlay" id="dialogOverlay">';
        dialogHtml += '<div class="dialog-window">';
        dialogHtml += '<div class="dialog-header"><div style="font-size:3rem;">' + npc.avatar + '</div><div style="color:#f7d44a;">' + npc.name + ' ' + npc.icon + '</div></div>';
        dialogHtml += '<div class="dialog-body"><div class="dialog-text">';
        
        if (npc.type === "blacksmith") {
            dialogHtml += "Кузнец Гром: Лучшее оружие и броня!";
        } else if (npc.type === "alchemist") {
            dialogHtml += "Алхимик Морган: Крафт зелий!";
        } else if (npc.type === "tavern") {
            dialogHtml += "Трактирщик: Эль за 250💰!";
        } else {
            dialogHtml += "Мастер крафта: Крафт мифических предметов!";
        }
        
        dialogHtml += '</div></div><div class="dialog-footer"><div class="dialog-buttons">';
        
        if (npc.type === "blacksmith") {
            for (let i = 0; i < npc.items.length; i++) {
                let item = npc.items[i];
                dialogHtml += '<button class="dialog-btn" onclick="buyItem(' + JSON.stringify(item).replace(/"/g, '&quot;') + ')">' + item.name + ' - ' + item.price + '💰</button>';
            }
        }
        
        if (npc.type === "alchemist") {
            dialogHtml += '<button class="dialog-btn" onclick="craftPotion(\'weak\')">🍃 Слабое зелье</button>';
            dialogHtml += '<button class="dialog-btn" onclick="craftPotion(\'medium\')">🌿 Среднее зелье</button>';
            dialogHtml += '<button class="dialog-btn" onclick="craftPotion(\'strong\')">🌸 Мощное зелье</button>';
        }
        
        if (npc.type === "tavern") {
            dialogHtml += '<button class="dialog-btn" onclick="buyEnergy()">🍺 Купить эль за 250💰</button>';
        }
        
        dialogHtml += '<button class="dialog-btn" onclick="closeDialog()">🚪 Закрыть</button>';
        dialogHtml += '</div></div></div></div>';
        
        document.body.insertAdjacentHTML('beforeend', dialogHtml);
    }
    
    function closeDialog() {
        let el = document.getElementById("dialogOverlay");
        if (el) el.remove();
    }
    
    // ==================== АДМИН ФУНКЦИИ ====================
    async function adminGiveGold() {
        if (!game.isAdmin) return;
        let nick = document.getElementById("adminGoldNick")?.value;
        let amount = parseInt(document.getElementById("adminGoldAmount")?.value);
        
        if (!nick) {
            game.message = "❌ Введите ник!";
            renderGame();
            return;
        }
        if (isNaN(amount)) amount = 500;
        
        let data = await loadData("rpg_" + nick);
        if (data) {
            let target = JSON.parse(data);
            target.gold = (target.gold || 0) + amount;

    async function adminGiveExp() {
        if (!game.isAdmin) return;
        let nick = document.getElementById("adminExpNick")?.value;
        let amount = parseInt(document.getElementById("adminExpAmount")?.value);
        
        if (!nick) {
            game.message = "❌ Введите ник!";
            renderGame();
            return;
        }
        if (isNaN(amount)) amount = 300;
        
        let data = await loadData("rpg_" + nick);
        if (data) {
            let target = JSON.parse(data);
            target.exp = (target.exp || 0) + amount;
            
            while (target.exp >= target.expToNext) {
                target.exp -= target.expToNext;
                target.level++;
                target.maxCombatEnergy += 5;
                target.maxTravelEnergy += 2;
                target.expToNext = Math.floor(target.expToNext * 1.2);
            }
            
            await saveData("rpg_" + nick, JSON.stringify(target));
            game.message = "👑 Выдано " + amount + "✨ опыта игроку " + nick;
        } else {
            game.message = "❌ Игрок " + nick + " не найден!";
        }
        renderGame();
    }
    
    async function adminGiveEnergy() {
        if (!game.isAdmin) return;
        let nick = document.getElementById("adminEnergyNick")?.value;
        let amount = parseInt(document.getElementById("adminEnergyAmount")?.value);
        
        if (!nick) {
            game.message = "❌ Введите ник!";
            renderGame();
            return;
        }
        if (isNaN(amount)) amount = 100;
        
        let data = await loadData("rpg_" + nick);
        if (data) {

            target.combatEnergy = Math.min(target.maxCombatEnergy || 100, (target.combatEnergy || 0) + amount);
            target.travelEnergy = Math.min(target.maxTravelEnergy || 50, (target.travelEnergy || 0) + Math.floor(amount / 2));

    async function adminGiveItem() {
        if (!game.isAdmin) return;
        let nick = document.getElementById("adminItemNick")?.value;
        let itemName = document.getElementById("adminItemSelect")?.value;
        
        if (!nick) {
            game.message = "❌ Введите ник!";
            renderGame();
            return;
        }
        
        let item = null;
        for (let i = 0; i < ALL_ITEMS.length; i++) {
            if (ALL_ITEMS[i].name === itemName) {
                item = ALL_ITEMS[i];
                break;
            }
        }
        
        if (!item) {
            game.message = "❌ Предмет не найден!";
            renderGame();
            return;
        }
        
        let data = await loadData("rpg_" + nick);
        if (data) {
            let target = JSON.parse(data);
            if (!target.inventory) target.inventory = [];
            target.inventory.push(JSON.parse(JSON.stringify(item)));
            await saveData("rpg_" + nick, JSON.stringify(target));
            game.message = "👑 Выдан предмет " + itemName + " игроку " + nick;
        } else {
            game.message = "❌ Игрок " + nick + " не найден!";

            adminTab += '<b>✨ ОПЫТ</b><br><input id="adminExpNick" class="admin-input" placeholder="Ник"><input id="adminExpAmount" class="admin-input" placeholder="Опыт" value="300"><button onclick="adminGiveExp()">Выдать</button><hr>';
            adminTab += '<b>⚡ ЭНЕРГИЯ</b><br><input id="adminEnergyNick" class="admin-input" placeholder="Ник"><input id="adminEnergyAmount" class="admin-input" placeholder="Кол-во" value="100"><button onclick="adminGiveEnergy()">Выдать</button><hr>';
            adminTab += '<b>🎁 ПРЕДМЕТ</b><br><input id="adminItemNick" class="admin-input" placeholder="Ник"><select id="adminItemSelect" class="admin-select">';
            for (let i = 0; i < ALL_ITEMS.length; i++) {
                adminTab += '<option value="' + ALL_ITEMS[i].name + '">' + ALL_ITEMS[i].name + ' (' + ALL_ITEMS[i].rarity + ')</option>';
            }
            adminTab += '</select><button onclick="adminGiveItem()">Выдать</button><hr>';
            adminTab += '<b>⚠️ СБРОС</b><br><input id="adminResetNick" class="admin-input" placeholder="Ник"><button onclick="adminResetPlayer()" style="background:#8b0000;">Сбросить</button>';
            adminTab += '</div></div>';
        }
        
        container.innerHTML = tabsHtml + gameTab + inventoryTab + tavernTab + craftTab + adminTab;
        
        // Обработчики событий
        let randomFightBtn = document.getElementById("randomFightBtn");
        if (randomFightBtn) {
            randomFightBtn.onclick = function() {
                if (game.autoFightActive) stopAutoFight();
                startRandomFight();
            };
        }
        
        let autoFightBtn = document.getElementById("autoFightBtn");
        if (autoFightBtn) {
            autoFightBtn.onclick = function() {
                startAutoFight();
            };
        }
        
        let bossFightBtn = document.getElementById("bossFightBtn");
        if (bossFightBtn) {
            bossFightBtn.onclick = function() {
                if (game.autoFightActive) stopAutoFight();
                startBossFight();
            };
        }
        
        let fightDungeonBtn = document.getElementById("fightDungeonBtn");
        if (fightDungeonBtn) {
            fightDungeonBtn.onclick = function() {
                startDungeonFight();
            };
        }
        
        let goToFloorBtn = document.getElementById("goToFloorBtn");
        if (goToFloorBtn) {
            goToFloorBtn.onclick = function() {
                let floorInput = document.getElementById("floorInput");
                let floor = floorInput ? parseInt(floorInput.value) : game.dungeonFloor;
                goToFloor(floor);
            };
        }
        
        let attackBtn = document.getElementById("attackBtn");
        if (attackBtn) {
            attackBtn.onclick = function() {
                combatAction("attack");
            };
        }
        
        let potionBtn = document.getElementById("potionBtn");
        if (potionBtn) {
            potionBtn.onclick = function() {
                combatAction("use_potion");
            };
        }
        
        let runToggleBtn = document.getElementById("runToggleBtn");
        if (runToggleBtn) {
            runToggleBtn.onclick = function() {
                game.isRunning = !game.isRunning;
                renderGame();
            };
        }
        
        let resetBtn = document.getElementById("resetBtn");
        if (resetBtn) {
            resetBtn.onclick = async function() {
                if (confirm("Сбросить прогресс?")) {
                    await deleteData("rpg_" + (game.telegramId || game.profileName));
                    game.initialized = false;
                    renderGame();
                }
            };
        }
        
        let tabBtns = document.querySelectorAll(".tab-btn");
        for (let i = 0; i < tabBtns.length; i++) {
            let btn = tabBtns[i];
            btn.onclick = function() {
                let tab = this.getAttribute("data-tab");
                game.activeTab = tab;
                renderGame();
            };
        }
        
        let spriteDiv = document.getElementById("characterSprite");
        if (spriteDiv) {
            spriteDiv.innerHTML = '<div class="char-' + (game.isRunning ? "running" : "idle") + '">' + cls.icon + '</div>';
        }
    }
    
    window.changeLocation = changeLocation;
    window.startDialog = startDialog;
    window.buyItem = buyItem;
    window.craftPotion = craftPotion;
    window.buyEnergy = buyEnergy;
    window.closeDialog = closeDialog;
    window.usePotion = usePotion;
    window.equipItem = equipItem;
    window.adminGiveGold = adminGiveGold;
    window.adminGiveExp = adminGiveExp;
    window.adminGiveEnergy = adminGiveEnergy;
    window.adminGiveItem = adminGiveItem;
    window.adminResetPlayer = adminResetPlayer;
    window.toggleAdminPanel = toggleAdminPanel;
    
    renderGame();
</script>
</body>
</html>
