    // Секретный способ активации админ-панели (через консоль или по паролю)

    // ========== СОХРАНЕНИЕ В TELEGRAM CLOUD STORAGE ==========
    async function saveToTelegram(key, value) {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
            return new Promise((resolve) => {
                Telegram.WebApp.CloudStorage.setItem(key, value, (error) => {
                    if (error) console.error("Ошибка сохранения в Telegram:", error);
                    resolve(!error);
                });
            });
        }
        return false;
    }
    
    async function loadFromTelegram(key) {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
            return new Promise((resolve) => {
                Telegram.WebApp.CloudStorage.getItem(key, (error, value) => {
                    if (error || !value) resolve(null);
                    else resolve(value);
                });
            });
        }
        return null;
    }
    
    // Функция сохранения игры (Telegram + localStorage)
    async function saveGame() {
        if (!game.profileName) return;
        
        let saveData = JSON.parse(JSON.stringify(game));
        saveData.message = "";
        saveData.inCombat = false;
        saveData.combatEnemy = null;
        let saveStr = JSON.stringify(saveData);
        
        // Сохраняем в localStorage (резерв)
        localStorage.setItem("rpg_mega_" + game.profileName, saveStr);
        localStorage.setItem("last_active_" + game.profileName, Date.now().toString());
        
        // Сохраняем в Telegram Cloud
        await saveToTelegram("rpg_mega_" + game.profileName, saveStr);
        await saveToTelegram("last_active_" + game.profileName, Date.now().toString());
    }
    
    // Функция загрузки игры (сначала Telegram, потом localStorage)
    async function loadGame(playerName) {
        // Пробуем загрузить из Telegram
        let saveStr = await loadFromTelegram("rpg_mega_" + playerName);
        
        if (!saveStr) {
            // Если в Telegram нет, пробуем из localStorage
            saveStr = localStorage.getItem("rpg_mega_" + playerName);
        }
        
        if (saveStr) {
            try {
                let loaded = JSON.parse(saveStr);
                Object.assign(game, loaded);
                game.initialized = true;
                game.activeTab = "game";
                updateDailyShop();
                game.message = "📀 Данные загружены! Добро пожаловать, " + playerName + "!";
                if (window.Telegram && window.Telegram.WebApp) {
                    Telegram.WebApp.expand();
                }
                renderGame();
                return true;
            } catch(e) {
                console.error("Ошибка загрузки:", e);
            }
        }
        return false;
    }

    function updateDailyShop() {
        const today = new Date().toDateString();
        if (game.lastDailyReset !== today || game.dailyWeapons.length === 0) {
            const shuffledWeapons = [...SHOP_WEAPONS];
            for (let i = shuffledWeapons.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledWeapons[i], shuffledWeapons[j]] = [shuffledWeapons[j], shuffledWeapons[i]];
            }
            game.dailyWeapons = shuffledWeapons.slice(0, 4);
            
            const shuffledArmors = [...SHOP_ARMORS];
            for (let i = shuffledArmors.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledArmors[i], shuffledArmors[j]] = [shuffledArmors[j], shuffledArmors[i]];
            }
            game.dailyArmors = shuffledArmors.slice(0, 3);
            
            game.lastDailyReset = today;
            saveGame();
        }
    }
    
    function getMonsterForLocation(locationKey) {
        const monstersList = LOCATION_MONSTERS[locationKey] || LOCATION_MONSTERS.village;
        const monsterName = monstersList[Math.floor(Math.random() * monstersList.length)];
        let base = MONSTERS_BASE.find(m => m.name === monsterName);
        if (!base) base = {name:monsterName,hp:50,str:15,exp:80,gold:60,icon:"👾",type:"unknown"};
        let monster = JSON.parse(JSON.stringify(base));
        let multiplier = 1 + (game.level / 300);
        let bonus = Math.floor(game.level / 8);
        monster.hp = Math.floor(monster.hp * multiplier) + bonus * 3;
        monster.str = Math.floor(monster.str * multiplier) + bonus;
        monster.exp = Math.floor(monster.exp * multiplier) + bonus * 8;
        monster.gold = Math.floor(monster.gold * multiplier) + bonus * 12;
        if (game.completedLocations.includes(locationKey)) {
            monster.hp = Math.floor(monster.hp * 1.2);
            monster.str = Math.floor(monster.str * 1.15);
        }
        return monster;
    }
    
    function getBossForLocation(locationKey) {
        let boss = JSON.parse(JSON.stringify(LOCATION_BOSSES[locationKey]));
        let multiplier = 1 + (game.level / 350);
        let bonus = Math.floor(game.level / 6);
        boss.hp = Math.floor(boss.hp * multiplier) + bonus * 8;
        boss.str = Math.floor(boss.str * multiplier) + bonus * 2;
        boss.exp = Math.floor(boss.exp * multiplier) + bonus * 12;
        boss.gold = Math.floor(boss.gold * multiplier) + bonus * 18;
        boss.icon = "👑";
        boss.isBoss = true;
        return boss;
    }
    
    function getStrength() {
        let cls = CLASSES[game.class];
        let bonus = 15 + game.level * 1;
        if (game.weapon) bonus += game.weapon.strBonus;
        if (cls) bonus += cls.strBonus;
        return bonus;
    }
    
    function getDefense() {
        let cls = CLASSES[game.class];
        let bonus = 8 + Math.floor(game.level * 0.8);
        if (game.armor) bonus += game.armor.defBonus;
        if (cls && cls.defBonus) bonus += cls.defBonus;
        return Math.max(2, bonus);
    }
    
    function getCritChance() { return 6 + (CLASSES[game.class]?.crit || 0); }
    function getDodgeChance() { return 5 + (CLASSES[game.class]?.dodge || 0); }
    
    function updateQuestProgress(type, target, amount = 1) {
        for (let q of game.activeQuests) {
            if (q.progress >= q.count) continue;
            if ((type === "kill" && q.type === "kill" && q.target === target) ||
                (type === "resource" && q.type === "resource" && q.target === target)) {
                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            }
            else if (type === "craft" && q.type === "craft") {
                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            }
            else if (type === "dungeon" && q.type === "dungeon") {
                q.progress = Math.min(q.count, game.dungeonFloor);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            }
        }
        saveGame();
    }
    
    function addExp(amt, render = true) {
        game.exp += amt;
        game.message += " +" + amt + " ✨";
        while (game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxHp += 12;
            game.hp = Math.min(game.maxHp, game.hp + 25);
            game.maxTravelEnergy += 2;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 4);
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` 🎉 УРОВЕНЬ ${game.level}! 🎉`;
        }
        saveGame();
        if (render) renderGame();
    }
    
    function attack() {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        let strength = getStrength();
        let dodgeChance = getDodgeChance();
        if (Math.random() * 100 < dodgeChance) {
            game.message = `🌀 УВОРОТ!`;
            renderGame();
            updateLastActive();
            return;
        }
        let isCrit = Math.random() * 100 < getCritChance();
        let damage = Math.max(5, strength + Math.floor(Math.random() * 15) - 5);
        if (isCrit) {
            damage = Math.floor(damage * 1.5);
            game.message = `💥 КРИТ! `;
        }
        game.enemyCurrentHp -= damage;
        game.message = `⚔️ Урон ${damage} по ${enemy.name}!`;
        
        if (game.enemyCurrentHp <= 0) {
            let energyBack = enemy.isBoss ? 20 : 8;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + energyBack);
            game.gold += enemy.gold;
            addExp(enemy.exp);
            if (!enemy.isBoss) {
                game.monstersKilled++;
                updateQuestProgress("kill", enemy.name, 1);
            } else {
                game.monstersKilled = 0;
            }
            game.hp = Math.min(game.maxHp, game.hp + (enemy.isBoss ? 30 : 10));
            game.message += ` 🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            if (game.location === "dungeon") {
                game.dungeonFloor++;
                if (game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
                game.message += ` 📈 Этаж ${game.dungeonFloor}!`;
                updateQuestProgress("dungeon", null, 0);
                if (Math.random() < 0.3) {
                    let allResources = [...RESOURCES_BY_RARITY.common, ...RESOURCES_BY_RARITY.rare, ...RESOURCES_BY_RARITY.epic, ...RESOURCES_BY_RARITY.legendary, ...RESOURCES_BY_RARITY.mythic];
                    let res = allResources[Math.floor(Math.random() * allResources.length)];
                    game.resources[res] = (game.resources[res] || 0) + 1;
                    updateQuestProgress("resource", res, 1);
                    game.message += ` 📦 +${res}`;
                }
            } else {
                if (Math.random() < 0.15) {
                    let normalResources = [...RESOURCES_BY_RARITY.common, ...RESOURCES_BY_RARITY.rare];
                    let res = normalResources[Math.floor(Math.random() * normalResources.length)];
                    game.resources[res] = (game.resources[res] || 0) + 1;
                    updateQuestProgress("resource", res, 1);
                    game.message += ` 🌿 +${res}`;
                }
            }
            
            if (enemy.isBoss && !game.completedLocations.includes(game.location) && game.location !== "dungeon") {
                game.completedLocations.push(game.location);
                game.message += ` 🎉 Локация пройдена!`;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            saveGame();
            renderGame();
            updateLastActive();
            return;
        }
        
        let playerDef = getDefense();
        let enemyDamage = Math.max(4, enemy.str + Math.floor(Math.random() * 12) - playerDef);
        game.hp -= enemyDamage;
        game.message += ` 😡 ${enemy.name} нанёс ${enemyDamage} урона!`;
        if (game.hp <= 0) {
            game.hp = Math.floor(game.maxHp * 0.6);
            game.message = ` 💀 Вы погибли! Восстановлено 60% HP.`;
            game.inCombat = false;
            game.combatEnemy = null;
            saveGame();
            renderGame();
            updateLastActive();
            return;
        }
        saveGame();
        renderGame();
        updateLastActive();
    }
    
    function startFight() {
        if (game.inCombat) return;
        let healCost = Math.max(50, Math.floor(game.maxHp * 0.08));
        if (game.hp < game.maxHp * 0.2) {
            game.message = `❌ Мало HP, восстановитесь у торговца за ${healCost}💰!`;
            renderGame();
            return;
        }
        if (game.location !== "dungeon" && game.monstersKilled >= game.needToKill) {
            let boss = getBossForLocation(game.location);
            game.inCombat = true;
            game.combatEnemy = boss;
            game.enemyCurrentHp = boss.hp;
            game.message = `⚔️ БОЙ С БОССОМ! ${boss.icon} ${boss.name} ⚔️`;
            renderGame();
            updateLastActive();
            return;
        }
        let enemy = (game.location === "dungeon") ? 
            (game.dungeonFloor % 20 === 0 ? getBossForLocation("throne") : getMonsterForLocation("dungeon")) : 
            getMonsterForLocation(game.location);
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ БОЙ! ${enemy.icon || "👾"} ${enemy.name} ⚔️`;
        renderGame();
        updateLastActive();
    }
    
    function changeLocation(key) {
        if (game.inCombat) { game.message = "❌ Сначала закончите бой!"; renderGame(); return; }
        let loc = LOCATIONS[key];
        if (!loc) return;
        if (game.level < loc.levelReq) { game.message = `❌ Нужен ${loc.levelReq} уровень!`; renderGame(); return; }
        if (game.travelEnergy < loc.energyCost) { game.message = `❌ Нужно ${loc.energyCost} энергии!`; renderGame(); return; }
        game.travelEnergy -= loc.energyCost;
        game.location = key;
        game.monstersKilled = (game.completedLocations.includes(key) && key !== "dungeon") ? game.needToKill : 0;
        game.message = `🚶 Переход в ${loc.name}`;
        saveGame();
        renderGame();
        updateLastActive();
    }
    
    function usePotion() {
        let healAmount = Math.floor(game.maxHp * 0.35);
        let cost = Math.max(80, Math.floor(game.maxHp * 0.06));
        if (game.gold < cost) { game.message = `💰 Нужно ${cost} золота!`; renderGame(); return; }
        game.gold -= cost;
        game.hp = Math.min(game.maxHp, game.hp + healAmount);
        game.message = `🧪 +${healAmount} HP (${cost}💰)`;
        saveGame();
        renderGame();
        updateLastActive();
    }
    
    function restoreEnergy() {
        let cost = Math.max(80, Math.floor(game.level * 2.5));
        if (game.gold < cost) { game.message = `💰 Нужно ${cost} золота!`; return; }
        game.gold -= cost;
        game.travelEnergy = game.maxTravelEnergy;
        game.message = `⚡ Энергия восстановлена! (${cost}💰)`;
        saveGame();
        renderGame();
        updateLastActive();
    }
    
    function craftMythicItem(item) {
        if (!item.craftCost) return;
        let canCraft = true;
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") { if (game.gold < amount) canCraft = false; }
            else if ((game.resources[res] || 0) < amount) canCraft = false;
        }
        if (!canCraft) { game.message = "❌ Не хватает ресурсов для крафта!"; renderGame(); return; }
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") game.gold -= amount;
            else game.resources[res] -= amount;
        }
        game.inventory.push(JSON.parse(JSON.stringify(item)));
        game.craftCount++;
        updateQuestProgress("craft", null, 1);
        game.message = `🔨 Вы скрафтили мифическое оружие ${item.name}!`;
        saveGame();
        renderGame();
    }
    
    function equipItem(item) {
        if (item.type === "weapon") game.weapon = item;
        else if (item.type === "armor") game.armor = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        saveGame();
        renderGame();
        updateLastActive();
    }
    
    function buyItem(item) {
        if (game.gold < item.price) { game.message = `💰 Не хватает ${item.price} золота!`; renderGame(); return; }
        game.gold -= item.price;
        game.inventory.push(JSON.parse(JSON.stringify(item)));
        game.message = `🛒 Куплено: ${item.name} за ${item.price}💰`;
        saveGame();
        renderGame();
        updateLastActive();
    }
    
    function buyResource(resName, cost, amount = 1) {
        if (game.gold < cost) { game.message = `💰 Нужно ${cost} золота!`; renderGame(); return; }
        game.gold -= cost;
        game.resources[resName] = (game.resources[resName] || 0) + amount;
        updateQuestProgress("resource", resName, amount);
        game.message = `🛒 Куплено: ${resName} +${amount} за ${cost}💰`;
        saveGame();
        renderGame();
        updateLastActive();
    }
    
    function resetGame() {
        if (confirm("Сбросить весь прогресс?")) {
            if (game.profileName) {
                localStorage.removeItem("rpg_mega_" + game.profileName);
                localStorage.removeItem("last_active_" + game.profileName);
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
                    Telegram.WebApp.CloudStorage.removeItem("rpg_mega_" + game.profileName);
                    Telegram.WebApp.CloudStorage.removeItem("last_active_" + game.profileName);
                }
            }
            game.initialized = false;
            renderGame();
        }
    }
    
    function startDungeon(floor) {
        if (game.inCombat) { game.message = "❌ Сначала закончите бой!"; renderGame(); return; }
        if (floor > game.maxUnlockedFloor) { game.message = `❌ Вы не достигли ${floor} этажа!`; renderGame(); return; }
        let energyCost = Math.max(3, Math.floor(floor / 25) + 2);
        if (game.travelEnergy < energyCost) { game.message = `❌ Нужно ${energyCost} энергии!`; renderGame(); return; }
        game.travelEnergy -= energyCost;
        game.location = "dungeon";
        game.dungeonFloor = floor;
        game.monstersKilled = 0;
        game.message = `🏰 Вход в подземелье на этаж ${floor}! Энергия: -${energyCost}`;
        saveGame();
        renderGame();
        updateLastActive();
    }
    
    function takeQuest(quest) {
        if (game.activeQuests.some(q => q.id === quest.id)) { game.message = "❌ Вы уже взяли этот квест!"; renderGame(); return; }
        let newQuest = JSON.parse(JSON.stringify(quest));
        newQuest.progress = 0;
        game.activeQuests.push(newQuest);
        game.message = `📜 Взят квест: ${quest.name}!`;
        renderGame();
        updateLastActive();
    }
    
    function createCharacter(name, cls) {
        if (!name.trim()) return;
        let c = CLASSES[cls];
        game.profileName = name;
        game.class = cls;
        game.gold = 5000;
        game.level = 1;
        game.exp = 0;
        game.expToNext = 100;
        game.maxHp = 95 + (c.hpBonus || 0);
        game.hp = game.maxHp;
        game.travelEnergy = 55;
        game.maxTravelEnergy = 55;
        game.monstersKilled = 0;
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.completedLocations = [];
        game.craftCount = 0;
        game.activeQuests = [];
        game.resources = {};
        for (let r of RESOURCES_BY_RARITY.common) game.resources[r] = Math.floor(Math.random() * 2);
        game.resources["Целебная трава"] = 5;
        game.resources["Железная руда"] = 3;
        game.weapon = { name: c.weapon, type: "weapon", strBonus: c.strBonus, price: 0, rarity: "common" };
        game.armor = { name: "Кожаный доспех", type: "armor", defBonus: 5, price: 150, rarity: "common" };
        game.inventory = [game.weapon, game.armor];
        game.lastDailyReset = new Date().toDateString();
        updateDailyShop();
        game.tutorialShown = false;
        game.message = `✨ Добро пожаловать, ${name} ${c.name}!`;
        game.initialized = true;
        saveGame();
        updateLastActive();
        renderGame();
        showTutorial();
    }
    
    // ========== ФРАЗЫ ТРАКТИРЩИКА (20+ УНИКАЛЬНЫХ) ==========

    function talkToTavern() {
        let randomIndex = Math.floor(Math.random() * tavernPhrases.length);
        let randomPhrase = tavernPhrases[randomIndex];
        game.message = `🍺 Гром: ${randomPhrase.replace("{name}", game.profileName)}`;
        renderGame();
        updateLastActive();
    }
    
    // ========== ОБУЧЕНИЕ (БЕЗ УПОМИНАНИЯ АДМИН-ПАНЕЛИ) ==========
    function showTutorial() {
        if (game.tutorialShown) return;

    function closeTutorial() { 
        let overlay = document.querySelector('.tutorial-overlay'); 
        if (overlay) overlay.remove(); 
    }
    
    function selectCraftItem(item) {
        game.selectedCraftItem = item;
        renderGame();
    }
    
    function renderGame() {
        let container = document.getElementById("rpgGame");
        if (!container) return;
        
        if (!game.initialized) {
            let savedNames = [];
            // Собираем имена из localStorage (как резерв)
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key && key.startsWith("rpg_mega_")) savedNames.push(key.replace("rpg_mega_", ""));
            }
            let savedHtml = savedNames.length ? `<div class="save-load-panel"><b>💾 Загрузить сохранение:</b><br>${savedNames.map(n => `<button onclick="loadGame('${n}')">📀 ${n}</button>`).join(' ')}</div><hr>` : "";
            let selected = "warrior";
            let clsHtml = savedHtml + `<div class="class-selector" id="classSel">` +
                Object.keys(CLASSES).map(k => `<div class="class-option ${selected === k ? 'selected' : ''}" data-class="${k}">${CLASSES[k].icon} ${CLASSES[k].name}<br><span style="font-size:0.6rem;">⚔️ ${CLASSES[k].strBonus} 💪 ${CLASSES[k].hpBonus}</span></div>`).join('') +
                `</div><input id="pname" placeholder="Имя героя"><button id="createBtn" style="background:#f7d44a;">🚀 НАЧАТЬ</button>`;
            container.innerHTML = clsHtml;
            document.getElementById("createBtn").onclick = () => { createCharacter(document.getElementById("pname").value, selected); };
            document.querySelectorAll(".class-option").forEach(el => {
                el.onclick = function() {
                    document.querySelectorAll(".class-option").forEach(c => c.classList.remove("selected"));
                    this.classList.add("selected");
                    selected = this.dataset.class;
                };
            });
            return;
        }
        
        updateDailyShop();
        let hpPerc = (game.hp / game.maxHp) * 100;
        let travPerc = (game.travelEnergy / game.maxTravelEnergy) * 100;
        let healCost = Math.max(80, Math.floor(game.maxHp * 0.06));
        let energyCost = Math.max(80, Math.floor(game.level * 2.5));
        
        let locsHtml = Object.keys(LOCATIONS).map(k => {
            let l = LOCATIONS[k];
            let locked = game.level < l.levelReq;
            return `<button class="location-btn ${locked ? 'locked' : ''} ${game.completedLocations.includes(k) ? 'completed' : ''}" onclick="changeLocation('${k}')" ${locked ? 'disabled' : ''}>${l.icon} ${l.name}<br><span style="font-size:0.6rem;">${l.levelReq}ур</span></button>`;

        let dungeonFloors = [];

        // ТОРГОВЕЦ (продажа обычного оружия + крафт мифического)

            <div class="trader-section">
                <h4>⚒️ КУЗНЕЦ БРОНИСЛАВ - ПРОДАЖА</h4>

                <div class="shop-item">💎 Искра богов <button onclick="buyResource('Искра богов', 5000)">5000💰</button></div>

        AVAILABLE_QUESTS.forEach(q => {
            let taken = game.activeQuests.some(aq => aq.id === q.id);
            tavernHtml += `<div class="quest-item"><div><b>${q.name}</b><br><span style="font-size:0.65rem;">${q.desc} | Награда: ${q.reward.gold}💰 ${q.reward.exp}✨</span></div>
            ${!taken ? `<button onclick="takeQuest(${JSON.stringify(q).replace(/"/g, '&quot;')})">ВЗЯТЬ</button>` : `<span style="color:#4cff4c;">✓ Взято</span>`}</div>`;
        });
        tavernHtml += `<hr><div><b>📜 АКТИВНЫЕ КВЕСТЫ:</b>`;
        if (game.activeQuests.length === 0) tavernHtml += `<i>Нет активных квестов</i>`;
        else {
            game.activeQuests.forEach(q => {
                let percent = (q.progress / q.count) * 100;
                tavernHtml += `<div class="active-quest"><b>${q.name}</b><br><span style="font-size:0.65rem;">${q.progress}/${q.count}</span>

        // РЕСУРСЫ

        for (let [rarity, resources] of Object.entries(RESOURCES_BY_RARITY)) {
            let filtered = resources.filter(r => (game.resources[r] || 0) > 0);

            }
        }
        if (resourceGroupsHtml === `<div><b>🌿 РЕСУРСЫ:</b></div>`) resourceGroupsHtml += `<div><i>Нет ресурсов</i></div>`;
        
        let invHtml = game.inventory.map(it => `<div class="item-card" onclick="equipItem(${JSON.stringify(it).replace(/"/g, '&quot;')})"><span class="rarity-${it.rarity || 'common'}">${it.type === "weapon" ? "⚔️" : "🛡️"} ${it.name} +${it.strBonus || it.defBonus}</span></div>`).join('');
        
        // АДМИН-ПАНЕЛЬ (только для админа, скрыта от обычных игроков)
        let adminBlock = '';
        if (isAdmin) {
            adminBlock = `<div class="admin-panel">
                <div style="display:flex; justify-content:space-between; align-items:center;"><b>👑 АДМИН ПАНЕЛЬ</b><button onclick="isAdmin=false; renderGame();">🚪 Выйти</button></div>
                <button onclick="game.gold+=100000; saveGame(); renderGame();">💰 +100k золота</button>
                <button onclick="game.gold+=1000000; saveGame(); renderGame();">💰 +1M золота</button>
                <button onclick="addExp(5000)">✨ +5000 опыта</button>
                <button onclick="addExp(50000)">✨ +50000 опыта</button>
                <button onclick="game.travelEnergy=game.maxTravelEnergy; saveGame(); renderGame();">⚡ Восст. энергию</button>
                <button onclick="game.dungeonFloor+=30; game.maxUnlockedFloor=Math.max(game.maxUnlockedFloor,game.dungeonFloor); saveGame(); renderGame();">📈 +30 этажей</button>
                <button onclick="for(let r of ['Искра богов','Сердце демона','Звездная пыль','Мифический цветок']){game.resources[r]=(game.resources[r]||0)+10;} saveGame(); renderGame();">💎 Ресурсы +10</button>
                <hr><button onclick="resetGame()">⚠️ Сбросить свой прогресс</button>
            </div>`;
        }
        
        container.innerHTML = `
        <div class="tab-bar">
            <div class="tab-btn ${game.activeTab === 'game' ? 'active' : ''}" data-tab="game">⚔️ БОЙ</div>
            <div class="tab-btn ${game.activeTab === 'trader' ? 'active' : ''}" data-tab="trader">🏪 ТОРГОВЕЦ</div>
            <div class="tab-btn ${game.activeTab === 'tavern' ? 'active' : ''}" data-tab="tavern">🍺 ТАВЕРНА</div>
            <div class="tab-btn ${game.activeTab === 'inventory' ? 'active' : ''}" data-tab="inventory">📦 ИНВЕНТАРЬ</div>
            <div class="tab-btn ${game.activeTab === 'craft' ? 'active' : ''}" data-tab="craft">💎 КРАФТ</div>
        </div>
        <div id="tab-game" class="tab-content ${game.activeTab === 'game' ? 'active' : ''}">
            <div class="stats-panel">${['❤️ ' + Math.floor(game.hp) + '/' + game.maxHp, '⚔️ ' + getStrength(), '🛡️ ' + getDefense(), `⭐ Ур.${game.level}`, `💰 ${game.gold}`, `✨ ${game.exp}/${game.expToNext}`].map(s => `<span class="stat">${s}</span>`).join('')}</div>
            <div>❤️ ЗДОРОВЬЕ</div><div class="energy-bar"><div class="energy-fill" style="width:${hpPerc}%; background:#ff4444;"></div></div>
            <div>🚶 ЭНЕРГИЯ ПУТИ</div><div class="energy-bar"><div class="energy-fill" style="width:${travPerc}%;"></div></div>
            <div class="fight-counter">🏆 УБИТО: ${game.monstersKilled}/${game.needToKill} ${game.monstersKilled >= game.needToKill ? '👑 БОСС ДОСТУПЕН' : ''}</div>
            <div class="button-group"><button id="fightBtn">⚔️ БОЙ</button><button id="potionBtn">🧪 ЗЕЛЬЕ (${healCost}💰)</button><button id="energyBtn">⚡ ВОССТ (${energyCost}💰)</button></div>
            <div class="location-grid">${locsHtml}</div>
            <div><button onclick="game.activeTab='dungeon'; renderGame()" style="background:#8b4513; width:100%;">🏰 ПОДЗЕМЕЛЬЕ (этаж ${game.dungeonFloor}/${game.maxUnlockedFloor})</button></div>
            ${fightBlock}
            <div class="message-log">💬 ${game.message}</div>
            <button id="resetBtn" style="width:100%; margin-top:8px; background:#8b3c2c;">🔄 СБРОСИТЬ ПРОГРЕСС</button>
        </div>
        <div id="tab-dungeon" class="tab-content ${game.activeTab === 'dungeon' ? 'active' : ''}">
            <div style="margin:12px 0;"><b>🏰 ПОДЗЕМЕЛЬЕ</b><p>Выберите этаж (до ${game.maxUnlockedFloor})</p><div class="dungeon-floor-select">${dungeonFloors.join('')}</div><button onclick="game.activeTab='game'; renderGame()" style="width:100%;">🔙 Назад</button></div>
        </div>
        <div id="tab-trader" class="tab-content ${game.activeTab === 'trader' ? 'active' : ''}">${traderHtml}</div>
        <div id="tab-tavern" class="tab-content ${game.activeTab === 'tavern' ? 'active' : ''}">${tavernHtml}</div>
        <div id="tab-inventory" class="tab-content ${game.activeTab === 'inventory' ? 'active' : ''}">
            <div><b>⚔️ ОРУЖИЕ:</b> <span class="rarity-${game.weapon?.rarity || 'common'}">${game.weapon?.name || "нет"} +${game.weapon?.strBonus || 0}</span><br><b>🛡️ БРОНЯ:</b> <span class="rarity-${game.armor?.rarity || 'common'}">${game.armor?.name || "нет"} +${game.armor?.defBonus || 0}</span></div>
            <hr><div><b>📦 ИНВЕНТАРЬ (${game.inventory.length})</b></div><div style="display:flex; flex-wrap:wrap; gap:6px;">${invHtml}</div><hr>${resourceGroupsHtml}
        </div>
        <div id="tab-craft" class="tab-content ${game.activeTab === 'craft' ? 'active' : ''}">
            <div class="trader-section">
                <h4>💎 КРАФТ МИФИЧЕСКОГО ОРУЖИЯ</h4>
                <div style="font-size:0.7rem; color:#ffaa44;">⚠️ Мифическое оружие нельзя купить — только скрафтить!</div>
                <div class="craft-list">`;
        MYTHIC_CRAFT_ITEMS.forEach(item => {
            let isSelected = game.selectedCraftItem && game.selectedCraftItem.name === item.name;
            traderHtml += `<div class="craft-item ${isSelected ? 'selected' : ''}" onclick="selectCraftItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                <div><b class="rarity-${item.rarity}">${item.name}</b> +${item.strBonus}<br><span style="font-size:0.65rem;">Нажми для деталей</span></div>
            </div>`;
        });
        traderHtml += `</div>`;
        if (game.selectedCraftItem) {
            let item = game.selectedCraftItem;
            let reqStr = Object.entries(item.craftCost).map(([r, a]) => `<span style="color:#ffaa44;">${r}: ${a}</span>`).join(", ");
            let canCraft = true;
            for (let [res, amount] of Object.entries(item.craftCost)) {
                if (res === "gold") { if (game.gold < amount) canCraft = false; }
                else if ((game.resources[res] || 0) < amount) canCraft = false;
            }
            traderHtml += `<div class="craft-detail">
                <h4 style="margin:0 0 8px 0;">🔨 ${item.name}</h4>
                <p><b>Требуемые ресурсы:</b> ${reqStr}</p>
                <p><b>Ваши ресурсы:</b> ${Object.entries(item.craftCost).map(([r, a]) => `${r}: ${game.resources[r] || 0}/${a}`).join(", ")}</p>
                <button onclick="craftMythicItem(${JSON.stringify(item).replace(/"/g, '&quot;')})" style="background:${canCraft ? '#2a6b4a' : '#8b3c2c'};" ${!canCraft ? 'disabled' : ''}>🔨 СКРАФТИТЬ</button>
            </div>`;
        }
        traderHtml += `</div>`;
        
        container.innerHTML = container.innerHTML.replace('<div id="tab-craft" class="tab-content ...">', traderHtml);
        
        document.getElementById("fightBtn")?.addEventListener("click", startFight);
        document.getElementById("potionBtn")?.addEventListener("click", usePotion);
        document.getElementById("energyBtn")?.addEventListener("click", restoreEnergy);
        document.getElementById("resetBtn")?.addEventListener("click", resetGame);
        document.getElementById("attackBtn")?.addEventListener("click", attack);
        document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", function() { game.activeTab = this.dataset.tab; renderGame(); }));
        
        // Добавляем кнопку для админа (скрытый вызов)
        if (!isAdmin && window.location.href.includes("admin")) {
            let adminBtn = document.createElement('div');
            adminBtn.style.position = 'fixed';
            adminBtn.style.bottom = '10px';
            adminBtn.style.right = '10px';
            adminBtn.style.background = '#ff4444';
            adminBtn.style.color = 'white';
            adminBtn.style.padding = '5px 10px';
            adminBtn.style.borderRadius = '20px';
            adminBtn.style.fontSize = '10px';
            adminBtn.style.cursor = 'pointer';
            adminBtn.style.zIndex = '9999';
            adminBtn.innerText = '👑';
            adminBtn.onclick = () => enableAdmin();
            document.body.appendChild(adminBtn);
        }
    }
    
    window.changeLocation = changeLocation;
    window.equipItem = equipItem;
    window.craftMythicItem = craftMythicItem;
    window.buyItem = buyItem;
    window.buyResource = buyResource;
    window.usePotion = usePotion;
    window.restoreEnergy = restoreEnergy;
    window.takeQuest = takeQuest;
    window.startDungeon = startDungeon;
    window.loadGame = loadGame;
    window.talkToTavern = talkToTavern;
    window.selectCraftItem = selectCraftItem;
    window.closeTutorial = closeTutorial;
    window.enableAdmin = enableAdmin;
    
    if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    }
    
    renderGame();
</script>
</body>
</html>
