    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        @keyframes runAnim { 0% { transform: translateX(0); } 50% { transform: translateX(6px); } 100% { transform: translateX(0); } }
        @keyframes idleAnim { 0% { transform: translateY(0); } 50% { transform: translateY(-3px); } 100% { transform: translateY(0); } }
        @keyframes attackAnim { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .char-running { animation: runAnim 0.25s infinite; display: inline-block; font-size: 3rem; filter: drop-shadow(0 0 6px gold); }
        .char-idle { animation: idleAnim 1s infinite; display: inline-block; font-size: 2.8rem; }
        .char-attack { animation: attackAnim 0.2s; display: inline-block; font-size: 3rem; }
        .stats-panel { background: #1e1b2b; border-radius: 20px; padding: 10px; margin-bottom: 12px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 6px; }
        .stat { background: #00000099; padding: 6px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: bold; color: #f7d44a; }
        .energy-bar { background: #2a1a2a; border-radius: 20px; height: 8px; margin-top: 5px; overflow: hidden; }
        .energy-fill { background: #4cff4c; height: 100%; width: 0%; transition: width 0.2s; }
        .energy-fill.travel { background: #ffaa44; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: #2a2438; padding: 8px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; cursor: pointer; color: #fff; }
        .tab-btn.active { background: #f7d44a; color: #1e1b2b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .location-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; margin: 12px 0; max-height: 260px; overflow-y: auto; }
        .location-btn { background: #3a2c45; padding: 6px 4px; border-radius: 30px; font-size: 0.6rem; text-align: center; cursor: pointer; color: white; }
        .location-btn.locked { opacity: 0.5; cursor: not-allowed; background: #5a3e2e; }
        .location-btn.completed { background: #2a6b4a; border: 1px solid gold; }

        .use-potion-btn { background: #2f6b4a; padding: 4px 10px; font-size: 0.6rem; }

        .resource-badge { background: #1e1b2b; padding: 4px 8px; border-radius: 20px; font-size: 0.55rem; }
        .dialog-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10001; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .rarity-badge { font-size: 0.5rem; padding: 2px 6px; border-radius: 12px; display: inline-block; margin-left: 5px; }
        .rarity-common { background: #666; color: white; }

        .rarity-epic { background: #aa44ff; color: white; }

        .item-select-list { max-height: 200px; overflow-y: auto; background: #1e1b2b; border-radius: 20px; padding: 8px; margin-top: 8px; }
        .item-select-option { padding: 8px; margin: 4px 0; background: #2a2438; border-radius: 20px; cursor: pointer; font-size: 0.7rem; }
        .item-select-option:hover { background: #f7d44a; color: #1e1b2b; }
        hr { border-color: #f7d44a55; margin: 10px 0; }

    </style>
</head>

    let tg;

        tg = window.Telegram?.WebApp;
        if (!tg || !tg.initDataUnsafe) throw new Error();
        tg.expand();
        tg.enableClosingConfirmation();
    } catch(e) {
        tg = {
            expand: () => {}, enableClosingConfirmation: () => {}, ready: () => {},
            CloudStorage: { setItem: (key, data, cb) => { localStorage.setItem(key, data); cb && cb(null, true); },
                           getItem: (key, cb) => { cb(null, localStorage.getItem(key)); } },
            initDataUnsafe: { user: { id: Date.now(), username: "browser_user" } },

    function isAdmin() {

    async function saveData(key, data) { return new Promise((resolve) => { if (tg?.CloudStorage) tg.CloudStorage.setItem(key, data, (err) => resolve(!err)); else { localStorage.setItem(key, data); resolve(true); } }); }
    async function loadData(key) { return new Promise((resolve) => { if (tg?.CloudStorage) tg.CloudStorage.getItem(key, (err, val) => resolve(err || !val ? null : val)); else resolve(localStorage.getItem(key)); }); }
    async function deleteData(key) { return new Promise((resolve) => { if (tg?.CloudStorage) tg.CloudStorage.setItem(key, "", (err) => resolve(!err)); else { localStorage.removeItem(key); resolve(true); } }); }

        const prefixes = ["Острый", "Прочный", "Магический", "Зачарованный", "Древний", "Пылающий", "Ледяной", "Теневой", "Святой", "Демонический"];

        const rarityStats = { common: [5,10], rare: [11,20], epic: [21,40], legendary: [41,80], mythic: [81,150] };

            let rarity = rarities[Math.floor(Math.random() * rarities.length)];

        storm_peaks: { name: "Грозовые пики", icon: "⛈️", energyCost: 15, requiredLevel: 50, order: 13, boss: { name: "Повелитель бурь", hp: 1000, str: 115, def: 55, exp: 3500, gold: 10000, icon: "⚡" }, monstersRequired: 35, monsterList: MONSTERS.slice(44, 58) },
        dragon_isle: { name: "Остров драконов", icon: "🐉", energyCost: 18, requiredLevel: 55, order: 14, boss: { name: "Древний дракон", hp: 1200, str: 130, def: 60, exp: 4000, gold: 15000, icon: "🐲" }, monstersRequired: 40, monsterList: MONSTERS.slice(0, 20) }
    };
    
    // NPC
    const NPCS = [
        { name: "Кузнец Гром", icon: "⚒️", avatar: "🔨", type: "blacksmith", items: ALL_ITEMS.filter(i => i.rarity !== "mythic").slice(0, 20) },
        { name: "Алхимик Морган", icon: "🧪", avatar: "⚗️", type: "alchemist" },
        { name: "Трактирщик Грим", icon: "🍺", avatar: "🧔", type: "tavern" },
        { name: "Мастер крафта", icon: "🔨", avatar: "🛠️", type: "crafter" }
    ];
    
    // ИГРА
    let game = {
        initialized: false, telegramId: null, profileName: "", class: "warrior",
        gold: 500, level: 1, exp: 0, expToNext: 100,
        combatEnergy: 100, maxCombatEnergy: 100, travelEnergy: 50, maxTravelEnergy: 50,
        weapon: null, armor: null, inventory: [],
        resources: {},
        potions: { weak: 3, medium: 1, strong: 0 },
        message: "", inCombat: false, combatEnemy: null, enemyCurrentHp: 0,
        location: "village", dungeonFloor: 1, maxUnlockedFloor: 1, activeTab: "game",
        isAdmin: false, animationState: "idle", isRunning: false, completedLocations: [],
        monstersKilled: 0, needToKill: 15, autoFightActive: false, autoFightInterval: null,
        chestsOpened: {}
    };
    
    // Инициализация ресурсов
    RESOURCES_LIST.forEach(r => { if (game.resources[r] === undefined) game.resources[r] = 0; });
    
    async function saveGame() { if (!game.profileName) return; await saveData(`rpg_${game.telegramId || game.profileName}`, JSON.stringify(game)); }
    async function loadGame(id) {
        const raw = await loadData(`rpg_${id}`);
        if (raw) {
            let data = JSON.parse(raw);
            Object.assign(game, data);
            game.isAdmin = isAdmin();
            RESOURCES_LIST.forEach(r => { if (game.resources[r] === undefined) game.resources[r] = 0; });
            if (!game.completedLocations) game.completedLocations = [];
            if (!game.inventory) game.inventory = [];
            if (!game.potions) game.potions = { weak: 3, medium: 1, strong: 0 };
            if (game.chestsOpened === undefined) game.chestsOpened = {};
            if (game.monstersKilled === undefined) game.monstersKilled = 0;
            game.autoFightActive = false;
            if (game.autoFightInterval) clearInterval(game.autoFightInterval);
            game.message = `С возвращением, ${game.profileName}!`;
            renderGame();
            return true;
        }
        return false;
    }
    
    function getTelegramId() { return tg.initDataUnsafe?.user?.id || null; }
    
    async function createCharacter(name, className) {
        if (!name.trim()) { alert("Введите имя!"); return false; }
        const cls = CLASSES[className];
        if (!cls) return false;
        game.profileName = name;
        game.class = className;
        game.telegramId = getTelegramId();
        game.gold = 500;
        game.level = 1;
        game.exp = 0;
        game.expToNext = 100;
        game.combatEnergy = 100 + (cls.hpBonus || 0);
        game.maxCombatEnergy = 100 + (cls.hpBonus || 0);
        game.travelEnergy = 50;
        game.maxTravelEnergy = 50;
        game.monstersKilled = 0;
        const locData = LOCATIONS[game.location];
        game.needToKill = locData?.monstersRequired || 15;
        game.chestsOpened = {};
        RESOURCES_LIST.forEach(r => { game.resources[r] = 0; });
        game.resources["Целебная трава"] = 5;
        game.resources["Магический гриб"] = 3;
        game.potions = { weak: 3, medium: 1, strong: 0 };
        const startWeapon = { name: cls.weapon, type: "weapon", strBonus: cls.strBonus, rarity: "common" };
        const startArmor = { name: "Кожаная броня", type: "armor", defBonus: 2, rarity: "common" };
        game.weapon = startWeapon;
        game.armor = startArmor;
        game.inventory = [startWeapon, startArmor];
        game.location = "village";
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.completedLocations = [];
        game.isAdmin = isAdmin();
        game.message = `✨ Добро пожаловать, ${name}-${cls.name}! ✨\n🏆 Победите ${game.needToKill} монстров, чтобы открыть босса!`;
        game.initialized = true;
        await saveGame();
        renderGame();
        return true;
    }
    
    function getTotalDefense() { return (game.armor?.defBonus || 0); }
    function getTotalStrength() { return game.weapon?.strBonus || 2; }
    function getCurrentStats() {
        const cls = CLASSES[game.class] || CLASSES.warrior;
        return {
            hp: game.combatEnergy, maxHp: game.maxCombatEnergy,
            str: 10 + game.level * 2 + getTotalStrength() + (cls.strBonus||0),
            def: 5 + game.level + getTotalDefense() + (cls.defBonus||0),
            dodgeBonus: cls.dodgeBonus||0
        };
    }
    
    function canAccessLocation(locKey) {
        if (game.isAdmin) return true;
        const loc = LOCATIONS[locKey];
        if (!loc) return false;
        if (game.level < loc.requiredLevel) return false;
        if (loc.isDungeon) return true;
        if (loc.order === 0) return true;
        const prev = Object.values(LOCATIONS).find(l => l.order === loc.order - 1);
        const prevKey = Object.keys(LOCATIONS).find(k => LOCATIONS[k] === prev);
        if (prevKey && !game.completedLocations.includes(prevKey)) return false;
        return true;
    }
    
    function getRandomEnemy() {
        const loc = LOCATIONS[game.location];
        if (!loc || !loc.monsterList) return { name: "Гоблин", hp: 20, str: 7, def: 3, exp: 30, gold: 15, icon: "👺" };
        let enemy = { ...loc.monsterList[Math.floor(Math.random() * loc.monsterList.length)] };
        let bonus = Math.floor(game.level / 2);
        enemy.hp = enemy.baseHp + bonus * 5;
        enemy.str = enemy.baseStr + bonus * 2;
        enemy.def = enemy.baseDef + bonus;
        enemy.exp = enemy.baseExp + bonus * 8;
        enemy.gold = enemy.baseGold + bonus * 5;
        return enemy;
    }
    
    function getBoss(locKey) {
        const loc = LOCATIONS[locKey];
        if (!loc || !loc.boss) return null;
        let b = { ...loc.boss };
        let bonus = Math.floor(game.level / 2);
        b.hp += bonus * 10;
        b.str += bonus * 3;
        b.def += bonus * 2;
        b.exp += bonus * 20;
        b.gold += bonus * 30;
        b.isBoss = true;
        b.dodgeChance = 10;
        return b;
    }
    
    async function openChest(floor) {
        if (game.chestsOpened[floor]) { game.message = "❌ Сундук уже был открыт!"; renderGame(); return; }
        game.chestsOpened[floor] = true;
        
        const rand = Math.random();
        let reward = "";
        if (rand < 0.1) { // 10% - мифическое
            const item = ALL_ITEMS.filter(i => i.rarity === "mythic")[Math.floor(Math.random() * ALL_ITEMS.filter(i => i.rarity === "mythic").length)];
            if (item) { game.inventory.push({ ...item }); reward = `🎁 МИФИЧЕСКОЕ: ${item.name} +${item.strBonus || item.defBonus}! 🎁`; }
        } else if (rand < 0.3) { // 20% - легендарное
            const item = ALL_ITEMS.filter(i => i.rarity === "legendary")[Math.floor(Math.random() * ALL_ITEMS.filter(i => i.rarity === "legendary").length)];
            if (item) { game.inventory.push({ ...item }); reward = `🎁 ЛЕГЕНДАРНОЕ: ${item.name} +${item.strBonus || item.defBonus}! 🎁`; }
        } else if (rand < 0.5) { // 20% - эпическое
            const item = ALL_ITEMS.filter(i => i.rarity === "epic")[Math.floor(Math.random() * ALL_ITEMS.filter(i => i.rarity === "epic").length)];
            if (item) { game.inventory.push({ ...item }); reward = `🎁 Эпическое: ${item.name} +${item.strBonus || item.defBonus}! 🎁`; }
        } else { // 50% - ресурсы
            const resList = RESOURCES_LIST.filter(r => !["Целебная трава", "Магический гриб"].includes(r));
            const res = resList[Math.floor(Math.random() * resList.length)];
            const amount = Math.floor(Math.random() * 10) + 3;
            game.resources[res] = (game.resources[res] || 0) + amount;
            reward = `🎁 СУНДУК: ${res} x${amount}! 🎁`;
        }
        game.message = reward;
        await saveGame();
        renderGame();
    }
    
    function getRarityBadge(rarity) {
        const names = { common: "Обычное", rare: "Редкое", epic: "Эпическое", legendary: "Легендарное", mythic: "Мифическое" };
        return `<span class="rarity-badge rarity-${rarity}">${names[rarity] || rarity}</span>`;
    }
    
    async function gainExp(amount) {
        game.exp += amount;
        game.message += ` +${amount}✨`;
        while (game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxCombatEnergy += 5;
            game.maxTravelEnergy += 2;
            game.combatEnergy = game.maxCombatEnergy;
            game.travelEnergy = game.maxTravelEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` ✨ УРОВЕНЬ ${game.level}! ✨`;
            await saveGame();
        }
        renderGame();
    }
    
    async function combatAction(action) {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        let stats = getCurrentStats();
        
        if (game.enemyCurrentHp <= 0) {
            game.gold += enemy.gold;
            await gainExp(enemy.exp);
            if (!enemy.isBoss) game.monstersKilled++;
            
            // Дроп предметов с врагов
            const dropRand = Math.random();
            if (dropRand < 0.05) { // 5% шанс выпадения предмета
                const possibleItems = ALL_ITEMS.filter(i => i.rarity !== "mythic");
                const item = possibleItems[Math.floor(Math.random() * possibleItems.length)];
                if (item) {
                    game.inventory.push({ ...item });
                    game.message += ` +📦 ${item.name} (${item.rarity})!`;
                }
            } else if (dropRand < 0.15) { // 10% шанс выпадения ресурсов
                const resList = RESOURCES_LIST.slice(0, 20);
                const res = resList[Math.floor(Math.random() * resList.length)];
                const amount = Math.floor(Math.random() * 3) + 1;
                game.resources[res] = (game.resources[res] || 0) + amount;
                game.message += ` +📦 ${res} x${amount}!`;
            }
            
            const energyBack = enemy.isBoss ? 15 : 8;
            if (!game.isAdmin) game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + energyBack);
            game.message = `🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            if (enemy.isBoss && game.location === "dungeonLoc") {
                game.dungeonFloor++;
                if (game.dungeonFloor % 20 === 0 && game.dungeonFloor > 1) await openChest(game.dungeonFloor - 20);
                if (game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
                game.message += `\n📍 Переход на ${game.dungeonFloor} этаж`;
                game.inCombat = false;
                game.combatEnemy = null;
                await saveGame();
                renderGame();
                return;
            }
            
            if (enemy.isBoss) {
                if (!game.completedLocations.includes(game.location)) {
                    game.completedLocations.push(game.location);
                    game.message += `\n🏆 БОСС ПОБЕЖДЁН! Локация ${game.location} завершена! 🏆`;
                    game.monstersKilled = 0;
                }
                game.inCombat = false;
                game.combatEnemy = null;
                if (game.autoFightActive) stopAutoFight();
                await saveGame();
                renderGame();
                return;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            await saveGame();
            if (game.autoFightActive && !enemy.isBoss && game.monstersKilled < (LOCATIONS[game.location]?.monstersRequired || 15)) {
                if (game.combatEnergy > (game.isAdmin ? 0 : 10)) {
                    renderGame();
                    setTimeout(() => startRandomFight(), 200);
                } else { stopAutoFight(); }
            } else { renderGame(); }
            return;
        }
        
        if (stats.hp <= 0) {
            if (!game.isAdmin) game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 3);
            game.message = `💀 Поражение... Возвращено 3⚡`;
            game.inCombat = false;
            game.combatEnemy = null;
            if (game.autoFightActive) stopAutoFight();
            await saveGame();
            renderGame();
            return;
        }
        
        if (action === "use_potion") {
            let used = false;
            if (game.potions.strong > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 50); game.potions.strong--; game.message = `💊 Мощное зелье +50 HP!`; used = true; }
            else if (game.potions.medium > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 25); game.potions.medium--; game.message = `🧪 Среднее зелье +25 HP!`; used = true; }
            else if (game.potions.weak > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 10); game.potions.weak--; game.message = `🍃 Слабое зелье +10 HP!`; used = true; }
            else { game.message = "❌ Нет зелий!"; renderGame(); return; }
            if (used) {
                let dmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                game.combatEnergy -= dmg;
                if (game.combatEnergy < 0) game.combatEnergy = 0;
                game.message += ` | Враг атакует → -${dmg} HP`;
                await saveGame();
                renderGame();
            }
            return;
        }
        
        if (action === "attack") {
            let dmg = Math.max(1, stats.str + Math.floor(Math.random() * 8) - enemy.def);
            game.enemyCurrentHp -= dmg;
            game.message = `⚡ Урон ${dmg} по ${enemy.name}`;
            let dodgeChance = stats.dodgeBonus + (Math.random() * 100);
            if (dodgeChance < 15) { game.message += ` ✨ Уворот!`; }
            else {
                let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                game.combatEnergy -= enemyDmg;
                game.message += ` | Враг атакует → -${enemyDmg} HP`;
            }
            if (game.combatEnergy < 0) game.combatEnergy = 0;
            await saveGame();
            renderGame();
            return;
        }
    }
    
    function startRandomFight() {
        const loc = LOCATIONS[game.location];
        const need = loc?.monstersRequired || 15;
        if (game.completedLocations.includes(game.location)) { game.message = "Босс уже побеждён! Переходите на следующую локацию."; renderGame(); return; }
        if (game.monstersKilled >= need) { game.message = `✨ Вы убили ${need} монстров! БОСС ДОСТУПЕН! ✨`; renderGame(); return; }
        if (game.combatEnergy < 10 && !game.isAdmin) { game.message = "❌ Недостаточно энергии!"; renderGame(); return; }
        if (!game.isAdmin) game.combatEnergy -= 10;
        let enemy = getRandomEnemy();
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ БОЙ ${game.monstersKilled+1}/${need}: ${enemy.icon} ${enemy.name}`;
        renderGame();
    }
    
    function startAutoFight() {
        const need = LOCATIONS[game.location]?.monstersRequired || 15;
        if (game.completedLocations.includes(game.location)) { game.message = "Босс уже побеждён!"; renderGame(); return; }
        if (game.monstersKilled >= need) { game.message = `✨ Вы убили ${need} монстров! БОСС ДОСТУПЕН! ✨`; renderGame(); return; }
        if (game.autoFightActive) { stopAutoFight(); return; }
        game.autoFightActive = true;
        game.message = "🟢 АВТОБОЙ ВКЛЮЧЁН!";
        renderGame();
        function nextFight() {
            if (!game.autoFightActive) return;
            if (game.inCombat) return;
            if (game.completedLocations.includes(game.location)) { stopAutoFight(); game.message = "Босс побеждён!"; renderGame(); return; }
            if (game.monstersKilled >= need) { stopAutoFight(); game.message = "БОСС ДОСТУПЕН!"; renderGame(); return; }
            if (game.combatEnergy < 10 && !game.isAdmin) { stopAutoFight(); game.message = "Недостаточно энергии!"; renderGame(); return; }
            startRandomFight();
        }
        game.autoFightInterval = setInterval(() => { if (game.autoFightActive && !game.inCombat) nextFight(); }, 800);
    }
    
    function stopAutoFight() { game.autoFightActive = false; if (game.autoFightInterval) { clearInterval(game.autoFightInterval); game.autoFightInterval = null; } }
    
    function startBossFight() {
        if (game.completedLocations.includes(game.location)) { game.message = "Босс уже побеждён! Переходите на следующую локацию."; renderGame(); return; }
        const need = LOCATIONS[game.location]?.monstersRequired || 15;
        if (game.monstersKilled < need && !game.isAdmin) { game.message = `❌ Нужно убить ещё ${need - game.monstersKilled} монстров, чтобы открыть босса!`; renderGame(); return; }
        let boss = getBoss(game.location);
        if (!boss) { game.message = "Здесь нет босса!"; renderGame(); return; }
        if (game.combatEnergy < 15 && !game.isAdmin) { game.message = "❌ Недостаточно энергии для боя с боссом!"; renderGame(); return; }
        if (!game.isAdmin) game.combatEnergy -= 15;
        game.inCombat = true;
        game.combatEnemy = boss;
        game.enemyCurrentHp = boss.hp;
        game.message = `⚔️ БОЙ С БОССОМ: ${boss.icon} ${boss.name}`;
        renderGame();
    }
    
    function startDungeonFight() {
        if (game.dungeonFloor > 1000) { game.message = "🎉 ПОЗДРАВЛЯЮ! Ты прошёл все 1000 этажей! 🎉"; renderGame(); return; }
        const isBoss = (game.dungeonFloor % 20 === 0);
        let enemy;
        if (isBoss) {
            enemy = { name: `👑 БОСС ${game.dungeonFloor} этажа 👑`, hp: 150 + game.dungeonFloor * 2, str: 30 + Math.floor(game.dungeonFloor / 2), def: 15 + Math.floor(game.dungeonFloor / 5), exp: 300 + game.dungeonFloor * 8, gold: 200 + game.dungeonFloor * 10, icon: "👑", isBoss: true };
        } else {
            enemy = { name: `Страж ${game.dungeonFloor} этажа`, hp: 50 + Math.floor(game.dungeonFloor * 1.5), str: 15 + Math.floor(game.dungeonFloor / 3), def: 8 + Math.floor(game.dungeonFloor / 6), exp: 60 + game.dungeonFloor * 2, gold: 40 + game.dungeonFloor * 3, icon: "👹" };
        }
        if (game.combatEnergy < 10 && !game.isAdmin) { game.message = "❌ Недостаточно энергии!"; renderGame(); return; }
        if (!game.isAdmin) game.combatEnergy -= 10;
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ ПОДЗЕМЕЛЬЕ ${game.dungeonFloor} этаж: ${enemy.icon} ${enemy.name}`;
        renderGame();
    }
    
    function goToFloor(floor) {
        floor = Math.min(1000, Math.max(1, floor));
        if (game.isAdmin || floor <= game.maxUnlockedFloor + 10) {
            game.dungeonFloor = floor;
            if (floor > game.maxUnlockedFloor) game.maxUnlockedFloor = floor;
            game.message = `📍 Переход на ${floor} этаж`;
            renderGame();
        } else { game.message = `❌ Нельзя перейти на ${floor} этаж!`; renderGame(); }
    }
    
    function changeLocation(locKey) {
        if (game.location !== "village" && game.location !== locKey) {
            const currentLocCompleted = game.completedLocations.includes(game.location);
            if (!currentLocCompleted && !game.isAdmin) {
                game.message = "❌ Сначала победите босса в текущей локации!";
                renderGame();
                return;
            }
        }
        if (!canAccessLocation(locKey)) { game.message = "❌ Сначала победите босса в предыдущей локации!"; renderGame(); return; }
        let loc = LOCATIONS[locKey];
        if (game.travelEnergy >= loc.energyCost || game.isAdmin) {
            if (!game.isAdmin) game.travelEnergy -= loc.energyCost;
            game.location = locKey;
            game.monstersKilled = 0;
            game.needToKill = loc.monstersRequired || 15;
            if (game.completedLocations.includes(locKey)) game.monstersKilled = game.needToKill;
            game.message = `🚶 Переход в ${loc.name} | Нужно убить ${game.needToKill} монстров`;
            renderGame();
        } else { game.message = "❌ Недостаточно энергии!"; renderGame(); }
    }
    
    async function usePotion(type) {
        if (type === "weak" && game.potions.weak > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 10); game.potions.weak--; game.message = `🍃 Слабое зелье +10 HP!`; }
        else if (type === "medium" && game.potions.medium > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 25); game.potions.medium--; game.message = `🧪 Среднее зелье +25 HP!`; }
        else if (type === "strong" && game.potions.strong > 0) { game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 50); game.potions.strong--; game.message = `💊 Мощное зелье +50 HP!`; }
        else { game.message = "❌ Нет таких зелий!"; }
        await saveGame();
        renderGame();
    }
    
    async function buyEnergy() {
        if (game.gold >= 250) { game.gold -= 250; game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 5); game.message = "🍺 +5 энергии путешествий!"; await saveGame(); renderGame(); closeDialog(); }
        else { game.message = "❌ Не хватает 250 золота!"; renderGame(); }
    }
    
    async function buyItem(item) {
        if (game.gold >= (item.price || 5000)) { game.gold -= (item.price || 5000); game.inventory.push({ ...item }); game.message = `✅ Куплено ${item.name}!`; await saveGame(); renderGame(); }
        else { game.message = `❌ Не хватает ${(item.price || 5000) - game.gold}💰!`; renderGame(); }
    }
    
    async function craftPotion(type) {
        const hasWeak = game.resources["Целебная трава"] >= 1 && game.resources["Магический гриб"] >= 1 && game.gold >= 50;
        const hasMedium = game.resources["Целебная трава"] >= 2 && game.resources["Магический гриб"] >= 2 && game.resources["Мифический цветок"] >= 1 && game.gold >= 150;
        const hasStrong = game.resources["Целебная трава"] >= 3 && game.resources["Магический гриб"] >= 3 && game.resources["Мифический цветок"] >= 2 && game.gold >= 300;
        if (type === "weak" && hasWeak) { game.resources["Целебная трава"]--; game.resources["Магический гриб"]--; game.gold -= 50; game.potions.weak += 3; game.message = "🍃 Скрафчено 3 слабых зелья!"; }
        else if (type === "medium" && hasMedium) { game.resources["Целебная трава"] -= 2; game.resources["Магический гриб"] -= 2; game.resources["Мифический цветок"]--; game.gold -= 150; game.potions.medium += 3; game.message = "🌿 Скрафчено 3 средних зелья!"; }
        else if (type === "strong" && hasStrong) { game.resources["Целебная трава"] -= 3; game.resources["Магический гриб"] -= 3; game.resources["Мифический цветок"] -= 2; game.gold -= 300; game.potions.strong += 3; game.message = "🌸 Скрафчено 3 мощных зелья!"; }
        else { game.message = "❌ Не хватает ресурсов!"; }
        await saveGame();
        renderGame();
    }
    
    async function craftMythic(item) {
        let canCraft = true;
        for (let [res, need] of Object.entries(item.resources)) {
            if ((game.resources[res] || 0) < need) canCraft = false;
        }
        if (!canCraft) { game.message = "❌ Не хватает ресурсов для крафта!"; renderGame(); return; }
        for (let [res, need] of Object.entries(item.resources)) {
            game.resources[res] -= need;
        }
        const craftedItem = { name: item.name, type: item.type, strBonus: item.strBonus || 0, defBonus: item.defBonus || 0, rarity: "mythic" };
        game.inventory.push(craftedItem);
        if (craftedItem.type === "weapon") game.weapon = craftedItem;
        else game.armor = craftedItem;
        game.message = `🎉 ВЫ СКРАФТИЛИ ${item.name}! 🎉`;
        await saveGame();
        renderGame();
    }
    
    async function equipItem(item) {
        if (item.type === "weapon") game.weapon = item;
        else if (item.type === "armor") game.armor = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        await saveGame();
        renderGame();
    }
    
    // АДМИН ФУНКЦИИ
    async function adminGiveGold() { if (!game.isAdmin) return; let nick = document.getElementById("adminGoldNick")?.value; let amount = parseInt(document.getElementById("adminGoldAmount")?.value); if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } const data = await loadData(`rpg_${nick}`); if (data) { let target = JSON.parse(data); target.gold = (target.gold || 0) + (isNaN(amount) ? 500 : amount); await saveData(`rpg_${nick}`, JSON.stringify(target)); game.message = `👑 Выдано ${amount}💰 игроку ${nick}`; } else { game.message = `❌ Игрок ${nick} не найден!`; } renderGame(); }
    async function adminGiveExp() { if (!game.isAdmin) return; let nick = document.getElementById("adminExpNick")?.value; let amount = parseInt(document.getElementById("adminExpAmount")?.value); if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } const data = await loadData(`rpg_${nick}`); if (data) { let target = JSON.parse(data); target.exp = (target.exp || 0) + (isNaN(amount) ? 300 : amount); while (target.exp >= target.expToNext) { target.exp -= target.expToNext; target.level++; target.maxCombatEnergy += 5; target.maxTravelEnergy += 2; target.expToNext = Math.floor(target.expToNext * 1.2); } await saveData(`rpg_${nick}`, JSON.stringify(target)); game.message = `👑 Выдано ${amount}✨ опыта игроку ${nick}`; } else { game.message = `❌ Игрок ${nick} не найден!`; } renderGame(); }
    async function adminGiveEnergy() { if (!game.isAdmin) return; let nick = document.getElementById("adminEnergyNick")?.value; let amount = parseInt(document.getElementById("adminEnergyAmount")?.value); if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } const data = await loadData(`rpg_${nick}`); if (data) { let target = JSON.parse(data); target.combatEnergy = Math.min(target.maxCombatEnergy, (target.combatEnergy || 0) + (isNaN(amount) ? 100 : amount)); target.travelEnergy = Math.min(target.maxTravelEnergy, (target.travelEnergy || 0) + (isNaN(amount) ? 50 : amount)); await saveData(`rpg_${nick}`, JSON.stringify(target)); game.message = `👑 Выдано ${amount}⚡ энергии игроку ${nick}`; } else { game.message = `❌ Игрок ${nick} не найден!`; } renderGame(); }
    async function adminGiveItem() { if (!game.isAdmin) return; let nick = document.getElementById("adminItemNick")?.value; let itemName = document.getElementById("adminItemSelect")?.value; if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } const item = ALL_ITEMS.find(i => i.name === itemName); if (!item) return; const data = await loadData(`rpg_${nick}`); if (data) { let target = JSON.parse(data); if (!target.inventory) target.inventory = []; target.inventory.push({ ...item }); await saveData(`rpg_${nick}`, JSON.stringify(target)); game.message = `👑 Выдан предмет ${itemName} игроку ${nick}`; } else { game.message = `❌ Игрок ${nick} не найден!`; } renderGame(); }
    async function adminResetPlayer() { if (!game.isAdmin) return; let nick = document.getElementById("adminResetNick")?.value; if (!nick) { game.message = "❌ Введите ник!"; renderGame(); return; } if (confirm(`Сбросить прогресс игрока "${nick}"?`)) { await deleteData(`rpg_${nick}`); game.message = `👑 Прогресс игрока ${nick} сброшен!`; renderGame(); } }
    
    function startDialog(npc) {
        let dialogHtml = `<div class="dialog-overlay" id="dialogOverlay"><div class="dialog-window"><div class="dialog-header"><div style="font-size:3rem;">${npc.avatar}</div><div style="color:#f7d44a;">${npc.name} ${npc.icon}</div></div><div class="dialog-body"><div class="dialog-text">${npc.type === "blacksmith" ? "Кузнец Гром: Лучшее оружие и броня!" : npc.type === "alchemist" ? "Алхимик Морган: Крафт зелий из ресурсов!" : npc.type === "tavern" ? "Трактирщик: Эль за 250💰!" : "Мастер крафта: Мифическое оружие из ресурсов боссов 100+ этажа!"}</div></div><div class="dialog-footer"><div class="dialog-buttons">
            ${npc.type === "blacksmith" ? npc.items.slice(0, 15).map(item => `<button class="dialog-btn" onclick="buyItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">${item.name} - ${item.price || 5000}💰 ${getRarityBadge(item.rarity)}</button>`).join('') : ""}
            ${npc.type === "alchemist" ? `<button class="dialog-btn" onclick="craftPotion('weak')">🍃 Слабое зелье</button><button class="dialog-btn" onclick="craftPotion('medium')">🌿 Среднее зелье</button><button class="dialog-btn" onclick="craftPotion('strong')">🌸 Мощное зелье</button>` : ""}
            ${npc.type === "tavern" ? `<button class="dialog-btn" onclick="buyEnergy()">🍺 Купить эль за 250💰</button>` : ""}
            ${npc.type === "crafter" ? MYTHIC_CRAFTS.map(item => `<button class="dialog-btn" onclick="craftMythic(${JSON.stringify(item).replace(/"/g, '&quot;')})">🔨 ${item.name}</button>`).join('') : ""}
            <button class="dialog-btn" onclick="closeDialog()">🚪 Закрыть</button>
        </div></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', dialogHtml);
    }
    
    function closeDialog() { document.getElementById("dialogOverlay")?.remove(); }
    function toggleAdminPanel() { document.getElementById("adminPanel")?.classList.toggle("show"); }

        document.getElementById("fightDungeonBtn")?.addEventListener("click", () => startDungeonFight());
        document.getElementById("goToFloorBtn")?.addEventListener("click", () => goToFloor(parseInt(document.getElementById("floorInput")?.value||1)));
        document.getElementById("attackBtn")?.addEventListener("click", () => combatAction("attack"));
        document.getElementById("potionBtn")?.addEventListener("click", () => combatAction("use_potion"));
        document.getElementById("runToggleBtn")?.addEventListener("click", () => { game.isRunning = !game.isRunning; renderGame(); });
        document.getElementById("resetBtn")?.addEventListener("click", async () => { if(confirm("Сбросить прогресс?")) { await deleteData(`rpg_${game.telegramId||game.profileName}`); game.initialized=false; renderGame(); } });
        
        let sp = document.getElementById("characterSprite");
        if(sp) sp.innerHTML = `<div class="char-${game.isRunning?"running":"idle"}">${cls.icon}</div>`;
    }
    
    window.changeLocation = changeLocation; window.startDialog = startDialog; window.buyItem = buyItem; window.craftPotion = craftPotion; window.craftMythic = craftMythic;
    window.buyEnergy = buyEnergy; window.closeDialog = closeDialog; window.usePotion = usePotion; window.equipItem = equipItem;
    window.adminGiveGold = adminGiveGold; window.adminGiveExp = adminGiveExp; window.adminGiveEnergy = adminGiveEnergy;
    window.adminGiveItem = adminGiveItem; window.adminResetPlayer = adminResetPlayer; window.toggleAdminPanel = toggleAdminPanel;
    renderGame();
</script>
</body>
</html>
