<script>
    // ========== АДМИН ДОСТУП ==========
    let isAdmin = false;
    const ADMIN_PASSWORD = "Vlados_Vladosik123";
    
    function enableAdmin() {
        let password = prompt("🔐 Введите пароль администратора:");
        if (password === ADMIN_PASSWORD) {
            isAdmin = true;
            game.message = "👑 Режим администратора активирован!";

        } else {

        }

    // ========== СОХРАНЕНИЕ ==========
    async function saveToTelegram(key, value) {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
            return new Promise((resolve) => {
                Telegram.WebApp.CloudStorage.setItem(key, value, (error) => {
                    if (error) console.error("Ошибка сохранения в Telegram:", error);
                    resolve(!error);
                });
            });
        }
        return false;
    }
    
    async function loadFromTelegram(key) {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
            return new Promise((resolve) => {
                Telegram.WebApp.CloudStorage.getItem(key, (error, value) => {
                    if (error || !value) resolve(null);
                    else resolve(value);
                });
            });
        }
        return null;
    }
    
    async function saveGame() {
        if (!game.profileName) return;
        let saveData = JSON.parse(JSON.stringify(game));
        saveData.message = "";
        saveData.inCombat = false;
        saveData.combatEnemy = null;
        let saveStr = JSON.stringify(saveData);
        localStorage.setItem("rpg_mega_" + game.profileName, saveStr);
        await saveToTelegram("rpg_mega_" + game.profileName, saveStr);
    }
    
    async function loadGame(playerName) {
        let saveStr = await loadFromTelegram("rpg_mega_" + playerName);
        if (!saveStr) saveStr = localStorage.getItem("rpg_mega_" + playerName);
        if (saveStr) {
            try {
                let loaded = JSON.parse(saveStr);
                Object.assign(game, loaded);
                game.initialized = true;
                game.activeTab = "game";
                updateDailyShop();
                updateDailyAlchemist();
                game.message = "📀 Данные загружены! Добро пожаловать, " + playerName + "!";
                if (window.Telegram && window.Telegram.WebApp) Telegram.WebApp.expand();
                renderGame();
                return true;
            } catch(e) { console.error(e); }
        }
        return false;
    }
    
    async function loadOtherPlayerData(playerName) {
        if (!playerName || playerName === game.profileName) return null;
        let saveStr = await loadFromTelegram("rpg_mega_" + playerName);
        if (!saveStr) saveStr = localStorage.getItem("rpg_mega_" + playerName);
        if (saveStr) {
            try { return JSON.parse(saveStr); } catch(e) { return null; }
        }
        return null;
    }
    
    async function saveOtherPlayerData(playerName, data) {
        let saveStr = JSON.stringify(data);
        localStorage.setItem("rpg_mega_" + playerName, saveStr);
        await saveToTelegram("rpg_mega_" + playerName, saveStr);
    }
    
    async function resetPlayerProgress(targetPlayer) {
        if (!targetPlayer || targetPlayer === "") {
            game.message = "❌ Укажите ник игрока для сброса!";
            renderGame();
            return;
        }
        if (confirm(`⚠️ Вы точно хотите сбросить ВЕСЬ прогресс игрока ${targetPlayer}? Это действие необратимо!`)) {
            localStorage.removeItem("rpg_mega_" + targetPlayer);
            await saveToTelegram("rpg_mega_" + targetPlayer, "");
            if (targetPlayer === game.profileName) {
                game.initialized = false;
            }
            game.message = `💀 Прогресс игрока ${targetPlayer} сброшен!`;
            renderGame();
        }
    }
    
    async function giveToPlayer(targetPlayer, giveType, giveItem, amount = 1) {
        let targetName = targetPlayer || game.profileName;
        if (!targetName || targetName === "") {
            game.message = "❌ Укажите ник игрока!";
            renderGame();
            return;
        }
        
        let isSelf = (targetName === game.profileName);
        let playerData;
        
        if (isSelf) {
            playerData = game;
        } else {
            playerData = await loadOtherPlayerData(targetName);
            if (!playerData) {
                game.message = `❌ Игрок ${targetName} не найден! Сначала он должен зайти в игру.`;
                renderGame();
                return;
            }
        }
        
        if (giveType === "gold") {
            playerData.gold = (playerData.gold || 0) + amount;
            game.message = `💰 Выдано ${amount} золота игроку ${targetName}!`;
        } else if (giveType === "exp") {
            let exp = amount;
            playerData.exp += exp;
            while (playerData.exp >= playerData.expToNext) {
                playerData.exp -= playerData.expToNext;
                playerData.level++;
                playerData.maxHp += 12;
                playerData.hp = Math.min(playerData.maxHp, playerData.hp + 25);
                playerData.maxTravelEnergy += 2;
                playerData.expToNext = Math.floor(playerData.expToNext * 1.2);
            }
            game.message = `✨ Выдано ${amount} опыта игроку ${targetName}!`;
        } else if (giveType === "resource") {
            playerData.resources = playerData.resources || {};
            playerData.resources[giveItem] = (playerData.resources[giveItem] || 0) + amount;
            game.message = `🌿 Выдано ${amount}x ${giveItem} игроку ${targetName}!`;
        } else if (giveType === "weapon" || giveType === "armor") {
            playerData.inventory = playerData.inventory || [];
            let itemCopy = JSON.parse(JSON.stringify(giveItem));
            playerData.inventory.push(itemCopy);
            game.message = `⚔️ Выдан предмет ${itemCopy.name} игроку ${targetName}!`;
        }
        
        if (isSelf) {
            saveGame();
        } else {
            await saveOtherPlayerData(targetName, playerData);
        }
        renderGame();
    }

    function updateDailyShop() {

        if (game.lastDailyReset !== today || game.dailyWeapons.length === 0) {
            let w = [...SHOP_WEAPONS];
            for(let i=w.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[w[i],w[j]]=[w[j],w[i]];}

        const monsterName = monstersList[Math.floor(Math.random() * monstersList.length)];
        let monster = {
            name: monsterName,
            hp: 30 + Math.floor(game.level * 1.5),
            str: 10 + Math.floor(game.level / 3),
            exp: 40 + game.level,
            gold: 25 + Math.floor(game.level / 2),

        };

        monster.hp = Math.floor(monster.hp * multiplier);
        monster.str = Math.floor(monster.str * multiplier);
        monster.exp = Math.floor(monster.exp * multiplier);
        monster.gold = Math.floor(monster.gold * multiplier);
        return monster;
    }

    function updateQuestProgress(type, target, amount = 1) {
        for (let q of game.activeQuests) {
            if (q.progress >= q.count) continue;
            if ((type === "kill" && q.type === "kill" && q.target === target) ||
                (type === "resource" && q.type === "resource" && q.target === target)) {
                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            } else if (type === "craft" && q.type === "craft") {
                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            } else if (type === "dungeon" && q.type === "dungeon") {
                q.progress = Math.min(q.count, game.dungeonFloor);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            }
        }
        saveGame();
    }

            game.level++;
            game.maxHp += 12;
            game.hp = Math.min(game.maxHp, game.hp + 25);
            game.maxTravelEnergy += 2;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 4);
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` 🎉 УРОВЕНЬ ${game.level}! 🎉`;
        }
        saveGame();
        if (render) renderGame();
    }
    
    function attack() {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        if (Math.random() * 100 < getDodgeChance()) { game.message = `🌀 УВОРОТ!`; renderGame(); return; }
        let damage = Math.max(5, getStrength() + Math.floor(Math.random() * 15) - 5);
        let isCrit = Math.random() * 100 < getCritChance();
        if (isCrit) { damage = Math.floor(damage * 1.5); game.message = `💥 КРИТ! `; }
        game.enemyCurrentHp -= damage;
        game.message = `⚔️ Урон ${damage} по ${enemy.name}!`;
        if (game.enemyCurrentHp <= 0) {
            let energyBack = enemy.isBoss ? 20 : 8;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + energyBack);
            game.gold += enemy.gold;
            addExp(enemy.exp);
            if (!enemy.isBoss) { 
                game.monstersKilled++; 
                updateQuestProgress("kill", enemy.name, 1);
            } else { 
                game.monstersKilled = 0; 
            }
            game.hp = Math.min(game.maxHp, game.hp + (enemy.isBoss ? 30 : 10));
            game.message += ` 🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            if (game.location === "dungeon") {
                game.dungeonFloor++;
                if (game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
                updateQuestProgress("dungeon", null, 0);
                if (Math.random() < 0.3) {
                    let res = ALL_RESOURCES[Math.floor(Math.random() * 5)];
                    game.resources[res] = (game.resources[res] || 0) + 1;
                    updateQuestProgress("resource", res, 1);
                    game.message += ` 📦 +${res}`;
                }
                game.message += ` 📈 Этаж ${game.dungeonFloor}!`;
            } else if (Math.random() < 0.15) {
                let res = ALL_RESOURCES[Math.floor(Math.random() * 5)];
                game.resources[res] = (game.resources[res] || 0) + 1;
                updateQuestProgress("resource", res, 1);
                game.message += ` 🌿 +${res}`;
            }
            
            if (enemy.isBoss && !game.completedLocations.includes(game.location) && game.location !== "dungeon") {
                game.completedLocations.push(game.location);
                game.message += ` 🎉 Локация пройдена!`;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            saveGame();
            renderGame();
            return;
        }
        
        let enemyDamage = Math.max(4, enemy.str + Math.floor(Math.random() * 12) - getDefense());
        game.hp -= enemyDamage;
        game.message += ` 😡 ${enemy.name} нанёс ${enemyDamage} урона!`;
        if (game.hp <= 0) {
            game.hp = Math.floor(game.maxHp * 0.6);
            game.message = ` 💀 Вы погибли! Восстановлено 60% HP.`;
            game.inCombat = false;
            game.combatEnemy = null;
        }
        saveGame();
        renderGame();
    }
    
    function startFight() {
        if (game.inCombat) return;
        let healCost = Math.max(50, Math.floor(game.maxHp * 0.08));
        if (game.hp < game.maxHp * 0.2) { game.message = `❌ Мало HP, восстановитесь у торговца за ${healCost}💰!`; renderGame(); return; }
        
        // Для подземелья: босс на каждом 20-м этаже, иначе обычный монстр. Счётчик монстров не используется.
        if (game.location === "dungeon") {
            if (game.dungeonFloor % 20 === 0) {
                let boss = getBossForLocation("throne");
                game.inCombat = true;
                game.combatEnemy = boss;
                game.enemyCurrentHp = boss.hp;
                game.message = `⚔️ БОЙ С БОССОМ ПОДЗЕМЕЛЬЯ! ${boss.icon} ${boss.name} (этаж ${game.dungeonFloor}) ⚔️`;
            } else {
                let enemy = getDungeonMonster(game.dungeonFloor);
                game.inCombat = true;
                game.combatEnemy = enemy;
                game.enemyCurrentHp = enemy.hp;
                game.message = `⚔️ БОЙ! ${enemy.icon || "🏰"} ${enemy.name} (этаж ${game.dungeonFloor}) ⚔️`;
            }
            renderGame();
            return;
        }
        
        // Для обычных локаций: 8 побед до босса
        if (game.monstersKilled >= game.needToKill) {
            let boss = getBossForLocation(game.location);
            game.inCombat = true;
            game.combatEnemy = boss;
            game.enemyCurrentHp = boss.hp;
            game.message = `⚔️ БОЙ С БОССОМ! ${boss.icon} ${boss.name} ⚔️`;
        } else {
            let enemy = getMonsterForLocation(game.location);
            game.inCombat = true;
            game.combatEnemy = enemy;
            game.enemyCurrentHp = enemy.hp;
            game.message = `⚔️ БОЙ! ${enemy.icon || "👾"} ${enemy.name} ⚔️`;
        }
        renderGame();
    }
    
    function changeLocation(key) {
        if (game.inCombat) { game.message = "❌ Сначала закончите бой!"; renderGame(); return; }
        let loc = LOCATIONS[key];
        if (!loc) return;
        if (game.level < loc.levelReq) { game.message = `❌ Нужен ${loc.levelReq} уровень!`; renderGame(); return; }
        if (game.travelEnergy < loc.energyCost) { game.message = `❌ Нужно ${loc.energyCost} энергии!`; renderGame(); return; }
        game.travelEnergy -= loc.energyCost;
        game.location = key;
        game.monstersKilled = (game.completedLocations.includes(key) && key !== "dungeon") ? game.needToKill : 0;
        game.message = `🚶 Переход в ${loc.name}`;
        saveGame();
        renderGame();
    }
    
    function usePotion() {
        let healAmount = Math.floor(game.maxHp * 0.35);
        let cost = Math.max(80, Math.floor(game.maxHp * 0.06));
        if (game.gold < cost) { game.message = `💰 Нужно ${cost} золота!`; renderGame(); return; }
        game.gold -= cost;
        game.hp = Math.min(game.maxHp, game.hp + healAmount);
        game.message = `🧪 +${healAmount} HP (${cost}💰)`;
        saveGame();
        renderGame();
    }
    
    function restoreEnergy() {
        let cost = Math.max(80, Math.floor(game.level * 2.5));
        if (game.gold < cost) { game.message = `💰 Нужно ${cost} золота!`; renderGame(); return; }
        game.gold -= cost;
        game.travelEnergy = game.maxTravelEnergy;
        game.message = `⚡ Энергия восстановлена! (${cost}💰)`;
        saveGame();
        renderGame();
    }
    
    function craftMythicItem(item) {
        if (!item.craftCost) return;
        let canCraft = true;
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") { if (game.gold < amount) canCraft = false; }
            else if ((game.resources[res] || 0) < amount) canCraft = false;
        }
        if (!canCraft) { game.message = "❌ Не хватает ресурсов для крафта!"; renderGame(); return; }
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") game.gold -= amount;
            else game.resources[res] -= amount;
        }
        game.inventory.push(JSON.parse(JSON.stringify(item)));
        game.craftCount++;
        updateQuestProgress("craft", null, 1);
        game.message = `🔨 Вы скрафтили мифическое оружие ${item.name}!`;
        saveGame();
        renderGame();
    }
    
    function equipItem(item) {
        if (item.type === "weapon") game.weapon = item;
        else if (item.type === "armor") game.armor = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        saveGame();
        renderGame();
    }
    
    function buyItem(item) {
        if (game.gold < item.price) { game.message = `💰 Не хватает ${item.price} золота!`; renderGame(); return; }
        game.gold -= item.price;
        game.inventory.push(JSON.parse(JSON.stringify(item)));
        game.message = `🛒 Куплено: ${item.name} за ${item.price}💰`;
        saveGame();
        renderGame();
    }
    
    function buyAlchemistItem(item) {
        if (game.gold < item.price) { game.message = `💰 Нужно ${item.price} золота!`; renderGame(); return; }
        game.gold -= item.price;
        game.resources[item.resName] = (game.resources[item.resName] || 0) + item.amount;
        updateQuestProgress("resource", item.resName, item.amount);
        game.message = `🧪 Куплено: ${item.name} +${item.amount} за ${item.price}💰`;
        saveGame();
        renderGame();
    }
    
    function resetGame() {
        if (confirm("Сбросить весь прогресс?")) {
            if (game.profileName) {
                localStorage.removeItem("rpg_mega_" + game.profileName);
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
                    Telegram.WebApp.CloudStorage.removeItem("rpg_mega_" + game.profileName);
                }
            }
            game.initialized = false;
            renderGame();
        }
    }
    
    function startDungeon(floor) {
        if (game.inCombat) { game.message = "❌ Сначала закончите бой!"; renderGame(); return; }
        if (floor > game.maxUnlockedFloor) { game.message = `❌ Вы не достигли ${floor} этажа!`; renderGame(); return; }
        let energyCost = Math.max(3, Math.floor(floor / 25) + 2);
        if (game.travelEnergy < energyCost) { game.message = `❌ Нужно ${energyCost} энергии!`; renderGame(); return; }
        game.travelEnergy -= energyCost;
        game.location = "dungeon";
        game.dungeonFloor = floor;
        // В подземелье счётчик убийств не используется
        game.message = `🏰 Вход в подземелье на этаж ${floor}! Энергия: -${energyCost}`;
        saveGame();
        renderGame();
    }
    
    function takeQuest(quest) {
        if (game.activeQuests.some(q => q.id === quest.id)) { game.message = "❌ Вы уже взяли этот квест!"; renderGame(); return; }
        let newQuest = JSON.parse(JSON.stringify(quest));
        newQuest.progress = 0;
        game.activeQuests.push(newQuest);
        game.message = `📜 Взят квест: ${quest.name}!`;
        renderGame();
    }
    
    function createCharacter(name, cls) {
        if (!name.trim()) return;
        let c = CLASSES[cls];
        game.profileName = name;
        game.class = cls;
        game.gold = 5000;
        game.level = 1;
        game.exp = 0;
        game.expToNext = 100;
        game.maxHp = 95 + (c.hpBonus || 0);
        game.hp = game.maxHp;
        game.travelEnergy = 55;
        game.maxTravelEnergy = 55;
        game.monstersKilled = 0;
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.completedLocations = [];
        game.craftCount = 0;
        game.activeQuests = [];
        game.resources = {};
        for (let r of ALL_RESOURCES.slice(0,5)) game.resources[r] = Math.floor(Math.random() * 2);
        game.resources["Целебная трава"] = 5;
        game.resources["Железная руда"] = 3;
        game.weapon = { name: c.weapon, type: "weapon", strBonus: c.strBonus, price: 0, rarity: "common" };
        game.armor = { name: "Кожаный доспех", type: "armor", defBonus: 5, price: 150, rarity: "common" };
        game.inventory = [game.weapon, game.armor];
        game.lastDailyReset = new Date().toDateString();
        game.lastAlchemistReset = new Date().toDateString();
        updateDailyShop();
        updateDailyAlchemist();
        game.tutorialShown = false;
        game.message = `✨ Добро пожаловать, ${name} ${c.name}!`;
        game.initialized = true;
        saveGame();
        renderGame();
        showTutorial();
    }
    
    function talkToTavern() {
        game.message = `🍺 Гром: Что привело тебя, путник? Хочешь заработать?`;
        renderGame();
    }
    
    function showTutorial() {
        if (game.tutorialShown) return;
        game.tutorialShown = true;
        let tutorialDiv = document.createElement('div');
        tutorialDiv.className = 'tutorial-overlay';
        tutorialDiv.innerHTML = `<div class="tutorial-card"><h2>📜 ДОБРО ПОЖАЛОВАТЬ, ГЕРОЙ!</h2>
            <div class="tutorial-step"><h3>⚔️ 1. БОЙ</h3><p>Нажимай «БОЙ» — сражайся с монстрами. После 8 побед появится БОСС.</p></div>
            <div class="tutorial-step"><h3>🏰 2. ПОДЗЕМЕЛЬЕ</h3><p>В подземелье нет счётчика убийств, босс появляется каждые 20 этажей. Чем выше этаж — тем сильнее враги!</p></div>
            <div class="tutorial-step"><h3>🏪 3. ТОРГОВЕЦ</h3><p>У Кузнеца покупай оружие и броню. У Алхимика — ресурсы и зелья.</p></div>
            <div class="tutorial-step"><h3>💎 4. КРАФТ</h3><p>В разделе ТОРГОВЕЦ выбери мифическое оружие и скрафть его из ресурсов.</p></div>
            <div class="tutorial-step"><h3>📦 5. ИНВЕНТАРЬ</h3><p>Кликай на предмет — экипируй его. Смотри свои ресурсы.</p></div>
            <div class="tutorial-buttons"><button onclick="closeTutorial()">✨ ПОНЯЛ, НАЧИНАЮ!</button></div>
        </div>`;
        document.body.appendChild(tutorialDiv);
    }
    
    function closeTutorial() { let overlay = document.querySelector('.tutorial-overlay'); if (overlay) overlay.remove(); }
    function selectCraftItem(item) { game.selectedCraftItem = item; renderGame(); }
    
    function renderGame() {
        let container = document.getElementById("rpgGame");
        if (!container) return;
        if (!game.initialized) {
            let savedNames = [];
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key && key.startsWith("rpg_mega_")) savedNames.push(key.replace("rpg_mega_", ""));
            }
            let savedHtml = savedNames.length ? `<div class="save-load-panel"><b>💾 Загрузить сохранение:</b><br>${savedNames.map(n => `<button onclick="loadGame('${n}')">📀 ${n}</button>`).join(' ')}</div><hr>` : "";
            let selected = "warrior";
            let clsHtml = savedHtml + `<div class="class-selector" id="classSel">` +
                Object.keys(CLASSES).map(k => `<div class="class-option ${selected === k ? 'selected' : ''}" data-class="${k}">${CLASSES[k].icon} ${CLASSES[k].name}<br><span style="font-size:0.6rem;">⚔️ ${CLASSES[k].strBonus} 💪 ${CLASSES[k].hpBonus}</span></div>`).join('') +
                `</div><input id="pname" placeholder="Имя героя"><button id="createBtn" style="background:#f7d44a;">🚀 НАЧАТЬ</button>`;
            container.innerHTML = clsHtml;
            document.getElementById("createBtn").onclick = () => { createCharacter(document.getElementById("pname").value, selected); };
            document.querySelectorAll(".class-option").forEach(el => {
                el.onclick = function() {
                    document.querySelectorAll(".class-option").forEach(c => c.classList.remove("selected"));
                    this.classList.add("selected");
                    selected = this.dataset.class;
                };
            });
            return;
        }
        
        updateDailyShop();
        updateDailyAlchemist();
        let hpPerc = (game.hp / game.maxHp) * 100;
        let travPerc = (game.travelEnergy / game.maxTravelEnergy) * 100;
        let healCost = Math.max(80, Math.floor(game.maxHp * 0.06));
        let energyCost = Math.max(80, Math.floor(game.level * 2.5));
        
        let locsHtml = Object.keys(LOCATIONS).map(k => {
            let l = LOCATIONS[k];
            let locked = game.level < l.levelReq;
            return `<button class="location-btn ${locked ? 'locked' : ''} ${game.completedLocations.includes(k) ? 'completed' : ''}" onclick="changeLocation('${k}')" ${locked ? 'disabled' : ''}>${l.icon} ${l.name}<br><span style="font-size:0.6rem;">${l.levelReq}ур</span></button>`;
        }).join('');
        
        let dungeonFloors = [];
        for (let i = 1; i <= Math.min(game.maxUnlockedFloor, 100); i += 5) {
            dungeonFloors.push(`<div class="dungeon-floor-btn ${game.dungeonFloor >= i ? 'reached' : ''}" onclick="startDungeon(${i})">${i}-${Math.min(i+4, game.maxUnlockedFloor)}</div>`);
        }
        
        let fightBlock = game.inCombat ? `<div class="fight-block"><div>${game.combatEnemy.icon || "👾"} ${game.combatEnemy.name}</div><div>❤️ ${Math.max(0, game.enemyCurrentHp)}/${game.combatEnemy.hp}</div><button id="attackBtn" style="background:#8b3c2c;">⚔️ АТАКОВАТЬ</button></div>` : '';
        
        // Кузнец
        let traderHtml = `<div class="trader-section"><h4>⚒️ КУЗНЕЦ БРОНИСЛАВ</h4><div style="font-size:0.7rem; color:#f7d44a;">🔄 Товары обновляются каждый день в 00:00</div>`;
        traderHtml += `<div style="margin-top:8px;"><b>⚔️ ОРУЖИЕ:</b></div>`;
        if (game.dailyWeapons && game.dailyWeapons.length) {
            game.dailyWeapons.forEach(w => {
                traderHtml += `<div class="shop-item"><span class="rarity-${w.rarity}">⚔️ ${w.name}</span> +${w.strBonus} <button onclick="buyItem(${JSON.stringify(w).replace(/"/g, '&quot;')})">${w.price}💰</button></div>`;
            });
        }
        traderHtml += `<div style="margin-top:8px;"><b>🛡️ БРОНЯ:</b></div>`;
        if (game.dailyArmors && game.dailyArmors.length) {
            game.dailyArmors.forEach(a => {
                traderHtml += `<div class="shop-item"><span class="rarity-${a.rarity}">🛡️ ${a.name}</span> +${a.defBonus} <button onclick="buyItem(${JSON.stringify(a).replace(/"/g, '&quot;')})">${a.price}💰</button></div>`;
            });
        }
        traderHtml += `</div>`;
        
        // Алхимик
        traderHtml += `<div class="trader-section"><h4>🧪 АЛХИМИК МЕЛИССА</h4><div style="font-size:0.7rem; color:#f7d44a;">🔄 Товары обновляются каждый день в 00:00</div>`;
        traderHtml += `<div class="shop-item">🧴 Лечебное зелье (+${Math.floor(game.maxHp * 0.35)} HP) <button onclick="usePotion()">${healCost}💰</button></div>`;
        traderHtml += `<div class="shop-item">⚡ Энергетический эликсир <button onclick="restoreEnergy()">${energyCost}💰</button></div>`;
        if (game.dailyAlchemist && game.dailyAlchemist.length) {
            game.dailyAlchemist.forEach(item => {
                traderHtml += `<div class="shop-item"><span class="rarity-${item.rarity}">🌿 ${item.name}</span> <button onclick="buyAlchemistItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">${item.price}💰</button></div>`;
            });
        }
        traderHtml += `<div class="daily-reset">⏰ Следующее обновление товаров: завтра в 00:00</div></div>`;
        
        // Крафт
        traderHtml += `<div class="trader-section"><h4>💎 КРАФТ МИФИЧЕСКОГО ОРУЖИЯ</h4>
            <div style="font-size:0.7rem; color:#ffaa44;">⚠️ Требуются легендарные и мифические ресурсы</div>
            <div class="craft-list">`;
        MYTHIC_CRAFT_ITEMS.forEach(item => {
            let isSelected = game.selectedCraftItem && game.selectedCraftItem.name === item.name;
            traderHtml += `<div class="craft-item ${isSelected ? 'selected' : ''}" onclick="selectCraftItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                <div><b class="rarity-${item.rarity}">${item.name}</b> +${item.strBonus}<br><span style="font-size:0.65rem;">Нажми для деталей</span></div>
            </div>`;
        });
        traderHtml += `</div>`;
        if (game.selectedCraftItem) {
            let item = game.selectedCraftItem;
            let canCraft = true;
            for (let [res, amount] of Object.entries(item.craftCost)) {
                if (res === "gold") { if (game.gold < amount) canCraft = false; }
                else if ((game.resources[res] || 0) < amount) canCraft = false;
            }
            traderHtml += `<div class="craft-detail">
                <h4 style="margin:0 0 8px 0;">🔨 ${item.name}</h4>
                <p><b>Требуется:</b> ${Object.entries(item.craftCost).map(([r, a]) => `<span style="color:#ffaa44;">${r}: ${a}</span>`).join(", ")}</p>
                <p><b>У вас есть:</b> ${Object.entries(item.craftCost).map(([r, a]) => `${r}: ${game.resources[r] || 0}/${a}`).join(", ")}</p>
                <button onclick="craftMythicItem(${JSON.stringify(item).replace(/"/g, '&quot;')})" style="background:${canCraft ? '#2a6b4a' : '#8b3c2c'};" ${!canCraft ? 'disabled' : ''}>🔨 СКРАФТИТЬ</button>
            </div>`;
        }
        traderHtml += `</div>`;
        
        // Таверна
        let tavernHtml = `<div style="margin:12px 0;"><b>🍺 ТРАКТИРЩИК ГРОМ</b><p>Что привело тебя, путник? Хочешь заработать?</p>`;
        AVAILABLE_QUESTS.forEach(q => {
            let taken = game.activeQuests.some(aq => aq.id === q.id);
            tavernHtml += `<div class="quest-item"><div><b>${q.name}</b><br><span style="font-size:0.65rem;">${q.desc} | Награда: ${q.reward.gold}💰 ${q.reward.exp}✨</span></div>
            ${!taken ? `<button onclick="takeQuest(${JSON.stringify(q).replace(/"/g, '&quot;')})">ВЗЯТЬ</button>` : `<span style="color:#4cff4c;">✓ Взято</span>`}</div>`;
        });
        tavernHtml += `<hr><div><b>📜 АКТИВНЫЕ КВЕСТЫ:</b>`;
        if (game.activeQuests.length === 0) tavernHtml += `<i>Нет активных квестов</i>`;
        else {
            game.activeQuests.forEach(q => {
                let percent = (q.progress / q.count) * 100;
                tavernHtml += `<div class="active-quest"><b>${q.name}</b><br><span style="font-size:0.65rem;">${q.progress}/${q.count}</span>
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div></div>`;
            });
        }
        tavernHtml += `</div><hr><button onclick="talkToTavern()">💬 ПОБОЛТАТЬ С ТРАКТИРЩИКОМ</button></div>`;
        
        // Ресурсы
        let resourceGroupsHtml = `<div><b>🌿 РЕСУРСЫ:</b></div>`;
        let resourcesByRarity = {
            common: ALL_RESOURCES.slice(0,5),
            rare: ALL_RESOURCES.slice(5,10),
            epic: ALL_RESOURCES.slice(10,15),
            legendary: ALL_RESOURCES.slice(15,19),
            mythic: ALL_RESOURCES.slice(19,24)
        };
        for (let [rarity, resources] of Object.entries(resourcesByRarity)) {
            let filtered = resources.filter(r => (game.resources[r] || 0) > 0);
            if (filtered.length) {
                let rarityName = rarity === 'common' ? '📦 Обычные' : rarity === 'rare' ? '🔷 Редкие' : rarity === 'epic' ? '🟣 Эпические' : rarity === 'legendary' ? '🟠 Легендарные' : '💎 Мифические';
                resourceGroupsHtml += `<div class="resource-group resource-${rarity}"><b>${rarityName}:</b> ${filtered.map(r => `${r}: ${game.resources[r]}`).join(' | ')}</div>`;
            }
        }
        
        let invHtml = game.inventory.map(it => `<div class="item-card" onclick="equipItem(${JSON.stringify(it).replace(/"/g, '&quot;')})"><span class="rarity-${it.rarity || 'common'}">${it.type === "weapon" ? "⚔️" : "🛡️"} ${it.name} +${it.strBonus || it.defBonus}</span></div>`).join('');
        
        let secretAdminBtn = `<div class="admin-secret-btn" onclick="enableAdmin()">🔧 СЛУЖЕБНЫЙ ВХОД</div>`;
        
        // Показываем счётчик монстров только для обычных локаций (не для подземелья)
        let monsterCounterHtml = (game.location !== "dungeon") ? `<div class="fight-counter">🏆 УБИТО: ${game.monstersKilled}/${game.needToKill} ${game.monstersKilled >= game.needToKill ? '👑 БОСС ДОСТУПЕН' : ''}</div>` : `<div class="fight-counter">🏰 ЭТАЖ: ${game.dungeonFloor} | БОСС КАЖДЫЕ 20 ЭТАЖЕЙ</div>`;
        
        let adminBlock = '';
        if (isAdmin) {
            adminBlock = `<div class="admin-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;"><b>👑 АДМИН ПАНЕЛЬ</b><button onclick="isAdmin=false; renderGame();">🚪 Выйти</button></div>
                <hr>
                <div class="give-row"><b>🎁 ВЫДАЧА ИГРОКУ</b><br>
                <input type="text" id="givePlayerNick" placeholder="Ник игрока (пусто = себе)" style="width:100%; margin:5px 0;"></div>
                
                <div class="give-row"><b>💰 ЗОЛОТО И ОПЫТ</b><br>
                <button onclick="giveToPlayer(document.getElementById('givePlayerNick').value || game.profileName, 'gold', null, 10000)">💰 +10k золота</button>
                <button onclick="giveToPlayer(document.getElementById('givePlayerNick').value || game.profileName, 'gold', null, 100000)">💰 +100k золота</button>
                <button onclick="giveToPlayer(document.getElementById('givePlayerNick').value || game.profileName, 'exp', null, 5000)">✨ +5k опыта</button>
                <button onclick="giveToPlayer(document.getElementById('givePlayerNick').value || game.profileName, 'exp', null, 50000)">✨ +50k опыта</button></div>
                
                <div class="give-row"><b>🌿 РЕСУРСЫ</b><br>
                <select id="giveResourceSelect">${ALL_RESOURCES.map(r => `<option value="${r}">${r}</option>`).join('')}</select>
                <input type="number" id="giveAmount" value="1" style="width:80px;">
                <button onclick="giveToPlayer(document.getElementById('givePlayerNick').value || game.profileName, 'resource', document.getElementById('giveResourceSelect').value, parseInt(document.getElementById('giveAmount').value)||1)">🌿 Выдать ресурс</button></div>
                
                <div class="give-row"><b>⚔️ ОРУЖИЕ И БРОНЯ</b><br>
                <select id="giveItemSelect">${ALL_ITEMS_FOR_GIVE.map(i => `<option value='${JSON.stringify(i).replace(/'/g, "&apos;")}'>${i.type==="weapon"?"⚔️":"🛡️"} ${i.name} +${i.strBonus||i.defBonus} (${i.rarity})</option>`).join('')}</select>
                <button onclick="let item=JSON.parse(document.getElementById('giveItemSelect').value.replace(/&apos;/g, \"'\")); giveToPlayer(document.getElementById('givePlayerNick').value || game.profileName, item.type, item)">🎁 Выдать предмет</button></div>
                
                <div class="give-row"><b>⚠️ СБРОС ПРОГРЕССА</b><br>
                <input type="text" id="resetPlayerNick" placeholder="Ник игрока для сброса" style="width:60%;">
                <button onclick="resetPlayerProgress(document.getElementById('resetPlayerNick').value)" style="background:#8b3c2c;">💀 СБРОСИТЬ ПРОГРЕСС</button></div>
                
                <hr>
                <div><b>⚡ БЫСТРЫЕ ДЕЙСТВИЯ ДЛЯ СЕБЯ:</b></div>
                <button onclick="game.gold+=1000000; saveGame(); renderGame();">💰 Себе +1M золота</button>
                <button onclick="addExp(100000)">✨ Себе +100k опыта</button>
                <button onclick="game.travelEnergy=game.maxTravelEnergy; saveGame(); renderGame();">⚡ Полная энергия</button>
                <button onclick="game.dungeonFloor+=50; game.maxUnlockedFloor=Math.max(game.maxUnlockedFloor,game.dungeonFloor); saveGame(); renderGame();">📈 +50 этажей</button>
                <button onclick="for(let r of ['Искра богов','Сердце демона','Звездная пыль','Мифический цветок']){game.resources[r]=(game.resources[r]||0)+20;} saveGame(); renderGame();">💎 Мифич. ресурсы +20</button>
                <hr><button onclick="resetGame()">⚠️ Сбросить СВОЙ прогресс</button>
            </div>`;
        }
        
        container.innerHTML = `
        <div class="tab-bar">
            <div class="tab-btn ${game.activeTab === 'game' ? 'active' : ''}" data-tab="game">⚔️ БОЙ</div>
            <div class="tab-btn ${game.activeTab === 'trader' ? 'active' : ''}" data-tab="trader">🏪 ТОРГОВЕЦ</div>
            <div class="tab-btn ${game.activeTab === 'tavern' ? 'active' : ''}" data-tab="tavern">🍺 ТАВЕРНА</div>
            <div class="tab-btn ${game.activeTab === 'inventory' ? 'active' : ''}" data-tab="inventory">📦 ИНВЕНТАРЬ</div>
        </div>
        <div id="tab-game" class="tab-content ${game.activeTab === 'game' ? 'active' : ''}">
            <div class="stats-panel">${['❤️ ' + Math.floor(game.hp) + '/' + game.maxHp, '⚔️ ' + getStrength(), '🛡️ ' + getDefense(), `⭐ Ур.${game.level}`, `💰 ${game.gold}`, `✨ ${game.exp}/${game.expToNext}`].map(s => `<span class="stat">${s}</span>`).join('')}</div>
            <div>❤️ ЗДОРОВЬЕ</div><div class="energy-bar"><div class="energy-fill" style="width:${hpPerc}%; background:#ff4444;"></div></div>
            <div>🚶 ЭНЕРГИЯ ПУТИ</div><div class="energy-bar"><div class="energy-fill" style="width:${travPerc}%;"></div></div>
            ${monsterCounterHtml}
            <div class="button-group"><button id="fightBtn">⚔️ БОЙ</button><button id="potionBtn">🧪 ЗЕЛЬЕ (${healCost}💰)</button><button id="energyBtn">⚡ ВОССТ (${energyCost}💰)</button></div>
            <div class="location-grid">${locsHtml}</div>
            <div><button onclick="game.activeTab='dungeon'; renderGame()" style="background:#8b4513; width:100%;">🏰 ПОДЗЕМЕЛЬЕ (этаж ${game.dungeonFloor}/${game.maxUnlockedFloor})</button></div>
            ${fightBlock}
            <div class="message-log">💬 ${game.message}</div>
            <button id="resetBtn" style="width:100%; margin-top:8px; background:#8b3c2c;">🔄 СБРОСИТЬ ПРОГРЕСС</button>
        </div>
        <div id="tab-dungeon" class="tab-content ${game.activeTab === 'dungeon' ? 'active' : ''}">
            <div style="margin:12px 0;"><b>🏰 ПОДЗЕМЕЛЬЕ</b><p>Выберите этаж (до ${game.maxUnlockedFloor})</p><div class="dungeon-floor-select">${dungeonFloors.join('')}</div><button onclick="game.activeTab='game'; renderGame()" style="width:100%;">🔙 Назад</button></div>
        </div>
        <div id="tab-trader" class="tab-content ${game.activeTab === 'trader' ? 'active' : ''}">${traderHtml}</div>
        <div id="tab-tavern" class="tab-content ${game.activeTab === 'tavern' ? 'active' : ''}">${tavernHtml}</div>
        <div id="tab-inventory" class="tab-content ${game.activeTab === 'inventory' ? 'active' : ''}">
            <div><b>⚔️ ОРУЖИЕ:</b> <span class="rarity-${game.weapon?.rarity || 'common'}">${game.weapon?.name || "нет"} +${game.weapon?.strBonus || 0}</span><br><b>🛡️ БРОНЯ:</b> <span class="rarity-${game.armor?.rarity || 'common'}">${game.armor?.name || "нет"} +${game.armor?.defBonus || 0}</span></div>
            <hr><div><b>📦 ИНВЕНТАРЬ (${game.inventory.length})</b></div><div style="display:flex; flex-wrap:wrap; gap:6px;">${invHtml}</div><hr>${resourceGroupsHtml}
            ${secretAdminBtn}
            ${adminBlock}
        </div>`;
        
        document.getElementById("fightBtn")?.addEventListener("click", startFight);
        document.getElementById("potionBtn")?.addEventListener("click", usePotion);
        document.getElementById("energyBtn")?.addEventListener("click", restoreEnergy);
        document.getElementById("resetBtn")?.addEventListener("click", resetGame);
        document.getElementById("attackBtn")?.addEventListener("click", attack);
        document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", function() { game.activeTab = this.dataset.tab; renderGame(); }));
    }
    
    window.changeLocation = changeLocation;
    window.equipItem = equipItem;
    window.craftMythicItem = craftMythicItem;
    window.buyItem = buyItem;
    window.buyAlchemistItem = buyAlchemistItem;
    window.usePotion = usePotion;
    window.restoreEnergy = restoreEnergy;
    window.takeQuest = takeQuest;
    window.startDungeon = startDungeon;
    window.loadGame = loadGame;
    window.talkToTavern = talkToTavern;
    window.selectCraftItem = selectCraftItem;
    window.closeTutorial = closeTutorial;
    window.enableAdmin = enableAdmin;
    window.giveToPlayer = giveToPlayer;
    window.resetPlayerProgress = resetPlayerProgress;
    
    if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    }
    
    renderGame();
</script>
</body>
</html>
