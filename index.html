    // Функция обновления дневных товаров кузнеца
    function updateDailyShop() {
        const today = new Date().toDateString();
        if (game.lastDailyReset !== today) {
            const shuffledWeapons = [...ALL_WEAPONS];
            for (let i = shuffledWeapons.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledWeapons[i], shuffledWeapons[j]] = [shuffledWeapons[j], shuffledWeapons[i]];
            }
            game.dailyWeapons = shuffledWeapons.slice(0, 4);
            
            const shuffledArmors = [...ALL_ARMORS];

                [shuffledArmors[i], shuffledArmors[j]] = [shuffledArmors[j], shuffledArmors[i]];
            }
            game.dailyArmors = shuffledArmors.slice(0, 3);
            
            game.lastDailyReset = today;
            game.message = `🛒 Ассортимент кузнеца обновлён! Загляните за покупками.`;
            saveGame();
        }

    function getMonsterForLocation(locationKey) {
        const monstersList = LOCATION_MONSTERS[locationKey] || LOCATION_MONSTERS.village;
        const monsterName = monstersList[Math.floor(Math.random() * monstersList.length)];
        let base = MONSTERS_BASE.find(m => m.name === monsterName);
        if (!base) base = {name:monsterName,hp:50,str:15,exp:80,gold:60,icon:"👾",type:"unknown"};
        let monster = JSON.parse(JSON.stringify(base));
        let multiplier = 1 + (game.level / 200);
        let bonus = Math.floor(game.level / 5);
        monster.hp = Math.floor(monster.hp * multiplier) + bonus * 5;
        monster.str = Math.floor(monster.str * multiplier) + bonus * 2;
        monster.exp = Math.floor(monster.exp * multiplier) + bonus * 10;
        monster.gold = Math.floor(monster.gold * multiplier) + bonus * 15;
        
        if (game.completedLocations.includes(locationKey)) {
            monster.hp = Math.floor(monster.hp * 1.3);
            monster.str = Math.floor(monster.str * 1.2);
        }
        return monster;
    }
    
    function getBossForLocation(locationKey) {
        let boss = JSON.parse(JSON.stringify(LOCATION_BOSSES[locationKey]));
        let multiplier = 1 + (game.level / 250);
        boss.hp = Math.floor(boss.hp * multiplier) + Math.floor(game.level * 4);
        boss.str = Math.floor(boss.str * multiplier) + Math.floor(game.level * 2);
        boss.exp = Math.floor(boss.exp * multiplier) + Math.floor(game.level * 15);
        boss.gold = Math.floor(boss.gold * multiplier) + Math.floor(game.level * 20);
        boss.icon = "👑";
        boss.isBoss = true;
        return boss;
    }
    
    function getStrength() {
        let cls = CLASSES[game.class];
        let bonus = 12 + game.level * 2;
        if (game.weapon) bonus += game.weapon.strBonus;
        if (cls) bonus += cls.strBonus;
        return bonus;
    }
    
    function getDefense() {
        let cls = CLASSES[game.class];
        let bonus = 5 + game.level;
        if (game.armor) bonus += game.armor.defBonus;
        if (cls && cls.defBonus) bonus += cls.defBonus;
        return Math.max(2, bonus);
    }
    
    function getCritChance() {
        let cls = CLASSES[game.class];
        let base = 6;
        if (cls) base += cls.crit;
        return Math.min(40, base);
    }
    
    function getDodgeChance() {
        let cls = CLASSES[game.class];
        let base = 5;
        if (cls) base += cls.dodge;
        return Math.min(35, base);
    }
    
    function updateQuestProgress(type, target, amount = 1, extraData = null) {
        for (let q of game.activeQuests) {
            if (q.progress >= q.count) continue;
            if (type === "kill" && q.type === "kill" && q.target === target) {
                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            }
            else if (type === "resource" && q.type === "resource" && q.target === target) {
                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            }
            else if (type === "craft" && q.type === "craft") {
                q.progress = Math.min(q.count, q.progress + amount);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            }
            else if (type === "dungeon" && q.type === "dungeon") {
                q.progress = Math.min(q.count, game.dungeonFloor);
                if (q.progress >= q.count) {
                    game.gold += q.reward.gold;
                    addExp(q.reward.exp, false);
                    game.message += ` ✅ Квест "${q.name}" выполнен! +${q.reward.gold}💰 +${q.reward.exp}✨`;
                    game.activeQuests = game.activeQuests.filter(qq => qq.id !== q.id);
                }
            }
        }
        saveGame();
    }
    
    function addExp(amt, render = true) {
        game.exp += amt;
        game.message += " +" + amt + " ✨";
        while (game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxHp += 15;
            game.hp = Math.min(game.maxHp, game.hp + 30);
            game.maxTravelEnergy += 3;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 5);
            game.expToNext = Math.floor(game.expToNext * 1.18);
            game.message += ` 🎉 УРОВЕНЬ ${game.level}! 🎉`;
        }
        saveGame();
        if (render) renderGame();
    }

            return true;

        return false;

    function attack() {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        let strength = getStrength();
        let dodgeChance = getDodgeChance();
        if (Math.random() * 100 < dodgeChance) {
            game.message = `🌀 УВОРОТ! Вы избежали атаки!`;
            renderGame();
            return;
        }
        let critChance = getCritChance();
        let isCrit = Math.random() * 100 < critChance;
        let damage = Math.max(5, strength + Math.floor(Math.random() * 18) - 5);
        if (isCrit) {
            damage = Math.floor(damage * 1.6);
            game.message = `💥 КРИТ! `;
        }
        game.enemyCurrentHp -= damage;
        game.message = `⚔️ Урон ${damage} по ${enemy.name}!`;
        
        if (game.enemyCurrentHp <= 0) {
            let energyBack = enemy.isBoss ? 25 : 10;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + energyBack);
            game.gold += enemy.gold;
            addExp(enemy.exp);
            if (!enemy.isBoss) {
                game.monstersKilled++;
                updateQuestProgress("kill", enemy.name, 1);
            } else {
                game.monstersKilled = 0;
            }
            game.hp = Math.min(game.maxHp, game.hp + (enemy.isBoss ? 40 : 15));
            game.message += ` 🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            if (game.location === "dungeon") {
                game.dungeonFloor++;
                if (game.dungeonFloor > game.maxUnlockedFloor) game.maxUnlockedFloor = game.dungeonFloor;
                game.message += ` 📈 Этаж ${game.dungeonFloor}!`;
                updateQuestProgress("dungeon", null, 0);
                
                if (Math.random() < 0.3) {
                    let res = RESOURCES[Math.floor(Math.random() * RESOURCES.length)];
                    game.resources[res] = (game.resources[res] || 0) + 1;
                    updateQuestProgress("resource", res, 1);
                    game.message += ` 📦 +${res}`;
                }
            } else {
                if (Math.random() < 0.4) {
                    let res = RESOURCES[Math.floor(Math.random() * RESOURCES.length)];
                    game.resources[res] = (game.resources[res] || 0) + 1;
                    updateQuestProgress("resource", res, 1);
                    game.message += ` 🌿 +${res}`;
                }
            }
            
            if (enemy.isBoss && !game.completedLocations.includes(game.location) && game.location !== "dungeon") {
                game.completedLocations.push(game.location);
                game.message += ` 🎉 Локация пройдена!`;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            saveGame();
            renderGame();
            return;
        }
        
        let playerDef = getDefense();
        let enemyDamage = Math.max(4, enemy.str + Math.floor(Math.random() * 12) - playerDef);
        game.hp -= enemyDamage;
        game.message += ` 😡 ${enemy.name} нанёс ${enemyDamage} урона!`;
        if (game.hp <= 0) {
            game.hp = Math.floor(game.maxHp * 0.6);
            game.message = ` 💀 Вы погибли! Восстановлено 60% HP.`;
            game.inCombat = false;
            game.combatEnemy = null;
            saveGame();
            renderGame();
            return;
        }
        saveGame();
        renderGame();
    }
    
    function startFight() {
        if (game.inCombat) return;
        let healCost = Math.max(50, Math.floor(game.maxHp * 0.08));
        if (game.hp < game.maxHp * 0.2) {
            game.message = `❌ Мало HP (${Math.floor(game.hp)}/${game.maxHp}), восстановитесь у торговца за ${healCost}💰!`;
            renderGame();
            return;
        }
        if (game.location !== "dungeon" && game.monstersKilled >= game.needToKill) {
            let boss = getBossForLocation(game.location);
            game.inCombat = true;
            game.combatEnemy = boss;
            game.enemyCurrentHp = boss.hp;
            game.message = `⚔️ БОЙ С БОССОМ! ${boss.icon} ${boss.name} ⚔️`;
            renderGame();
            return;
        }
        let enemy = (game.location === "dungeon") ? 
            (game.dungeonFloor % 20 === 0 ? getBossForLocation("throne") : getMonsterForLocation("dungeon")) : 
            getMonsterForLocation(game.location);
        game.inCombat = true;
        game.combatEnemy = enemy;
        game.enemyCurrentHp = enemy.hp;
        game.message = `⚔️ БОЙ! ${enemy.icon || "👾"} ${enemy.name} ⚔️`;
        renderGame();
    }
    
    function changeLocation(key) {
        if (game.inCombat) {
            game.message = "❌ Сначала закончите бой!";
            renderGame();
            return;
        }
        let loc = LOCATIONS[key];
        if (!loc) return;
        if (game.level < loc.levelReq) {
            game.message = `❌ Нужен ${loc.levelReq} уровень!`;
            renderGame();
            return;
        }
        let energyCost = loc.energyCost;
        if (game.travelEnergy < energyCost) {
            game.message = `❌ Нужно ${energyCost} энергии!`;
            renderGame();
            return;
        }
        game.travelEnergy -= energyCost;
        game.location = key;
        game.monstersKilled = (game.completedLocations.includes(key) && key !== "dungeon") ? game.needToKill : 0;
        game.message = `🚶 Переход в ${loc.name}`;
        saveGame();
        renderGame();
    }
    
    function usePotion() {
        let healAmount = Math.floor(game.maxHp * 0.35);
        let cost = Math.max(100, Math.floor(game.maxHp * 0.08));
        if (game.gold < cost) {
            game.message = `💰 Нужно ${cost} золота!`;
            renderGame();
            return;
        }
        game.gold -= cost;
        game.hp = Math.min(game.maxHp, game.hp + healAmount);
        game.message = `🧪 +${healAmount} HP (${cost}💰)`;
        saveGame();
        renderGame();
    }
    
    function restoreEnergy() {
        let cost = Math.max(100, Math.floor(game.level * 3));
        if (game.gold < cost) {
            game.message = `💰 Нужно ${cost} золота!`;
            return;
        }
        game.gold -= cost;
        game.travelEnergy = game.maxTravelEnergy;
        game.message = `⚡ Энергия восстановлена! (${cost}💰)`;
        saveGame();
        renderGame();
    }
    
    function craftItem(item) {
        if (!item.craftCost) return;
        let canCraft = true;
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") {
                if (game.gold < amount) canCraft = false;
                continue;
            }
            if ((game.resources[res] || 0) < amount) canCraft = false;
        }
        if (!canCraft) {
            game.message = "❌ Не хватает ресурсов для крафта!";
            renderGame();
            return;
        }
        for (let [res, amount] of Object.entries(item.craftCost)) {
            if (res === "gold") {
                game.gold -= amount;
            } else {
                game.resources[res] -= amount;
            }
        }
        let newItem = JSON.parse(JSON.stringify(item));
        game.inventory.push(newItem);
        game.craftCount++;
        updateQuestProgress("craft", null, 1);
        game.message = `🔨 Вы скрафтили ${item.name}!`;
        saveGame();
        renderGame();
    }
    
    function equipItem(item) {
        if (item.type === "weapon") game.weapon = item;
        else if (item.type === "armor") game.armor = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        saveGame();
        renderGame();
    }
    
    function buyItem(item) {
        if (game.gold < item.price) {
            game.message = `💰 Не хватает ${item.price} золота!`;
            renderGame();
            return;
        }
        game.gold -= item.price;
        let newItem = JSON.parse(JSON.stringify(item));
        game.inventory.push(newItem);
        game.message = `🛒 Куплено: ${item.name} за ${item.price}💰`;
        saveGame();
        renderGame();
    }
    
    function buyResource(resName, cost, amount = 1) {
        if (game.gold < cost) {
            game.message = `💰 Нужно ${cost} золота!`;
            renderGame();
            return;
        }
        game.gold -= cost;
        game.resources[resName] = (game.resources[resName] || 0) + amount;
        updateQuestProgress("resource", resName, amount);
        game.message = `🛒 Куплено: ${resName} +${amount} за ${cost}💰`;
        saveGame();
        renderGame();
    }
    
    function resetGame() {
        if (confirm("Сбросить весь прогресс? Все данные будут потеряны!")) {
            if (game.profileName) localStorage.removeItem("rpg_mega_" + game.profileName);
            game.initialized = false;
            renderGame();
        }
    }
    
    function startDungeon(floor) {
        if (game.inCombat) {
            game.message = "❌ Сначала закончите бой!";
            renderGame();
            return;
        }
        if (floor > game.maxUnlockedFloor) {
            game.message = `❌ Вы не достигли ${floor} этажа! Максимум: ${game.maxUnlockedFloor}`;
            renderGame();
            return;
        }
        let energyCost = Math.max(3, Math.floor(floor / 20) + 2);
        if (game.travelEnergy < energyCost) {
            game.message = `❌ Нужно ${energyCost} энергии!`;
            renderGame();
            return;
        }
        game.travelEnergy -= energyCost;
        game.location = "dungeon";
        game.dungeonFloor = floor;
        game.monstersKilled = 0;
        game.message = `🏰 Вход в подземелье на этаж ${floor}! Энергия: -${energyCost}`;
        saveGame();
        renderGame();
    }
    
    function takeQuest(quest) {
        if (game.activeQuests.some(q => q.id === quest.id)) {
            game.message = "❌ Вы уже взяли этот квест!";
            renderGame();
            return;
        }
        let newQuest = JSON.parse(JSON.stringify(quest));
        newQuest.progress = 0;
        game.activeQuests.push(newQuest);
        game.message = `📜 Взят квест: ${quest.name}!`;
        renderGame();
    }

    }
    function adminAddItem() {
        let itemName = prompt("Введите название предмета (Клинок Создателя, Астральная броня, Экскалибур и т.д.):");
        let allItems = [...ALL_WEAPONS, ...ALL_ARMORS, ...CRAFT_ITEMS];
        let item = allItems.find(i => i.name.toLowerCase() === itemName.toLowerCase());
        if (item) {
            game.inventory.push(JSON.parse(JSON.stringify(item)));
            game.message = `👑 Админ выдал: ${item.name}!`;
        } else {
            game.message = `❌ Предмет "${itemName}" не найден!`;
        }
        saveGame();
        renderGame();
    }
    function adminResetPlayer() {
        let name = prompt("Введите ник игрока для сброса:");
        if (name && name.trim()) {
            localStorage.removeItem("rpg_mega_" + name.trim());
            alert(`Прогресс игрока ${name} сброшен!`);
        }
    }
    function adminSetLevel() {
        let level = parseInt(prompt("Введите уровень:"));
        if (level && level > 0) {
            game.level = level;
            game.exp = 0;
            game.expToNext = Math.floor(100 * Math.pow(1.18, level - 1));
            game.maxHp = 100 + (level - 1) * 15;
            game.hp = game.maxHp;
            game.maxTravelEnergy = 55 + (level - 1) * 3;
            game.travelEnergy = game.maxTravelEnergy;
            saveGame();
            renderGame();
            game.message = `👑 Уровень установлен на ${level}!`;
            renderGame();
        }
    }
    
    function createCharacter(name, cls) {
        if (!name.trim()) return;
        let c = CLASSES[cls];
        game.profileName = name;
        game.class = cls;
        game.gold = 5000;
        game.level = 1;
        game.exp = 0;
        game.expToNext = 100;
        game.maxHp = 95 + (c.hpBonus || 0);
        game.hp = game.maxHp;
        game.travelEnergy = 55;
        game.maxTravelEnergy = 55;
        game.monstersKilled = 0;
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.completedLocations = [];
        game.craftCount = 0;
        game.activeQuests = [];
        game.resources = {};
        for (let r of RESOURCES) game.resources[r] = Math.floor(Math.random() * 2);
        game.resources["Целебная трава"] = 5;
        game.resources["Железная руда"] = 3;
        game.weapon = { name: c.weapon, type: "weapon", strBonus: c.strBonus, price: 0, rarity: "common" };
        game.armor = { name: "Кожаный доспех", type: "armor", defBonus: 5, price: 150, rarity: "common" };
        game.inventory = [game.weapon, game.armor];
        game.lastDailyReset = new Date().toDateString();
        updateDailyShop();
        game.message = `✨ Добро пожаловать, ${name} ${c.name}!`;
        game.initialized = true;
        saveGame();
        renderGame();
    }
    
    // Фразы трактирщика
    const tavernPhrases = [
        "Хорошего дня, {name}!",
        "Осторожнее в пути, путник!",
        "Заходи ещё, выпьем эля!",
        "Боги да благословят тебя!",
        "Слышал, на востоке появились новые монстры...",
        "Эй, герой, не хочешь заработать? У меня есть работёнка!",
        "Говорят, в подземелье нашли древний артефакт...",
        "Берегись темных сил, путник!",
        "Сегодня эль особенный, угощаю по дружбе!",
        "Твоя слава растёт с каждым днём!"
    ];
    
    function talkToTavern() {
        let randomPhrase = tavernPhrases[Math.floor(Math.random() * tavernPhrases.length)];
        game.message = `🍺 Гром: ${randomPhrase.replace("{name}", game.profileName)}`;
        renderGame();
    }
    
    function renderGame() {
        let container = document.getElementById("rpgGame");
        if (!container) return;
        
        // Экран создания персонажа
        if (!game.initialized) {
            let savedNames = [];
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key && key.startsWith("rpg_mega_")) {
                    savedNames.push(key.replace("rpg_mega_", ""));
                }
            }
            
            let savedHtml = "";
            if (savedNames.length > 0) {
                savedHtml = `<div class="save-load-panel"><b>💾 Загрузить сохранение:</b><br>`;
                savedNames.forEach(name => {
                    savedHtml += `<button onclick="loadGame('${name}')">📀 ${name}</button> `;
                });
                savedHtml += `</div><hr>`;
            }
            
            let selected = "warrior";
            let clsHtml = savedHtml + `<div class="class-selector" id="classSel">` +
                Object.keys(CLASSES).map(k => `<div class="class-option ${selected === k ? 'selected' : ''}" data-class="${k}">${CLASSES[k].icon} ${CLASSES[k].name}<br><span style="font-size:0.6rem;">⚔️ ${CLASSES[k].strBonus} 💪 ${CLASSES[k].hpBonus}</span></div>`).join('') +
                `</div><input id="pname" placeholder="Имя героя"><button id="createBtn" style="background:#f7d44a;">🚀 НАЧАТЬ</button>`;
            container.innerHTML = clsHtml;
            document.getElementById("createBtn").onclick = () => createCharacter(document.getElementById("pname").value, selected);
            document.querySelectorAll(".class-option").forEach(el => {
                el.onclick = function () {
                    document.querySelectorAll(".class-option").forEach(c => c.classList.remove("selected"));
                    this.classList.add("selected");
                    selected = this.dataset.class;
                };
            });
            return;
        }
        
        // Обновляем дневные товары
        updateDailyShop();
        
        let cls = CLASSES[game.class];
        let hpPerc = (game.hp / game.maxHp) * 100;
        let travPerc = (game.travelEnergy / game.maxTravelEnergy) * 100;
        let healCost = Math.max(50, Math.floor(game.maxHp * 0.08));
        let energyCost = Math.max(100, Math.floor(game.level * 3));
        
        // Локации
        let locsHtml = Object.keys(LOCATIONS).map(k => {
            let l = LOCATIONS[k];
            let locked = game.level < l.levelReq;
            return `<button class="location-btn ${locked ? 'locked' : ''} ${game.completedLocations.includes(k) ? 'completed' : ''}" onclick="changeLocation('${k}')" ${locked ? 'disabled' : ''}>${l.icon} ${l.name}<br><span style="font-size:0.6rem;">${l.levelReq}ур</span></button>`;
        }).join('');
        
        // Этажи подземелья
        let dungeonFloors = [];
        let maxShow = Math.min(game.maxUnlockedFloor, 100);
        for (let i = 1; i <= maxShow; i += 5) {
            let floorEnd = Math.min(i + 4, maxShow);
            dungeonFloors.push(`<div class="dungeon-floor-btn ${game.dungeonFloor >= i ? 'reached' : ''}" onclick="startDungeon(${i})">${i}-${floorEnd}</div>`);
        }
        
        // Боевой блок
        let fightBlock = game.inCombat ? `<div class="fight-block"><div>${game.combatEnemy.icon || "👾"} ${game.combatEnemy.name}</div><div>❤️ ${Math.max(0, game.enemyCurrentHp)}/${game.combatEnemy.hp}</div><button id="attackBtn" style="background:#8b3c2c;">⚔️ АТАКОВАТЬ</button></div>` : '';
        
        // ========== ОБЪЕДИНЁННАЯ ВКЛАДКА ТОРГОВЕЦ ==========
        let traderHtml = `<div style="margin:12px 0;">
            <div class="trader-section">
                <h4>⚒️ КУЗНЕЦ БРОНИСЛАВ</h4>
                <div style="font-size:0.7rem; color:#f7d44a;">🔄 Товары обновляются каждый день в 00:00</div>
                <div style="margin-top:8px;"><b>⚔️ ОРУЖИЕ:</b></div>`;
        game.dailyWeapons.forEach(w => {
            traderHtml += `<div class="shop-item"><span class="rarity-${w.rarity}">⚔️ ${w.name}</span> +${w.strBonus} <button onclick="buyItem(${JSON.stringify(w).replace(/"/g, '&quot;')})">${w.price}💰</button></div>`;
        });
        traderHtml += `<div style="margin-top:8px;"><b>🛡️ БРОНЯ:</b></div>`;
        game.dailyArmors.forEach(a => {
            traderHtml += `<div class="shop-item"><span class="rarity-${a.rarity}">🛡️ ${a.name}</span> +${a.defBonus} <button onclick="buyItem(${JSON.stringify(a).replace(/"/g, '&quot;')})">${a.price}💰</button></div>`;
        });
        traderHtml += `<hr><b>🔨 КРАФТ (уникальные предметы):</b>`;
        CRAFT_ITEMS.forEach(item => {
            let reqStr = Object.entries(item.craftCost).map(([r, a]) => `${r}: ${a}`).join(", ");
            traderHtml += `<div class="craft-item"><div><b class="rarity-${item.rarity}">${item.name}</b> +${item.strBonus || item.defBonus}<br><span style="font-size:0.65rem;">${reqStr}</span></div><button onclick="craftItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">СКРАФТИТЬ</button></div>`;
        });
        traderHtml += `</div>
            <div class="trader-section">
                <h4>🧪 АЛХИМИК МЕЛИССА</h4>
                <div class="shop-item">🧴 Лечебное зелье (+${Math.floor(game.maxHp * 0.35)} HP) <button onclick="usePotion()">${healCost}💰</button></div>
                <div class="shop-item">⚡ Энергетический эликсир <button onclick="restoreEnergy()">${energyCost}💰</button></div>
                <div class="shop-item">🌿 Целебная трава <button onclick="buyResource('Целебная трава', 50, 1)">50💰</button></div>
                <div class="shop-item">💎 Железная руда <button onclick="buyResource('Железная руда', 80, 1)">80💰</button></div>
                <div class="shop-item">✨ Малая эссенция <button onclick="buyResource('Малая эссенция', 200, 1)">200💰</button></div>
                <div class="shop-item">💎 Мифриловая руда <button onclick="buyResource('Мифриловая руда', 500, 1)">500💰</button></div>
            </div>
            <div class="daily-reset">⏰ Следующее обновление товаров: завтра в 00:00</div>
        </div>`;
        
        // Таверна с квестами
        let tavernHtml = `<div style="margin:12px 0;"><b>🍺 ТРАКТИРЩИК ГРОМ</b><p>Что привело тебя, путник? Хочешь заработать?</p>`;
        AVAILABLE_QUESTS.forEach(q => {
            let taken = game.activeQuests.some(aq => aq.id === q.id);
            tavernHtml += `<div class="quest-item"><div><b>${q.name}</b><br><span style="font-size:0.65rem;">${q.desc} | Награда: ${q.reward.gold}💰 ${q.reward.exp}✨</span></div>
            ${!taken ? `<button onclick="takeQuest(${JSON.stringify(q).replace(/"/g, '&quot;')})">ВЗЯТЬ</button>` : `<span style="color:#4cff4c;">✓ Взято</span>`}</div>`;
        });
        tavernHtml += `<hr><div><b>📜 АКТИВНЫЕ КВЕСТЫ:</b>`;
        if (game.activeQuests.length === 0) tavernHtml += `<i>Нет активных квестов</i>`;
        else {
            game.activeQuests.forEach(q => {
                let percent = (q.progress / q.count) * 100;
                tavernHtml += `<div class="active-quest"><b>${q.name}</b><br><span style="font-size:0.65rem;">${q.progress}/${q.count}</span>
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div></div>`;
            });
        }
        tavernHtml += `</div><hr><button onclick="talkToTavern()">💬 Поболтать</button></div>`;
        
        // Инвентарь
        let invHtml = game.inventory.map((it, idx) => `<div class="item-card" onclick="equipItem(${JSON.stringify(it).replace(/"/g, '&quot;')})"><span class="rarity-${it.rarity || 'common'}">${it.type === "weapon" ? "⚔️" : "🛡️"} ${it.name} +${it.strBonus || it.defBonus}</span></div>`).join('');
        let resHtml = Object.entries(game.resources).filter(([k, v]) => v > 0).map(([r, v]) => `${r}: ${v}`).join(' | ');
        
        // Админ-панель (только для админа)
        let adminBlock = isAdmin ? `<div class="admin-panel">
            <b>👑 АДМИН ПАНЕЛЬ</b><br>
            <button onclick="adminAddGold(100000)">💰 +100k золота</button>
            <button onclick="adminAddGold(1000000)">💰 +1M золота</button>
            <button onclick="adminAddExp(5000)">✨ +5000 опыта</button>
            <button onclick="adminAddExp(50000)">✨ +50000 опыта</button>
            <button onclick="adminSetLevel()">⭐ Установить уровень</button>
            <button onclick="game.travelEnergy=game.maxTravelEnergy; saveGame(); renderGame();">⚡ Восст. энергию</button>
            <button onclick="game.dungeonFloor+=50; game.maxUnlockedFloor=Math.max(game.maxUnlockedFloor,game.dungeonFloor); updateQuestProgress('dungeon',null,0); saveGame(); renderGame();">📈 +50 этажей</button>
            <button onclick="adminAddResources()">💎 Миф. ресурсы +10</button>
            <button onclick="adminAddItem()">⚔️ Выдать предмет</button>
            <button onclick="adminResetPlayer()">🔄 Сбросить игрока по нику</button>
            <button onclick="resetGame()">⚠️ Сбросить свой прогресс</button>
        </div>` : '';
        
        // Основной HTML с 4 вкладками (Бой, Торговец, Таверна, Инвентарь + Админ если есть)
        let tabsHtml = `
        <div class="tab-bar">
            <div class="tab-btn ${game.activeTab === 'game' ? 'active' : ''}" data-tab="game">⚔️ БОЙ</div>
            <div class="tab-btn ${game.activeTab === 'trader' ? 'active' : ''}" data-tab="trader">🏪 ТОРГОВЕЦ</div>
            <div class="tab-btn ${game.activeTab === 'tavern' ? 'active' : ''}" data-tab="tavern">🍺 ТАВЕРНА</div>
            <div class="tab-btn ${game.activeTab === 'inventory' ? 'active' : ''}" data-tab="inventory">📦 ИНВЕНТАРЬ</div>
            ${isAdmin ? `<div class="tab-btn ${game.activeTab === 'admin' ? 'active' : ''}" data-tab="admin">👑 АДМИН</div>` : ''}
        </div>`;
        
        container.innerHTML = tabsHtml + `
        <div id="tab-game" class="tab-content ${game.activeTab === 'game' ? 'active' : ''}">
            <div class="stats-panel">
                ${['❤️ ' + Math.floor(game.hp) + '/' + game.maxHp, '⚔️ ' + getStrength(), '🛡️ ' + getDefense(), `⭐ Ур.${game.level}`, `💰 ${game.gold}`, `✨ ${game.exp}/${game.expToNext}`].map(s => `<span class="stat">${s}</span>`).join('')}
            </div>
            <div>❤️ ЗДОРОВЬЕ</div>
            <div class="energy-bar"><div class="energy-fill" style="width:${hpPerc}%; background:#ff4444;"></div></div>
            <div>🚶 ЭНЕРГИЯ ПУТИ</div>
            <div class="energy-bar"><div class="energy-fill" style="width:${travPerc}%;"></div></div>
            <div class="fight-counter">🏆 УБИТО: ${game.monstersKilled}/${game.needToKill} ${game.monstersKilled >= game.needToKill ? '👑 БОСС ДОСТУПЕН' : ''}</div>
            <div class="button-group">
                <button id="fightBtn">⚔️ БОЙ</button>
                <button id="potionBtn">🧪 ЗЕЛЬЕ (${healCost}💰)</button>
                <button id="energyBtn">⚡ ВОССТ (${energyCost}💰)</button>
            </div>
            <div class="location-grid">${locsHtml}</div>
            <div><button onclick="game.activeTab='dungeon'; renderGame()" style="background:#8b4513; width:100%;">🏰 ПОДЗЕМЕЛЬЕ (этаж ${game.dungeonFloor}/${game.maxUnlockedFloor})</button></div>
            ${fightBlock}
            <div class="message-log">💬 ${game.message}</div>
            <button id="resetBtn" style="width:100%; margin-top:8px; background:#8b3c2c;">🔄 СБРОСИТЬ ПРОГРЕСС</button>
        </div>
        
        <div id="tab-dungeon" class="tab-content ${game.activeTab === 'dungeon' ? 'active' : ''}">
            <div style="margin:12px 0;"><b>🏰 ПОДЗЕМЕЛЬЕ</b><p>Выберите этаж для входа (до ${game.maxUnlockedFloor})</p>
            <div class="dungeon-floor-select">${dungeonFloors.join('')}</div>
            <button onclick="game.activeTab='game'; renderGame()" style="width:100%;">🔙 Назад</button>
            </div>
        </div>
        
        <div id="tab-trader" class="tab-content ${game.activeTab === 'trader' ? 'active' : ''}">
            ${traderHtml}
        </div>
        
        <div id="tab-tavern" class="tab-content ${game.activeTab === 'tavern' ? 'active' : ''}">
            ${tavernHtml}
        </div>
        
        <div id="tab-inventory" class="tab-content ${game.activeTab === 'inventory' ? 'active' : ''}">
            <div><b>⚔️ ОРУЖИЕ:</b> <span class="rarity-${game.weapon?.rarity || 'common'}">${game.weapon?.name || "нет"} +${game.weapon?.strBonus || 0}</span><br>
            <b>🛡️ БРОНЯ:</b> <span class="rarity-${game.armor?.rarity || 'common'}">${game.armor?.name || "нет"} +${game.armor?.defBonus || 0}</span></div>
            <hr>
            <div><b>📦 ИНВЕНТАРЬ (${game.inventory.length})</b></div>
            <div class="items-grid" style="display:flex; flex-wrap:wrap; gap:6px;">${invHtml}</div>
            <hr>
            <div><b>🌿 РЕСУРСЫ ДЛЯ КРАФТА:</b><br><span style="font-size:0.7rem;">${resHtml || "Нет ресурсов"}</span></div>
        </div>
        
        <div id="tab-admin" class="tab-content ${game.activeTab === 'admin' ? 'active' : ''}">
            ${adminBlock}
        </div>
        `;
        
        // Обработчики событий
        document.getElementById("fightBtn")?.addEventListener("click", () => startFight());
        document.getElementById("potionBtn")?.addEventListener("click", () => usePotion());
        document.getElementById("energyBtn")?.addEventListener("click", () => restoreEnergy());
        document.getElementById("resetBtn")?.addEventListener("click", () => resetGame());
        document.getElementById("attackBtn")?.addEventListener("click", () => attack());
        
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", function () {
                game.activeTab = this.dataset.tab;
                renderGame();
            });
        });
    }
    
    // Глобальные функции
    window.changeLocation = changeLocation;
    window.equipItem = equipItem;
    window.craftItem = craftItem;
    window.buyItem = buyItem;
    window.buyResource = buyResource;
    window.usePotion = usePotion;
    window.restoreEnergy = restoreEnergy;
    window.takeQuest = takeQuest;
    window.startDungeon = startDungeon;
    window.loadGame = loadGame;
    window.talkToTavern = talkToTavern;
    window.adminAddGold = adminAddGold;
    window.adminAddExp = adminAddExp;
    window.adminAddResources = adminAddResources;
    window.adminAddItem = adminAddItem;
    window.adminResetPlayer = adminResetPlayer;
    window.adminSetLevel = adminSetLevel;
    
    renderGame();
</script>
</body>
</html>
