<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RPG | Тропы забытого королевства</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #1a1f2e 100%);
            font-family: 'Courier New', 'Segoe UI', monospace;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: #0f0e17e6;
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            border: 1px solid #f7d44a66;
        }
        @keyframes runAnim { 0% { transform: translateX(0px); } 50% { transform: translateX(8px); } 100% { transform: translateX(0px); } }
        @keyframes idleAnim { 0% { transform: translateY(0px); } 50% { transform: translateY(-4px); } 100% { transform: translateY(0px); } }
        @keyframes attackAnim { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @keyframes dodgeAnim { 0% { transform: translateX(0px); } 50% { transform: translateX(-15px); } 100% { transform: translateX(0px); } }
        .character-running { animation: runAnim 0.25s ease-in-out infinite; display: inline-block; font-size: 3.5rem; filter: drop-shadow(0 0 8px gold); }
        .character-idle { animation: idleAnim 1s ease-in-out infinite; display: inline-block; font-size: 3rem; }
        .character-attack { animation: attackAnim 0.2s ease-out; display: inline-block; font-size: 3.2rem; }
        .character-dodge { animation: dodgeAnim 0.2s ease-out; display: inline-block; font-size: 3rem; }
        .stats-panel {
            background: #1e1b2bcc;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            font-size: 0.65rem;
        }
        .stat { background: #00000099; padding: 4px 10px; border-radius: 20px; margin: 2px; color: #f7d44a; }
        .energy-bar { background: #2a1a2aaa; border-radius: 20px; height: 6px; margin-top: 4px; overflow: hidden; }
        .energy-fill { background: linear-gradient(90deg, #4cff4c, #aaffaa); height: 100%; transition: width 0.2s; }
        .energy-fill.travel { background: linear-gradient(90deg, #ffaa44, #ffcc88); }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { background: #2a2438; padding: 6px 12px; border-radius: 30px; cursor: pointer; font-size: 0.7rem; }
        .tab-btn.active { background: #f7d44a; color: #1e1b2b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .location-btn { background: #3a2c45; margin: 5px; font-size: 0.65rem; padding: 6px 10px; }
        .location-btn.locked { opacity: 0.5; cursor: not-allowed; background: #5a3e2e; }
        .location-btn.completed { background: #2a6b4a; border: 1px solid gold; }
        .location-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px; margin: 10px 0; max-height: 280px; overflow-y: auto; }
        .admin-panel { background: #2c1e2ecc; border-radius: 20px; padding: 12px; margin-top: 15px; border: 2px solid #ff00ff; display: none; }
        .admin-panel.show { display: block; }
        .admin-input { background: #1e1b2b; color: #f7d44a; border: 1px solid gold; border-radius: 20px; padding: 5px 10px; width: 100px; margin: 5px; }
        .admin-input-wide { background: #1e1b2b; color: #f7d44a; border: 1px solid gold; border-radius: 20px; padding: 5px 10px; width: 180px; margin: 5px; }
        .npc-panel, .craft-panel { background: #1a3a2acc; border-radius: 20px; padding: 12px; margin-top: 10px; border: 1px solid gold; }
        .message-log { background: #000000aa; border-radius: 16px; padding: 8px; margin-top: 12px; font-size: 0.7rem; color: #bdaa88; max-height: 100px; overflow-y: auto; }
        .character-form { text-align: center; padding: 20px; }
        .character-form input { display: block; margin: 15px auto; padding: 12px; width: 80%; background: #1e1b2b; color: #f7d44a; border: 1px solid #f7d44a; border-radius: 30px; font-size: 1rem; text-align: center; }
        .sprite-area { text-align: center; font-size: 3.5rem; background: #00000055; border-radius: 50px; padding: 15px; margin-bottom: 15px; }
        button { background: #3a2c45; border: none; padding: 6px 10px; border-radius: 40px; font-size: 0.7rem; font-weight: bold; color: white; cursor: pointer; transition: 0.08s linear; margin: 3px; }
        button:active { transform: scale(0.96); }
        .reset-btn { background: #5a3e2e; }
        .run-btn { background: #2f6b4a; }
        .admin-btn { background: #8b00ff; }
        .boss-btn { background: #8b3c2c; border: 2px solid gold; font-weight: bold; }
        .dungeon-floor-select { background: #1a1530; border-radius: 20px; padding: 10px; margin: 10px 0; }
        .equipment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; max-height: 300px; overflow-y: auto; padding: 8px; background: #16122a; border-radius: 20px; }
        .equip-item { background: #2a2438; padding: 6px; border-radius: 12px; text-align: center; font-size: 0.6rem; cursor: pointer; border: 1px solid #f7d44a55; }
        .equip-item.equipped { background: #4a7a3c; border: 2px solid gold; }
        .dialog-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
            z-index: 10001; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .dialog-window {
            max-width: 500px; width: 100%;
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            border-radius: 40px; border: 2px solid #f7d44a;
            overflow: hidden;
        }
        .dialog-header { background: #3a2a3e; padding: 15px; text-align: center; border-bottom: 2px solid #f7d44a; }
        .npc-avatar { font-size: 3.5rem; filter: drop-shadow(0 0 10px gold); }
        .npc-name { font-size: 1.3rem; font-weight: bold; color: #f7d44a; }
        .dialog-body { padding: 20px; }
        .dialog-text { background: #0f0b1acc; border-radius: 20px; padding: 15px; color: #e8e8f0; border-left: 4px solid #f7d44a; font-size: 0.9rem; }
        .dialog-footer { padding: 15px; border-top: 1px solid #f7d44a55; }
        .dialog-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .dialog-btn { background: #3a2c45; border: 1px solid #f7d44a; padding: 6px 12px; border-radius: 40px; color: #f7d44a; cursor: pointer; font-size: 0.7rem; }
        .dialog-btn:hover { background: #f7d44a; color: #1a1a2e; }
        .rarity-common { color: #aaa; }
        .rarity-rare { color: #4488ff; }
        .rarity-epic { color: #aa44ff; }
        .rarity-legendary { color: #ffaa00; }
        .rarity-mythic { color: #ff44ff; text-shadow: 0 0 3px white; }
        .boss-badge { background: #8b0000; color: gold; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; margin-left: 5px; }
        .completed-badge { background: #2a6b4a; color: gold; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; margin-left: 5px; }
    </style>
</head>
<body>
<div class="game-container" id="rpgGame"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    if (tg) { tg.expand(); tg.enableClosingConfirmation(); }
    
    const ADMIN_TELEGRAM_ID = 1198178866;
    const ADMIN_USERNAME = "dirtyyyyn";
    
    async function tgSaveData(key, data) {
        return new Promise((resolve) => {
            if (tg && tg.CloudStorage) { tg.CloudStorage.setItem(key, data, (err) => resolve(!err)); }
            else { localStorage.setItem(key, data); resolve(true); }
        });
    }
    async function tgLoadData(key) {
        return new Promise((resolve) => {
            if (tg && tg.CloudStorage) { tg.CloudStorage.getItem(key, (err, value) => resolve(err || !value ? null : value)); }
            else { resolve(localStorage.getItem(key)); }
        });
    }
    async function tgDeleteData(key) {
        return new Promise((resolve) => {
            if (tg && tg.CloudStorage) { tg.CloudStorage.setItem(key, "", (err) => resolve(!err)); }
            else { localStorage.removeItem(key); resolve(true); }
        });
    }
    
    // ЛОКАЦИИ С БОССАМИ
    const LOCATIONS = {
        village: { name: "🏘️ Деревня", icon: "🏘️", energyCost: 5, requiredLevel: 1, order: 0, boss: { name: "Разбойник", hp: 50, str: 12, def: 5, exp: 80, gold: 100, icon: "🏹" } },

        dungeonLoc: { name: "🏚️ Подземелье", icon: "🏚️", isDungeon: true, energyCost: 5, requiredLevel: 1, order: 999 },

        volcano: { name: "🌋 Вулкан", icon: "🌋", energyCost: 15, requiredLevel: 20, order: 7, boss: { name: "Огненный дракон", hp: 400, str: 55, def: 25, exp: 1200, gold: 2000, icon: "🐉" } },
        icy_cave: { name: "❄️ Ледяная пещера", icon: "❄️", energyCost: 15, requiredLevel: 25, order: 8, boss: { name: "Ледяной великан", hp: 500, str: 60, def: 30, exp: 1500, gold: 2500, icon: "🧊" } },
        dark_city: { name: "🌑 Теневой город", icon: "🌑", energyCost: 12, requiredLevel: 30, order: 9, boss: { name: "Повелитель теней", hp: 600, str: 70, def: 35, exp: 1800, gold: 3000, icon: "🌙" } },
        elven_forest: { name: "🍃 Эльфийский лес", icon: "🍃", energyCost: 10, requiredLevel: 35, order: 10, boss: { name: "Древний энт", hp: 700, str: 75, def: 40, exp: 2200, gold: 3500, icon: "🌳" } },
        dwarven_mines: { name: "⛏️ Гномьи шахты", icon: "⛏️", energyCost: 12, requiredLevel: 40, order: 11, boss: { name: "Король гномов", hp: 800, str: 80, def: 45, exp: 2600, gold: 4000, icon: "👑" } },
        sky_temple: { name: "☁️ Небесный храм", icon: "☁️", energyCost: 18, requiredLevel: 45, order: 12, boss: { name: "Небесный страж", hp: 900, str: 90, def: 50, exp: 3000, gold: 5000, icon: "☁️" } },
        abyss: { name: "🔥 Бездна", icon: "🔥", energyCost: 20, requiredLevel: 75, order: 13, boss: { name: "Повелитель бездны", hp: 1500, str: 120, def: 70, exp: 5000, gold: 10000, icon: "👹" } },
        crystal_caves: { name: "💎 Хрустальные пещеры", icon: "💎", energyCost: 14, requiredLevel: 50, order: 14, boss: { name: "Хрустальный голем", hp: 1000, str: 85, def: 55, exp: 3500, gold: 6000, icon: "💎" } },
        ancient_ruins: { name: "🏛️ Древние руины", icon: "🏛️", energyCost: 16, requiredLevel: 55, order: 15, boss: { name: "Древний страж", hp: 1200, str: 95, def: 60, exp: 4000, gold: 7000, icon: "🏛️" } },
        golden_fields: { name: "🌾 Золотые поля", icon: "🌾", energyCost: 12, requiredLevel: 60, order: 16, boss: { name: "Золотой голем", hp: 1300, str: 100, def: 65, exp: 4500, gold: 8000, icon: "🥇" } },
        storm_peaks: { name: "⛈️ Грозовые пики", icon: "⛈️", energyCost: 18, requiredLevel: 65, order: 17, boss: { name: "Повелитель бурь", hp: 1400, str: 110, def: 68, exp: 4800, gold: 9000, icon: "⚡" } },
        dragon_isle: { name: "🐉 Остров драконов", icon: "🐉", energyCost: 20, requiredLevel: 70, order: 18, boss: { name: "Король драконов", hp: 1800, str: 130, def: 80, exp: 6000, gold: 12000, icon: "🐲" } }
    };
    
    // ВРАГИ ДЛЯ СЛУЧАЙНЫХ СТЫЧЕК
    const ENEMIES = {
        goblin: { name: "Гоблин", baseHp: 20, baseStr: 7, baseDef: 3, exp: 30, gold: 15, icon: "👺" },
        rat: { name: "Крыса", baseHp: 15, baseStr: 5, baseDef: 2, exp: 20, gold: 10, icon: "🐀" },
        wolf: { name: "Волк", baseHp: 25, baseStr: 9, baseDef: 4, exp: 45, gold: 20, icon: "🐺" },
        bear: { name: "Медведь", baseHp: 40, baseStr: 12, baseDef: 6, exp: 70, gold: 35, icon: "🐻" },
        spider: { name: "Паук", baseHp: 22, baseStr: 8, baseDef: 4, exp: 40, gold: 18, icon: "🕷️" },
        orc: { name: "Орк", baseHp: 35, baseStr: 12, baseDef: 6, exp: 70, gold: 35, icon: "👹" },
        troll: { name: "Тролль", baseHp: 50, baseStr: 15, baseDef: 8, exp: 100, gold: 50, icon: "🗿" },
        skeleton: { name: "Скелет", baseHp: 30, baseStr: 10, baseDef: 5, exp: 55, gold: 25, icon: "💀" },
        ghost: { name: "Призрак", baseHp: 35, baseStr: 14, baseDef: 4, exp: 80, gold: 35, icon: "👻" }
    };
    
    const NPCS = [
        { name: "Кузнец Гром", icon: "⚒️", avatar: "🔨", type: "blacksmith",
          items: [
            { name: "Стальной меч", type: "weapon", strBonus: 15, rarity: "rare", price: 5000 },
            { name: "Мифриловая кираса", type: "armor", defBonus: 12, rarity: "rare", price: 8000 },
            { name: "Лук эльфов", type: "weapon", strBonus: 18, rarity: "epic", price: 25000 },
            { name: "Доспех паладина", type: "armor", defBonus: 18, rarity: "epic", price: 40000 },
            { name: "Пламенный меч", type: "weapon", strBonus: 35, rarity: "legendary", price: 500000 },
            { name: "Броня дракона", type: "armor", defBonus: 30, rarity: "legendary", price: 500000 }
          ] },
        { name: "Алхимик Морган", icon: "🧪", avatar: "⚗️", type: "alchemist" },
        { name: "Трактирщик Грим", icon: "🍺", avatar: "🧔‍♂️", type: "tavern" },
        { name: "Мастер крафта", icon: "🔨", avatar: "🛠️", type: "crafter" }
    ];
    
    let game = {
        initialized: false, telegramId: null, profileName: "", gold: 500, level: 1, exp: 0, expToNext: 100,
        combatEnergy: 100, maxCombatEnergy: 100, travelEnergy: 50, maxTravelEnergy: 50,
        weapon: { name: "Ржавый меч", strBonus: 2, rarity: "common" },
        armor: { name: "Кожаная броня", defBonus: 2, rarity: "common" },
        helmet: { name: "Кожаный шлем", defBonus: 1, rarity: "common" },
        gloves: { name: "Кожаные перчатки", defBonus: 1, rarity: "common" },
        boots: { name: "Кожаные сапоги", defBonus: 1, rarity: "common" },
        cloak: { name: "Поношенный плащ", defBonus: 1, rarity: "common" },
        inventory: [
            { name: "Ржавый меч", type: "weapon", strBonus: 2, rarity: "common" },
            { name: "Кожаная броня", type: "armor", defBonus: 2, rarity: "common" }
        ],
        resources: { "Малая эссенция": 0, "Средняя эссенция": 0, "Великая эссенция": 0, "Искра богов": 0,
            "Целебная трава": 5, "Магический гриб": 3, "Мифический цветок": 0,
            "Медная руда": 0, "Железная руда": 0, "Мифриловая руда": 0,
            "Обычная древесина": 0, "Твёрдая древесина": 0, "Древесина мирового древа": 0,
            "Хлопковая ткань": 0, "Шёлковая ткань": 0, "Магическая ткань": 0,
            "Малый кристалл": 0, "Средний кристалл": 0, "Великий кристалл": 0
        },
        potions: { weak: 3, medium: 1, strong: 0 },
        message: "", inCombat: false, combatEnemy: null, enemyCurrentHp: 0,
        location: "village", dungeonFloor: 1, maxUnlockedFloor: 1, activeTab: "game",
        isAdmin: false, animationState: "idle", isRunning: false,
        completedLocations: [], currentBossFight: null, locationBossDefeated: false
    };
    
    function isUserAdmin() {
        const userId = tg?.initDataUnsafe?.user?.id;
        const username = tg?.initDataUnsafe?.user?.username;
        return (userId === ADMIN_TELEGRAM_ID) || (username === ADMIN_USERNAME);
    }
    
    async function saveProfile() {
        if (!game.profileName && !game.telegramId) return;
        await tgSaveData(`rpg_${game.telegramId || game.profileName}`, JSON.stringify(game));
    }
    
    async function loadProfile(id) {
        const raw = await tgLoadData(`rpg_${id}`);
        if (raw) {
            let data = JSON.parse(raw);
            Object.assign(game, data);
            game.isAdmin = isUserAdmin();
            game.initialized = true;
            if (!game.completedLocations) game.completedLocations = [];
            game.message = `С возвращением, ${game.profileName}!`;
            renderGame();
            return true;
        }
        return false;
    }
    
    function getTelegramId() { return tg?.initDataUnsafe?.user?.id || null; }
    
    async function createNewProfile(profileName) {
        if (!profileName.trim()) { alert("Введите имя героя!"); return false; }
        if (!/^[a-zA-Zа-яА-Я0-9_]+$/.test(profileName)) {
            alert("Имя может содержать только буквы, цифры и _");
            return false;
        }
        game.profileName = profileName;
        game.telegramId = getTelegramId();
        game.gold = 500;
        game.level = 1;
        game.exp = 0;
        game.expToNext = 100;
        game.combatEnergy = 100;
        game.maxCombatEnergy = 100;
        game.travelEnergy = 50;
        game.maxTravelEnergy = 50;
        game.weapon = { name: "Ржавый меч", strBonus: 2, rarity: "common" };
        game.armor = { name: "Кожаная броня", defBonus: 2, rarity: "common" };
        game.inventory = [
            { name: "Ржавый меч", type: "weapon", strBonus: 2, rarity: "common" },
            { name: "Кожаная броня", type: "armor", defBonus: 2, rarity: "common" }
        ];
        game.resources = { "Малая эссенция": 0, "Средняя эссенция": 0, "Великая эссенция": 0, "Искра богов": 0,
            "Целебная трава": 5, "Магический гриб": 3, "Мифический цветок": 0,
            "Медная руда": 0, "Железная руда": 0, "Мифриловая руда": 0,
            "Обычная древесина": 0, "Твёрдая древесина": 0, "Древесина мирового древа": 0,
            "Хлопковая ткань": 0, "Шёлковая ткань": 0, "Магическая ткань": 0,
            "Малый кристалл": 0, "Средний кристалл": 0, "Великий кристалл": 0
        };
        game.potions = { weak: 3, medium: 1, strong: 0 };
        game.location = "village";
        game.dungeonFloor = 1;
        game.maxUnlockedFloor = 1;
        game.completedLocations = [];
        game.locationBossDefeated = false;
        game.isAdmin = isUserAdmin();
        game.message = `✨ Добро пожаловать, ${profileName}! ✨\n🏆 Побеждайте боссов, чтобы открывать новые локации!`;
        game.initialized = true;
        await saveProfile();
        renderGame();
        return true;
    }
    
    function getRandomEnemy() {
        const enemiesList = Object.values(ENEMIES);
        return { ...enemiesList[Math.floor(Math.random() * enemiesList.length)] };
    }
    
    function getBossFromLocation(locKey) {
        const loc = LOCATIONS[locKey];
        if (!loc || !loc.boss) return null;
        const boss = loc.boss;
        const levelBonus = Math.floor(game.level / 2);
        return {
            name: `👑 БОСС: ${boss.name} 👑`,
            hp: boss.hp + levelBonus * 10,
            str: boss.str + levelBonus * 3,
            def: boss.def + levelBonus * 2,
            exp: boss.exp + levelBonus * 20,
            gold: boss.gold + levelBonus * 30,
            icon: boss.icon,
            isBoss: true,
            dodgeChance: 10
        };
    }
    
    function getTotalDefense() {
        return (game.armor?.defBonus || 0) + (game.helmet?.defBonus || 0) + 
               (game.gloves?.defBonus || 0) + (game.boots?.defBonus || 0) + (game.cloak?.defBonus || 0);
    }
    
    function getTotalStrength() { return game.weapon?.strBonus || 2; }
    
    function getCurrentStats() {
        return {
            hp: game.combatEnergy,
            maxHp: game.maxCombatEnergy,
            str: 10 + game.level * 2 + getTotalStrength(),
            def: 5 + game.level + getTotalDefense()
        };
    }
    
    function spendTravelEnergy(cost) {
        if (game.travelEnergy >= cost) {
            game.travelEnergy -= cost;
            return true;
        }
        game.message = "❌ Недостаточно энергии для путешествий!";
        renderGame();
        return false;
    }
    
    function spendCombatEnergy(cost) {
        if (game.combatEnergy >= cost) {
            game.combatEnergy -= cost;
            return true;
        }
        game.message = "❌ Недостаточно боевой энергии!";
        renderGame();
        return false;
    }
    
    function autoRestoreEnergy() {
        if (!game.initialized || game.inCombat) return;
        let restored = false;
        if (game.combatEnergy < game.maxCombatEnergy) {
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 1);
            restored = true;
        }
        if (game.travelEnergy < game.maxTravelEnergy) {
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 1);
            restored = true;
        }
        if (restored) { saveProfile(); renderGame(); }
    }
    setInterval(autoRestoreEnergy, 120000);
    
    async function gainExp(amount) {
        game.exp += amount;
        game.message += ` +${amount}✨`;
        while (game.exp >= game.expToNext) {
            game.exp -= game.expToNext;
            game.level++;
            game.maxCombatEnergy += 5;
            game.maxTravelEnergy += 2;
            game.combatEnergy = game.maxCombatEnergy;
            game.travelEnergy = game.maxTravelEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` ✨ УРОВЕНЬ ${game.level}! ✨`;
            await saveProfile();
        }
        renderGame();
    }
    
    async function dropRewards(gold, exp, isBoss = false) {
        game.gold += gold;
        await gainExp(exp);
        if (isBoss && Math.random() < 0.5) {
            game.resources["Малая эссенция"] = (game.resources["Малая эссенция"] || 0) + 1;
            game.message += ` +📦 Малая эссенция`;
        }
        if (Math.random() < 0.3) {
            game.resources["Целебная трава"] = (game.resources["Целебная трава"] || 0) + 1;
            game.message += ` +🌿 Трава`;
        }
        await saveProfile();
    }
    
    async function combatAction(action) {
        if (!game.inCombat) return;
        let enemy = game.combatEnemy;
        let stats = getCurrentStats();
        
        if (game.enemyCurrentHp <= 0) {
            await dropRewards(enemy.gold, enemy.exp, enemy.isBoss);
            let energyBack = 8;
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + energyBack);
            game.message = `🏆 Победа! +${enemy.gold}💰 +${enemy.exp}✨ +${energyBack}⚡`;
            
            if (enemy.isBoss) {
                game.locationBossDefeated = true;
                const currentLoc = game.location;
                if (!game.completedLocations.includes(currentLoc)) {
                    game.completedLocations.push(currentLoc);
                }
                game.message += `\n🏆 БОСС ПОБЕЖДЁН! Локация завершена!`;
            }
            
            game.inCombat = false;
            game.combatEnemy = null;
            await saveProfile();
            renderGame();
            return;
        }
        
        if (stats.hp <= 0) {
            let energyBack = 3;
            game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + energyBack);
            game.message = `💀 Поражение... Возвращено ${energyBack}⚡`;
            game.inCombat = false;
            renderGame();
            return;
        }
        
        if (action === "use_potion") {
            if (game.potions.strong > 0) {
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 50);
                game.potions.strong--;
                game.message = `💊 Мощное зелье +50 HP! Осталось: ${game.potions.strong}`;
            } else if (game.potions.medium > 0) {
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 25);
                game.potions.medium--;
                game.message = `🧪 Среднее зелье +25 HP! Осталось: ${game.potions.medium}`;
            } else if (game.potions.weak > 0) {
                game.combatEnergy = Math.min(game.maxCombatEnergy, game.combatEnergy + 10);
                game.potions.weak--;
                game.message = `🍃 Слабое зелье +10 HP! Осталось: ${game.potions.weak}`;
            } else {
                game.message = "❌ Нет зелий!";
                renderGame();
                return;
            }
            
            let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
            game.combatEnergy -= enemyDmg;
            if (game.combatEnergy < 0) game.combatEnergy = 0;
            game.message += ` | Враг атакует → -${Math.floor(enemyDmg)} HP`;
            await saveProfile();
            renderGame();
            return;
        }
        
        if (action === "attack") {
            let dodgeChance = Math.random() * 100;
            if (dodgeChance < (enemy.dodgeChance || 5)) {
                game.message = `✨ ${enemy.name} увернулся! ✨`;
                setAnimation("dodge");
                await saveProfile();
                renderGame();
                return;
            }
            
            let dmg = Math.max(1, stats.str + Math.floor(Math.random() * 8) - enemy.def);
            game.enemyCurrentHp -= dmg;
            game.message = `⚡ Урон ${Math.floor(dmg)} по ${enemy.name}`;
            setAnimation("attack");
            
            let enemyDodge = Math.random() * 100;
            if (enemyDodge < 8) {
                game.message += ` ✨ Уворот!`;
            } else {
                let enemyDmg = Math.max(1, enemy.str + Math.floor(Math.random() * 7) - stats.def);
                game.combatEnergy -= enemyDmg;
                game.message += ` | Враг атакует → -${Math.floor(enemyDmg)} HP`;
                if (game.combatEnergy < 0) game.combatEnergy = 0;
            }
            await saveProfile();
            renderGame();
            return;
        }
        await saveProfile();
        renderGame();
    }
    
    function startBossFight() {
        const boss = getBossFromLocation(game.location);
        if (!boss) {
            game.message = "❌ Здесь нет босса!";
            renderGame();
            return;
        }
        if (game.completedLocations.includes(game.location)) {
            game.message = "🏆 Босс этой локации уже побеждён!";
            renderGame();
            return;
        }
        if (spendCombatEnergy(15)) {
            game.inCombat = true;
            game.combatEnemy = boss;
            game.enemyCurrentHp = boss.hp;
            game.message = `⚔️ БОЙ С БОССОМ: ${boss.icon} ${boss.name} (❤️ ${boss.hp} / ⚔️ ${boss.str})`;
            renderGame();
        }
    }
    
    function startRandomFight() {
        if (game.completedLocations.includes(game.location)) {
            game.message = "🏆 Босс этой локации уже побеждён! Монстры разбежались.";
            renderGame();
            return;
        }
        let enemy = getRandomEnemy();
        let levelBonus = Math.floor(game.level / 2);
        enemy.hp = (enemy.baseHp || 20) + levelBonus * 5;
        enemy.str = (enemy.baseStr || 10) + levelBonus * 2;
        enemy.def = (enemy.baseDef || 5) + levelBonus;
        enemy.exp = (enemy.exp || 30) + levelBonus * 8;
        enemy.gold = (enemy.gold || 15) + levelBonus * 5;
        
        if (spendCombatEnergy(10)) {
            game.inCombat = true;
            game.combatEnemy = enemy;
            game.enemyCurrentHp = enemy.hp;
            game.message = `⚔️ БОЙ: ${enemy.icon} ${enemy.name} (❤️ ${enemy.hp} / ⚔️ ${enemy.str})`;
            renderGame();
        }
    }
    
    function startDungeonFight() {
        if (game.dungeonFloor > 1000) {
            game.message = "🎉 Поздравляю! Ты прошёл всё подземелье!";
            renderGame();
            return;
        }
        let isBoss = (game.dungeonFloor % 20 === 0);
        let enemy;
        if (isBoss) {
            enemy = { name: `👑 БОСС ${Math.floor(game.dungeonFloor/20)} этажа 👑`, hp: 150 + game.dungeonFloor * 2, str: 30 + Math.floor(game.dungeonFloor/2), def: 15 + Math.floor(game.dungeonFloor/3), exp: 300 + game.dungeonFloor * 5, gold: 200 + game.dungeonFloor * 5, icon: "👑", isBoss: true, dodgeChance: 10 };
        } else {
            enemy = { name: "Страж подземелья", hp: 50 + game.dungeonFloor, str: 15 + Math.floor(game.dungeonFloor/4), def: 8 + Math.floor(game.dungeonFloor/5), exp: 60 + game.dungeonFloor, gold: 40 + game.dungeonFloor, icon: "👹", dodgeChance: 5 };
        }
        if (spendCombatEnergy(10)) {
            game.inCombat = true;
            game.combatEnemy = enemy;
            game.enemyCurrentHp = enemy.hp;
            game.message = `⚔️ ПОДЗЕМЕЛЬЕ ${game.dungeonFloor} этаж: ${enemy.icon} ${enemy.name} (❤️ ${enemy.hp} / ⚔️ ${enemy.str})`;
            renderGame();
        }
    }
    
    function goToFloor(floor) {
        floor = Math.min(1000, Math.max(1, floor));
        if (game.isAdmin || floor <= game.maxUnlockedFloor + 10) {
            game.dungeonFloor = floor;
            if (floor > game.maxUnlockedFloor) game.maxUnlockedFloor = floor;
            game.message = `📍 Переход на ${floor} этаж`;
            renderGame();
        } else {
            game.message = `❌ Нельзя перейти на ${floor} этаж!`;
            renderGame();
        }
    }
    
    function canAccessLocation(locKey) {
        if (game.isAdmin) return true;
        const loc = LOCATIONS[locKey];
        if (!loc) return false;
        if (game.level < loc.requiredLevel) return false;
        if (loc.isDungeon) return true;
        if (loc.order === 0) return true;
        const prevLocations = Object.values(LOCATIONS).filter(l => l.order === loc.order - 1);
        for (let prev of prevLocations) {
            const prevKey = Object.keys(LOCATIONS).find(k => LOCATIONS[k] === prev);
            if (prevKey && !game.completedLocations.includes(prevKey)) {
                return false;
            }
        }
        return true;
    }
    
    function changeLocation(locKey) {
        let loc = LOCATIONS[locKey];
        if (!loc) return;
        if (!canAccessLocation(locKey)) {
            game.message = `❌ Сначала победите босса в предыдущей локации!`;
            renderGame();
            return;
        }
        if (spendTravelEnergy(loc.energyCost)) {
            game.location = locKey;
            game.locationBossDefeated = game.completedLocations.includes(locKey);
            game.message = `🚶 Переход в ${loc.name} (-${loc.energyCost} энергии)`;
            renderGame();
        }
    }
    
    async function craftPotion(type) {
        if (type === "weak" && game.resources["Целебная трава"] >= 1 && game.resources["Магический гриб"] >= 1 && game.gold >= 50) {
            game.resources["Целебная трава"]--; game.resources["Магический гриб"]--; game.gold -= 50;
            game.potions.weak += 3;
            game.message = "🍃 Скрафчено 3 слабых зелья!";
        } else if (type === "medium" && game.resources["Целебная трава"] >= 2 && game.resources["Магический гриб"] >= 2 && game.resources["Мифический цветок"] >= 1 && game.gold >= 150) {
            game.resources["Целебная трава"] -= 2; game.resources["Магический гриб"] -= 2; game.resources["Мифический цветок"]--; game.gold -= 150;
            game.potions.medium += 3;
            game.message = "🌿 Скрафчено 3 средних зелья!";
        } else if (type === "strong" && game.resources["Целебная трава"] >= 3 && game.resources["Магический гриб"] >= 3 && game.resources["Мифический цветок"] >= 2 && game.gold >= 300) {
            game.resources["Целебная трава"] -= 3; game.resources["Магический гриб"] -= 3; game.resources["Мифический цветок"] -= 2; game.gold -= 300;
            game.potions.strong += 3;
            game.message = "🌸 Скрафчено 3 мощных зелья!";
        } else {
            game.message = "❌ Не хватает ресурсов!";
        }
        await saveProfile();
        renderGame();
    }
    
    async function buyEnergy() {
        if (game.gold >= 250) {
            game.gold -= 250;
            game.travelEnergy = Math.min(game.maxTravelEnergy, game.travelEnergy + 5);
            game.message = "🍺 +5 энергии путешествий!";
            await saveProfile();
            renderGame();
            closeDialog();
        } else {
            game.message = "❌ Не хватает 250 золота!";
            renderGame();
        }
    }
    
    async function equipItem(item, slot) {
        if (item.type === "weapon") game.weapon = item;
        if (item.type === "armor") game.armor = item;
        if (slot === "helmet") game.helmet = item;
        if (slot === "gloves") game.gloves = item;
        if (slot === "boots") game.boots = item;
        if (slot === "cloak") game.cloak = item;
        game.message = `🔧 Экипировано: ${item.name}`;
        await saveProfile();
        renderGame();
    }
    
    async function buyItem(item) {
        if (game.gold >= item.price) {
            game.gold -= item.price;
            game.inventory.push({ ...item });
            game.message = `✅ Куплено ${item.name}!`;
            await saveProfile();
            renderGame();
        } else {
            game.message = `❌ Не хватает ${item.price - game.gold}💰!`;
            renderGame();
        }
    }
    
    function startDialog(npc) {
        let dialogHtml = `<div class="dialog-overlay" id="dialogOverlay"><div class="dialog-window"><div class="dialog-header"><div class="npc-avatar">${npc.avatar}</div><div class="npc-name">${npc.name} ${npc.icon}</div></div><div class="dialog-body"><div class="dialog-text">${
            npc.type === "blacksmith" ? "Кузнец Гром: Лучшее оружие и броня!" :
            npc.type === "alchemist" ? "Алхимик Морган: Крафт зелий из ресурсов!" :
            npc.type === "tavern" ? "Трактирщик: Эль за 250 монет (+5 энергии)!" :
            "Мастер крафта: Мифическое оружие с боссов 100+ этажа!"
        }</div></div><div class="dialog-footer"><div class="dialog-buttons">${
            npc.type === "blacksmith" ? npc.items.map(item => `<button class="dialog-btn" onclick="buyItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">${item.name} - ${item.price}💰</button>`).join('') :
            npc.type === "alchemist" ? `<button class="dialog-btn" onclick="craftPotion('weak')">🍃 Слабое зелье (3 шт) - трава+гриб+50💰</button><button class="dialog-btn" onclick="craftPotion('medium')">🌿 Среднее зелье (3 шт)</button><button class="dialog-btn" onclick="craftPotion('strong')">🌸 Мощное зелье (3 шт)</button>` :
            npc.type === "tavern" ? `<button class="dialog-btn" onclick="buyEnergy()">🍺 Купить эль за 250💰 (+5 энергии)</button>` :
            `<div style="font-size:12px;">Собирайте ресурсы с боссов 100+ этажа подземелья!</div>`
        }<button class="dialog-btn dialog-close" onclick="closeDialog()">🚪 Закрыть</button></div></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', dialogHtml);
    }
    
    function closeDialog() { document.getElementById("dialogOverlay")?.remove(); }
    function setAnimation(anim) {
        game.animationState = anim;
        let spriteDiv = document.getElementById("characterSprite");
        if (spriteDiv) spriteDiv.innerHTML = `<div class="character-${anim}">⚔️</div>`;
        if (anim === "attack") setTimeout(() => setAnimation(game.isRunning ? "running" : "idle"), 200);
        if (anim === "dodge") setTimeout(() => setAnimation(game.isRunning ? "running" : "idle"), 200);
    }
    
    async function adminResetPlayer() {
        if (!isUserAdmin()) { game.message = "❌ Нет прав!"; renderGame(); return; }
        let name = document.getElementById("adminResetName")?.value;
        if (!name) { game.message = "❌ Введите имя!"; renderGame(); return; }
        if (confirm(`Сбросить прогресс ${name}?`)) {
            await tgDeleteData(`rpg_${name}`);
            game.message = `👑 Прогресс ${name} сброшен!`;
            renderGame();
        }
    }
    
    async function adminAddGold(amount) { if (game.isAdmin) { game.gold += amount; game.message = `👑 +${amount}💰`; await saveProfile(); renderGame(); } }
    async function adminAddExp(amount) { if (game.isAdmin) await gainExp(amount); }
    async function adminHeal() { if (game.isAdmin) { game.combatEnergy = game.maxCombatEnergy; game.travelEnergy = game.maxTravelEnergy; game.message = "👑 Исцелён"; renderGame(); } }
    async function adminAddFloor() { if (game.isAdmin) { game.dungeonFloor = Math.min(1000, game.dungeonFloor + 10); game.maxUnlockedFloor = Math.max(game.maxUnlockedFloor, game.dungeonFloor); game.message = `👑 +10 этажей`; renderGame(); } }
    async function adminGiveItem() {
        if (!game.isAdmin) return;
        let name = document.getElementById("adminItemName")?.value;
        let type = document.getElementById("adminItemType")?.value;
        let bonus = parseInt(document.getElementById("adminItemBonus")?.value);
        if (name) {
            game.inventory.push({ name, type, strBonus: bonus, defBonus: bonus, rarity: "mythic" });
            game.message = `👑 Выдан ${name}`;
            await saveProfile();
            renderGame();
        }
    }

        }
        
        let locationButtons = Object.entries(LOCATIONS).map(([key, loc]) => {

            let badge = "";
            if (loc.boss && !completed && !loc.isDungeon) badge = `<span class="boss-badge">👑 БОСС</span>`;
            if (completed && !loc.isDungeon) badge = `<span class="completed-badge">✅ ПРОЙДЕНО</span>`;
            return `<button class="${btnClass}" onclick="${available ? `changeLocation('${key}')` : ''}" ${!available ? 'disabled' : ''}>${loc.icon} ${loc.name} ${badge}</button>`;

        } else if (isBossDefeated && !currentLoc.isDungeon) {
            bossBlock = `<div style="background:#2a6b4a; border-radius:20px; padding:10px; margin:10px 0; text-align:center;">🏆 ЛОКАЦИЯ ПРОЙДЕНА! 🏆<br>Монстры разбежались, босс побеждён!</div>`;

        let gameTab = `<div id="tab-game" class="tab-content active">

            </div>
            <div><span>⚡ Боевая: ${game.combatEnergy}/${game.maxCombatEnergy}</span><div class="energy-bar"><div class="energy-fill" style="width:${combatEnergyPercent}%"></div></div></div>
            <div><span>🚶 Путешествий: ${game.travelEnergy}/${game.maxTravelEnergy}</span><div class="energy-bar"><div class="energy-fill travel" style="width:${travelEnergyPercent}%"></div></div></div>
            <div style="background:#1a1530; border-radius:20px; padding:12px; margin:12px 0;">
                <div style="font-size:1.2rem;">${currentLoc.icon} ${currentLoc.name}</div>
                ${!currentLoc.isDungeon ? `
                    ${!isBossDefeated ? `<button id="randomFightBtn" style="margin-top:10px;">⚔️ СРАЖАТЬСЯ С МОНСТРАМИ (10⚡)</button>` : ``}
                    ${bossBlock}
                ` : `
                    <div class="dungeon-floor-select">
                        <b>🏚️ ПОДЗЕМЕЛЬЕ (1000 этажей)</b>
                        <div><input type="number" id="floorInput" min="1" max="1000" value="${game.dungeonFloor}" style="width:80px;">
                        <button id="goToFloorBtn">Перейти</button>
                        <button id="fightDungeonBtn">⚔️ Сражаться (${game.dungeonFloor} этаж)</button></div>
                        <div>📊 Пройдено: ${game.maxUnlockedFloor} этажей | 👑 Босс каждый 20 этаж</div>
                    </div>
                `}
            </div>
            <div class="location-grid">${locationButtons}</div>
            ${combatBlock}
            <div class="message-log">💬 ${game.message}</div>
            <div class="actions">
                <button id="runToggleBtn" class="run-btn">${game.isRunning ? "🚶 ВЫКЛ" : "🏃‍♂️ ВКЛ"}</button>
                ${game.isAdmin ? '<button id="adminToggleBtn" class="admin-btn">👑 ВЫКЛ АДМИНА</button>' : ''}
                <button id="resetBtn" class="reset-btn">🔄 Сброс</button>
            </div>
            ${adminHtml}
        </div>`;
        
        let characterTab = `<div id="tab-character" class="tab-content">
            <h3 style="color:gold; text-align:center;">👤 ПЕРСОНАЖ</h3>
            <div class="stats-panel" style="justify-content:center;">
                <span class="stat">❤️ ${Math.floor(stats.hp)}/${stats.maxHp}</span>
                <span class="stat">⚔️ ${stats.str}</span>
                <span class="stat">🛡️ ${stats.def}</span>
                <span class="stat">⭐${game.level}</span>
                <span class="stat">📖${game.exp}/${game.expToNext}</span>
            </div>
            <div class="equipment-grid">
                <div class="equip-item equipped"><b>⚔️ Оружие</b><br>${game.weapon?.name}<br>+${game.weapon?.strBonus} силы</div>
                <div class="equip-item equipped"><b>🛡️ Броня</b><br>${game.armor?.name}<br>+${game.armor?.defBonus} защиты</div>
                ${game.inventory.filter(i => i.name !== game.weapon?.name && i.name !== game.armor?.name).map(item => `
                    <div class="equip-item" onclick="equipItem(${JSON.stringify(item).replace(/"/g, '&quot;')}, '${item.type === "weapon" ? "weapon" : "armor"}')">
                        <b>${item.type === "weapon" ? "⚔️" : "🛡️"} ${item.name}</b><br>+${item.strBonus || item.defBonus}
                    </div>
                `).join('')}
            </div>
        </div>`;
        
        let tavernTab = `<div id="tab-tavern" class="tab-content">
            <h3 style="color:gold; text-align:center;">🍺 ТАВЕРНА</h3>
            <div class="npc-panel"><div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
                ${NPCS.map(npc => `<button onclick="startDialog(${JSON.stringify(npc).replace(/"/g, '&quot;')})">💬 ${npc.icon} ${npc.name}</button>`).join('')}
            </div></div>
            <div style="margin-top:10px;"><div class="stat">🧪 Зелья: Сл:${game.potions.weak} | Ср:${game.potions.medium} | Мщ:${game.potions.strong}</div></div>
        </div>`;
        
        let craftTab = `<div id="tab-craft" class="tab-content">
            <h3 style="color:gold; text-align:center;">🔨 МАСТЕРСКАЯ КРАФТА</h3>
            <div class="craft-panel"><b>МИФИЧЕСКОЕ ОРУЖИЕ (с боссов 100+ этажа)</b>
                <div><div class="equip-item" onclick="alert('5 Великих эссенций, 3 Искры богов, 5 Мифрила')">⚔️ Меч Богов +200 силы</div>
                <div class="equip-item" onclick="alert('5 Великих эссенций, 2 Искры богов, 8 Кристаллов')">⚔️ Копье Судьбы +180 силы</div>
                <div class="equip-item" onclick="alert('4 Великих эссенции, 3 Искры богов, 6 Мифрила')">🛡️ Доспех Бога +150 защиты</div></div>
            </div>
        </div>`;
        
        let tabsHtml = `<div class="tabs">
            <div class="tab-btn active" data-tab="game">⚔️ Игра</div>
            <div class="tab-btn" data-tab="character">👤 Персонаж</div>
            <div class="tab-btn" data-tab="tavern">🍺 Таверна</div>
            <div class="tab-btn" data-tab="craft">🔨 Крафт</div>
        </div>`;
        
        container.innerHTML = tabsHtml + gameTab + characterTab + tavernTab + craftTab;
        
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                let tab = btn.getAttribute("data-tab");
                document.querySelectorAll(".tab-content").forEach(tc => tc.classList.remove("active"));
                document.getElementById(`tab-${tab}`).classList.add("active");
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                game.activeTab = tab;
            });
        });
        
        document.getElementById("randomFightBtn")?.addEventListener("click", startRandomFight);
        document.getElementById("bossFightBtn")?.addEventListener("click", startBossFight);
        document.getElementById("fightDungeonBtn")?.addEventListener("click", startDungeonFight);
        document.getElementById("goToFloorBtn")?.addEventListener("click", () => goToFloor(parseInt(document.getElementById("floorInput")?.value || 1)));
        document.getElementById("attackBtn")?.addEventListener("click", () => combatAction("attack"));
        document.getElementById("potionBtn")?.addEventListener("click", () => combatAction("use_potion"));
        document.getElementById("runToggleBtn")?.addEventListener("click", () => {
            game.isRunning = !game.isRunning;
            setAnimation(game.isRunning ? "running" : "idle");
            renderGame();
        });
        document.getElementById("adminToggleBtn")?.addEventListener("click", () => {
            if (isUserAdmin()) { game.isAdmin = !game.isAdmin; game.message = game.isAdmin ? "👑 АДМИН ВКЛ" : "👑 АДМИН ВЫКЛ"; saveProfile(); renderGame(); }
        });
        document.getElementById("resetBtn")?.addEventListener("click", async () => {
            if (confirm("Сбросить прогресс?")) {
                await tgDeleteData(`rpg_${game.telegramId || game.profileName}`);
                game.initialized = false;
                renderGame();
            }
        });
        setAnimation(game.animationState);
    }
    
    window.changeLocation = changeLocation;
    window.startDialog = startDialog;
    window.buyItem = buyItem;
    window.craftPotion = craftPotion;
    window.buyEnergy = buyEnergy;
    window.closeDialog = closeDialog;
    window.adminAddGold = adminAddGold;
    window.adminAddExp = adminAddExp;
    window.adminHeal = adminHeal;
    window.adminAddFloor = adminAddFloor;
    window.adminGiveItem = adminGiveItem;
    window.adminResetPlayer = adminResetPlayer;
    window.equipItem = equipItem;
    
    if (tg) tg.ready();
    renderGame();
</script>
</body>
</html>
