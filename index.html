<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPG | Тропы забытого королевства</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #0a0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 10px; min-height: 100vh; color: #fff; }
        .game-container { max-width: 500px; margin: 0 auto; background: #0f0e17; border-radius: 32px; padding: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid #f7d44a55; }
        .char-idle { font-size: 3rem; text-align: center; }
        .card { background: #1e1b2b; border-radius: 20px; padding: 10px; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .stat { background: #00000099; padding: 5px 12px; border-radius: 30px; font-size: 0.7rem; color: #f7d44a; }
        .energy-bar { background: #2a1a2a; border-radius: 20px; height: 8px; margin-top: 5px; overflow: hidden; }
        .energy-fill { background: #4cff4c; height: 100%; width: 0%; transition: width 0.2s; }
        .btn { background: #3a2c45; border: none; padding: 8px 12px; border-radius: 40px; font-size: 0.7rem; color: white; cursor: pointer; margin: 3px; }
        .btn-primary { background: #2f6b4a; }
        .btn-boss { background: #8b3c2c; }
        .tabs { display: flex; gap: 4px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: #2a2438; padding: 6px 10px; border-radius: 30px; font-size: 0.6rem; cursor: pointer; }
        .tab-btn.active { background: #f7d44a; color: #1e1b2b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .location-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0; }
        .location-btn { background: #3a2c45; padding: 6px 10px; border-radius: 30px; font-size: 0.65rem; cursor: pointer; }
        .location-btn.locked { opacity: 0.4; background: #5a3e2e; }
        .fight-counter { background: #1a1530; border-radius: 20px; padding: 8px; text-align: center; margin: 8px 0; font-size: 0.75rem; }
        .message-log { background: #000000aa; border-radius: 16px; padding: 8px; font-size: 0.65rem; color: #bdaa88; max-height: 60px; overflow-y: auto; margin: 10px 0; }
        .class-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; max-height: 180px; overflow-y: auto; }
        .class-option { background: #2a2438; padding: 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 0.55rem; }
        .class-option.selected { background: #f7d44a; color: #1e1b2b; }
        .admin-panel { background: #2c1e2e; border-radius: 20px; padding: 10px; margin-top: 10px; border: 2px solid #ff00ff; }
        .admin-input { background: #1e1b2b; color: #f7d44a; border: 1px solid gold; border-radius: 30px; padding: 4px 8px; margin: 3px; width: 90px; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="game-container" id="rpgGame"></div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    let tg;
    try {
        tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }
    } catch(e) { tg = null; }
    
    const ADMIN_ID = 1198178866;
    function isAdmin() { return tg?.initDataUnsafe?.user?.id === ADMIN_ID; }
    
    async function saveData(key, data) {
        if (tg?.CloudStorage) {
            return new Promise((resolve) => tg.CloudStorage.setItem(key, data, (e) => resolve(!e)));
        } else { localStorage.setItem(key, data); return true; }
    }
    async function loadData(key) {
        if (tg?.CloudStorage) {
            return new Promise((resolve) => tg.CloudStorage.getItem(key, (e, v) => resolve(e || !v ? null : v)));
        } else { return localStorage.getItem(key); }
    }
    
    const CLASSES = {
        warrior: { name: "Воин", icon: "🗡️", strBonus: 5, hpBonus: 10 },
        archer: { name: "Лучник", icon: "🏹", strBonus: 4, hpBonus: 5 },
        mage: { name: "Маг", icon: "🧙", strBonus: 6, hpBonus: 3 },
        rogue: { name: "Вор", icon: "🔪", strBonus: 3, hpBonus: 5 },
        paladin: { name: "Паладин", icon: "🛡️", strBonus: 4, hpBonus: 8 }
    };
    
    let game = {
        initialized: false, id: null, name: "", class: "warrior",
        gold: 500, level: 1, exp: 0, expToNext: 100,
        hp: 100, maxHp: 100, energy: 100, maxEnergy: 100,
        monstersKilled: 0, needKill: 15, completed: [],
        inCombat: false, enemy: null, enemyHp: 0,
        autoFight: false, autoInterval: null,
        message: "", activeTab: "game", isAdmin: false
    };
    
    async function saveGame() { if(game.name) await saveData(`rpg_${game.id || game.name}`, JSON.stringify(game)); }
    async function loadGame(id) {
        let raw = await loadData(`rpg_${id}`);
        if(raw) { Object.assign(game, JSON.parse(raw)); game.isAdmin = isAdmin(); if(!game.completed) game.completed = []; renderGame(); return true; }
        return false;
    }
    
    async function createCharacter(name, cls) {
        if(!name.trim()) return alert("Введите имя!");
        let c = CLASSES[cls];
        game.name = name; game.class = cls; game.id = tg?.initDataUnsafe?.user?.id;
        game.gold = 500; game.level = 1; game.exp = 0; game.expToNext = 100;
        game.hp = 100 + (c.hpBonus||0); game.maxHp = 100 + (c.hpBonus||0);
        game.energy = 100; game.maxEnergy = 100;
        game.monstersKilled = 0; game.completed = [];
        game.isAdmin = isAdmin(); game.initialized = true;
        game.message = `✨ Добро пожаловать, ${name}-${c.name}! Убей 15 монстров для босса! ✨`;
        await saveGame(); renderGame();
    }
    
    function getStats() {
        let c = CLASSES[game.class] || CLASSES.warrior;
        return { hp: game.hp, maxHp: game.maxHp, str: 10 + game.level * 2 + (c.strBonus||0) };
    }
    
    function getEnemy() {
        let bonus = Math.floor(game.level/2);
        let enemies = [
            { name: "Гоблин", hp: 20+bonus*5, str: 7+bonus*2, exp: 30+bonus*8, gold: 15+bonus*5, icon: "👺" },
            { name: "Волк", hp: 25+bonus*5, str: 9+bonus*2, exp: 45+bonus*8, gold: 20+bonus*5, icon: "🐺" },
            { name: "Орк", hp: 35+bonus*5, str: 12+bonus*2, exp: 70+bonus*8, gold: 35+bonus*5, icon: "👹" }
        ];
        return JSON.parse(JSON.stringify(enemies[Math.floor(Math.random()*enemies.length)]));
    }
    
    function getBoss() {
        let bonus = Math.floor(game.level/2);
        return { name: "👑 БОСС 👑", icon: "👑", hp: 80+bonus*15, str: 18+bonus*3, exp: 150+bonus*30, gold: 200+bonus*50, isBoss: true };
    }
    
    async function gainExp(amount) {
        game.exp += amount;
        while(game.exp >= game.expToNext) {
            game.exp -= game.expToNext; game.level++;
            game.maxHp += 5; game.hp = game.maxHp;
            game.maxEnergy += 5; game.energy = game.maxEnergy;
            game.expToNext = Math.floor(game.expToNext * 1.2);
            game.message += ` ✨ УРОВЕНЬ ${game.level}! ✨`;
        }
        await saveGame(); renderGame();
    }
    
    async function combatAttack() {
        if(!game.inCombat) return;
        let s = getStats();
        let dmg = Math.max(1, s.str + Math.floor(Math.random()*8) - 5);
        game.enemyHp -= dmg;
        game.message = `⚡ Урон ${dmg} по ${game.enemy.name}`;
        
        if(game.enemyHp <= 0) {
            game.gold += game.enemy.gold;
            await gainExp(game.enemy.exp);
            if(!game.enemy.isBoss) game.monstersKilled++;
            game.energy = Math.min(game.maxEnergy, game.energy + 8);
            game.message += ` 🏆 Победа! +${game.enemy.gold}💰 +${game.enemy.exp}✨`;
            
            if(game.enemy.isBoss) {
                if(!game.completed.includes(game.location)) game.completed.push(game.location);
                game.monstersKilled = 0;
            }
            
            game.inCombat = false;
            game.enemy = null;
            
            if(game.autoFight && game.monstersKilled < game.needKill && !game.completed.includes(game.location)) {
                setTimeout(() => startFight(), 300);
            }
            await saveGame(); renderGame();
            return;
        }
        
        let enemyDmg = Math.max(1, game.enemy.str + Math.floor(Math.random()*7) - 5);
        game.hp -= enemyDmg;
        game.message += ` | Враг атакует → -${enemyDmg} HP`;
        
        if(game.hp <= 0) {
            game.message = "💀 Поражение!";
            game.inCombat = false; game.enemy = null;
            game.hp = game.maxHp;
            if(game.autoFight) stopAutoFight();
            await saveGame(); renderGame();
            return;
        }
        await saveGame(); renderGame();
    }
    
    function startFight() {
        if(game.completed.includes("village")) { game.message = "Босс уже побеждён! Перейди в подземелье"; renderGame(); return; }
        if(game.monstersKilled >= game.needKill) { game.message = "👑 Убей босса!"; renderGame(); return; }
        if(game.energy < 10) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        game.energy -= 10;
        game.enemy = getEnemy();
        game.enemyHp = game.enemy.hp;
        game.inCombat = true;
        game.message = `⚔️ БОЙ ${game.monstersKilled+1}/${game.needKill}: ${game.enemy.icon} ${game.enemy.name}`;
        renderGame();
    }
    
    function startBossFight() {
        if(game.completed.includes("village")) { game.message = "Босс уже побеждён!"; renderGame(); return; }
        if(game.monstersKilled < game.needKill) { game.message = `❌ Нужно убить ещё ${game.needKill-game.monstersKilled} монстров!`; renderGame(); return; }
        if(game.energy < 15) { game.message = "❌ Нет энергии!"; renderGame(); return; }
        game.energy -= 15;
        game.enemy = getBoss();
        game.enemyHp = game.enemy.hp;
        game.inCombat = true;
        game.message = `⚔️ БОЙ С БОССОМ! ${game.enemy.icon} ${game.enemy.name}`;
        renderGame();
    }
    
    function startAutoFight() {
        if(game.autoFight) { stopAutoFight(); return; }
        game.autoFight = true;
        game.message = "🟢 АВТОБОЙ ВКЛЮЧЁН";
        renderGame();
        game.autoInterval = setInterval(() => {
            if(game.autoFight && !game.inCombat) {
                if(game.completed.includes("village")) { stopAutoFight(); game.message = "Босс побеждён!"; renderGame(); }
                else if(game.monstersKilled >= game.needKill) { stopAutoFight(); game.message = "👑 Победи босса!"; renderGame(); }
                else if(game.energy < 10) { stopAutoFight(); game.message = "⚠️ Нет энергии!"; renderGame(); }
                else startFight();
            }
        }, 1000);
    }
    
    function stopAutoFight() {
        game.autoFight = false;
        if(game.autoInterval) clearInterval(game.autoInterval);
        game.autoInterval = null;
        renderGame();
    }
    
    function heal() {
        if(game.gold >= 50) {
            game.gold -= 50;
            game.hp = game.maxHp;
            game.message = "💚 Полное исцеление! -50💰";
        } else { game.message = "❌ Нужно 50 золота!"; }
        saveGame(); renderGame();
    }
    
    function resetGame() {
        if(confirm("Сбросить прогресс?")) {
            game.name = ""; game.initialized = false;
            renderGame();
        }
    }
    
    window.combatAttack = combatAttack;
    window.startFight = startFight;
    window.startBossFight = startBossFight;
    window.startAutoFight = startAutoFight;
    window.heal = heal;
    window.resetGame = resetGame;
    
    function renderGame() {
        let container = document.getElementById("rpgGame");
        let s = getStats();
        let cls = CLASSES[game.class] || CLASSES.warrior;
        
        if(!game.initialized) {
            let tid = tg?.initDataUnsafe?.user?.id;
            if(tid) { loadGame(tid); return; }
            let selectedClass = "warrior";
            container.innerHTML = `<div><h2 style="color:gold;text-align:center;">⚔️ ТРОПЫ ЗАБЫТОГО КОРОЛЕВСТВА ⚔️</h2><input id="pName" placeholder="Имя героя"><div class="class-selector" id="classSel">${Object.entries(CLASSES).map(([k,c])=>`<div class="class-option ${k===selectedClass?'selected':''}" data-class="${k}">${c.icon} ${c.name}</div>`).join('')}</div><button class="btn btn-primary" id="createBtn">🚀 НАЧАТЬ</button></div>`;
            document.querySelectorAll(".class-option").forEach(o=>{o.onclick=()=>{document.querySelectorAll(".class-option").forEach(c=>c.classList.remove("selected")); o.classList.add("selected"); selectedClass=o.dataset.class;};});
            document.getElementById("createBtn").onclick=()=>createCharacter(document.getElementById("pName").value, selectedClass);
            return;
        }
        
        let adminPanel = game.isAdmin ? `<div class="admin-panel"><b>👑 АДМИН</b><br><input id="aNick" placeholder="Ник"><input id="aGold" value="500"><button onclick="adminGiveGold()">💰</button><input id="aExp" value="300"><button onclick="adminGiveExp()">✨</button><button onclick="adminReset()">🗑️</button></div>` : "";
        
        let combatBlock = "";
        if(game.inCombat && game.enemy) {
            combatBlock = `<div class="card"><b>${game.enemy.icon} ${game.enemy.name}</b> ❤️ ${Math.floor(game.enemyHp)}/${game.enemy.hp}<br><button class="btn btn-primary" onclick="combatAttack()">⚔️ АТАКОВАТЬ</button></div>`;
        }
        
        let bossButton = "";
        if(!game.completed.includes("village")) {
            if(game.monstersKilled >= game.needKill) {
                bossButton = `<button class="btn btn-boss" onclick="startBossFight()">👑 БОСС</button>`;
            } else {
                bossButton = `<div style="background:#5a3e2e;text-align:center;padding:6px;border-radius:20px;">🔒 БОСС (нужно ${game.needKill-game.monstersKilled} побед)</div>`;
            }
        } else {
            bossButton = `<div style="background:#2a6b4a;text-align:center;padding:6px;border-radius:20px;">✅ БОСС ПОБЕЖДЁН!</div>`;
        }
        
        let html = `
            <div style="font-size:3rem; text-align:center;">${cls.icon}</div>
            <div class="stats-row">
                <span class="stat">❤️ ${Math.floor(game.hp)}/${game.maxHp}</span>
                <span class="stat">⚔️ ${s.str}</span>
                <span class="stat">⭐${game.level}</span>
                <span class="stat">💰${game.gold}</span>
            </div>
            <div><span>⚡ Энергия: ${game.energy}/${game.maxEnergy}</span><div class="energy-bar"><div class="energy-fill" style="width:${(game.energy/game.maxEnergy)*100}%"></div></div></div>
            <div class="fight-counter">🏆 ПОБЕД: ${game.monstersKilled}/${game.needKill}</div>
            <div style="display:flex; gap:5px;">
                <button class="btn" onclick="startFight()">⚔️ БОЙ</button>
                <button class="btn ${game.autoFight?'btn-primary':''}" onclick="startAutoFight()">${game.autoFight?'🟢 АВТО':'🔴 АВТО'}</button>
                <button class="btn" onclick="heal()">💊 ЛЕЧИТЬ</button>
            </div>
            ${bossButton}
            ${combatBlock}
            <div class="message-log">💬 ${game.message}</div>
            ${adminPanel}
            <button class="btn" onclick="resetGame()" style="background:#5a3e2e;">🔄 СБРОС</button>
        `;
        
        container.innerHTML = html;
    }
    
    async function adminGiveGold() {
        if(!game.isAdmin) return;
        let nick = document.getElementById("aNick")?.value;
        let amt = parseInt(document.getElementById("aGold")?.value);
        if(!nick) return;
        let d = await loadData(`rpg_${nick}`);
        if(d) { let t = JSON.parse(d); t.gold += amt; await saveData(`rpg_${nick}`, JSON.stringify(t)); game.message = `👑 Выдал ${amt}💰 ${nick}`; renderGame(); }
        else game.message = `❌ Игрок ${nick} не найден`;
        renderGame();
    }
    async function adminGiveExp() {
        if(!game.isAdmin) return;
        let nick = document.getElementById("aNick")?.value;
        let amt = parseInt(document.getElementById("aExp")?.value);
        if(!nick) return;
        let d = await loadData(`rpg_${nick}`);
        if(d) { let t = JSON.parse(d); t.exp += amt; await saveData(`rpg_${nick}`, JSON.stringify(t)); game.message = `👑 Выдал ${amt}✨ ${nick}`; renderGame(); }
        else game.message = `❌ Игрок ${nick} не найден`;
        renderGame();
    }
    async function adminReset() {
        if(!game.isAdmin) return;
        let nick = document.getElementById("aNick")?.value;
        if(!nick) return;
        if(confirm(`Сбросить ${nick}?`)) { await saveData(`rpg_${nick}`, ""); game.message = `👑 Сброшен ${nick}`; renderGame(); }
    }
    
    window.adminGiveGold = adminGiveGold;
    window.adminGiveExp = adminGiveExp;
    window.adminReset = adminReset;
    
    renderGame();
</script>
</body>
</html>
